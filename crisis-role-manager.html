// handleDataAction ist ab jetzt obsolet (Dispatcher macht das)

function exportConfig(includeRuntime) {
  const payload = {
    format: 'cram-export',
    formatVersion: EXPORT_FORMAT_VERSION,
    appVersion: APP_VERSION,
    exportedAt: new Date().toISOString(),
    config: State.config,
  };
  if (includeRuntime) {
    payload.runtime = State.runtime;
  }
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const ts = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
  const filename = `cram-export-${ts}.json`;

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);

  Storage.appendAudit({
    id: uid('a'),
    timestamp: new Date().toISOString(),
    type: 'config_edit',
    action: 'config_edit',
    detail: t('audit.config_exported'),
  });
  showToast(t('toast.export_done'), 'success');
  closeModal();
}

function validateImportPayload(data) {
  if (!data || typeof data !== 'object') throw new Error('root not object');
  if (data.format !== 'cram-export') throw new Error('format ≠ cram-export');
  if (typeof data.formatVersion !== 'number') throw new Error('formatVersion missing');
  if (data.formatVersion > EXPORT_FORMAT_VERSION) throw new Error('formatVersion > ' + EXPORT_FORMAT_VERSION);
  if (!data.config) throw new Error('config missing');
  if (!Array.isArray(data.config.levels)) throw new Error('config.levels must be array');
  if (!Array.isArray(data.config.persons)) throw new Error('config.persons must be array');
  // Levels strukturell prüfen
  data.config.levels.forEach((lvl, i) => {
    if (!lvl.id || !lvl.name || !Array.isArray(lvl.roles)) {
      throw new Error(`levels[${i}] incomplete`);
    }
    lvl.roles.forEach((r, j) => {
      if (!r.id || !r.name || !Array.isArray(r.assignments)) {
        throw new Error(`levels[${i}].roles[${j}] incomplete`);
      }
    });
  });
  // Personen
  data.config.persons.forEach((p, i) => {
    if (!p.id || !p.name) throw new Error(`persons[${i}] incomplete`);
  });
  return true;
}

/* =========================================================================
   DATA MODAL — ONLINE TAB (V1.3)
   Konfigurations-Sync (volle Config + Runtime) gegen eine Online-Source.
   Wird genutzt, um Konfig-Drifts zwischen Geräten zu lösen: entweder den
   Server-Stand übernehmen oder den lokalen Stand durchsetzen. Beide
   Operationen ersetzen die jeweilige Seite vollständig (config + runtime).
   ========================================================================= */
function renderDataModalOnline(body, footer, tabsHTML) {
  const sources = Sync.listSources();

  if (sources.length === 0) {
    body.innerHTML = `
      ${tabsHTML}
      <div class="sync-explain">${escapeHTML(t('data.online_intro'))}</div>
      <div class="sync-no-sources" style="margin-top: 8px;">
        ${escapeHTML(t('data.online_no_sources'))}
      </div>
    `;
    footer.innerHTML = `<button class="btn-secondary" data-action="modal-close">${escapeHTML(t('btn.close'))}</button>`;
    return;
  }

  // Initial render mit Loading-Placeholders; danach pro Source previewDiff
  const focusId = State.dataOnlineFocusSource;
  const orderedSources = focusId
    ? [sources.find(s => s.id === focusId)].filter(Boolean).concat(sources.filter(s => s.id !== focusId))
    : sources;

  const listHTML = orderedSources.map(s => `
    <div class="sync-online-card" id="data-card-${escapeHTML(s.id)}"${s.id === focusId ? ' data-focused="true"' : ''}>
      <div class="sync-online-card-head">
        <span class="sync-source-type-badge">${escapeHTML(t('settings.sync_type_' + s.type) || s.type)}</span>
        <span class="sync-source-label">${escapeHTML(s.label)}</span>
      </div>
      <div class="sync-online-card-meta">${escapeHTML(syncSourceMetaLine(s))}</div>
      <div class="sync-online-card-body" id="data-card-body-${escapeHTML(s.id)}">
        <div class="sync-card-loading">⏳ ${escapeHTML(t('sync.online_card_loading'))}</div>
      </div>
    </div>
  `).join('');

  body.innerHTML = `
    ${tabsHTML}
    <div class="sync-explain">${escapeHTML(t('data.online_intro'))}</div>
    <div class="sync-online-list">${listHTML}</div>
  `;
  footer.innerHTML = `<button class="btn-secondary" data-action="modal-close">${escapeHTML(t('btn.close'))}</button>`;

  // Clear focus marker once it's been used for ordering
  State.dataOnlineFocusSource = null;

  sources.forEach(s => { refreshDataOnlineCard(s.id); });
}

async function refreshDataOnlineCard(sourceId) {
  const card = document.getElementById('data-card-body-' + sourceId);
  if (!card) return;
  let preview;
  try { preview = await getCachedPreview(sourceId); }
  catch (e) { preview = { reachable: false, error: String(e.message || e) }; }
  const fresh = document.getElementById('data-card-body-' + sourceId);
  if (!fresh) return;
  fresh.innerHTML = renderDataOnlineCardBody(sourceId, preview);
}

function renderDataOnlineCardBody(sourceId, preview) {
  const src = Sync.getSource(sourceId);
  if (!src) return '';

  if (!preview || preview.reachable === false) {
    return `
      <div class="sync-card-status status-error">
        <strong>✗ ${escapeHTML(t('sync.online_card_unreachable'))}</strong>
        <div class="sync-card-meta">${escapeHTML(preview && preview.error ? preview.error : '')}</div>
      </div>
      <div class="sync-online-actions">
        <button class="btn-secondary" data-action="data-online-refresh" data-source-id="${escapeHTML(sourceId)}">↻ ${escapeHTML(t('sync.online_card_retry'))}</button>
      </div>
    `;
  }

  if (preview.empty) {
    return `
      <div class="sync-card-status status-ok">
        <strong>○ ${escapeHTML(t('sync.online_card_empty'))}</strong>
        <div class="sync-card-meta">${escapeHTML(t('data.online_empty_hint'))}</div>
      </div>
      <div class="sync-online-actions">
        <button class="btn-primary" data-action="data-online-push" data-source-id="${escapeHTML(sourceId)}">↑ ${escapeHTML(t('data.online_first_push'))}</button>
      </div>
    `;
  }

  if (preview.encrypted && !preview.decrypted && preview.needsPassphrase) {
    return `
      <div class="sync-card-status status-warn">
        <strong>🔒 ${escapeHTML(t('sync.online_card_locked'))}</strong>
        <div class="sync-card-meta">${escapeHTML(t('sync.online_card_locked_hint'))}</div>
      </div>
      <div class="sync-online-actions">
        <button class="btn-secondary" data-action="data-online-unlock" data-source-id="${escapeHTML(sourceId)}">🔑 ${escapeHTML(t('sync.online_card_unlock'))}</button>
      </div>
    `;
  }

  if (preview.encrypted && !preview.decrypted) {
    return `
      <div class="sync-card-status status-error">
        <strong>🔒 ${escapeHTML(t('sync.online_card_decrypt_failed'))}</strong>
        <div class="sync-card-meta">${escapeHTML(preview.decryptError || '')}</div>
      </div>
      <div class="sync-online-actions">
        <button class="btn-secondary" data-action="data-online-unlock" data-source-id="${escapeHTML(sourceId)}">🔑 ${escapeHTML(t('sync.online_card_unlock_retry'))}</button>
      </div>
    `;
  }

  const sStats = preview.stats.server;
  const lStats = preview.stats.local;
  const when = preview.timestamp ? formatRelativeTime(preview.timestamp) : '—';

  const statusBlock = preview.fingerprintMatches
    ? `<div class="sync-card-status status-ok">
         <strong>🟢 ${escapeHTML(t('sync.online_card_match'))}</strong>
         <div class="sync-card-meta">${escapeHTML(t('data.online_match_hint'))}</div>
       </div>`
    : `<div class="sync-card-status status-warn">
         <strong>⚠ ${escapeHTML(t('sync.online_card_drift'))}</strong>
         <div class="sync-card-meta">${escapeHTML(t('sync.online_card_fp_drift', { server: preview.fingerprint, local: preview.fingerprintLocal }))}</div>
       </div>`;

  // Personen-Diff-Liste (auf 3 begrenzt, Rest als Count)
  function formatNameList(arr) {
    if (!arr || arr.length === 0) return '—';
    const names = arr.map(p => p.name).slice(0, 3).join(', ');
    return arr.length > 3 ? names + ', +' + (arr.length - 3) : names;
  }

  const personDiffLines = (preview.onlyLocal.length > 0 || preview.onlyServer.length > 0)
    ? `
      <div class="sync-card-stats-row">
        <span class="sync-card-stats-label">${escapeHTML(t('data.online_diff_only_local'))}</span>
        <span class="sync-card-stats-value">${escapeHTML(formatNameList(preview.onlyLocal))}</span>
      </div>
      <div class="sync-card-stats-row">
        <span class="sync-card-stats-label">${escapeHTML(t('data.online_diff_only_server'))}</span>
        <span class="sync-card-stats-value">${escapeHTML(formatNameList(preview.onlyServer))}</span>
      </div>
    `
    : '';

  return `
    ${statusBlock}
    <div class="sync-card-stats">
      <div class="sync-card-stats-row">
        <span class="sync-card-stats-label">${escapeHTML(t('sync.online_card_server'))}</span>
        <span class="sync-card-stats-value"><code>v${escapeHTML(String(preview.version))}</code> · ${escapeHTML(when)} · ${escapeHTML(t('data.online_stats_brief', { persons: sStats.persons, roles: sStats.roles, levels: sStats.levels, absent: sStats.absent }))}</span>
      </div>
      <div class="sync-card-stats-row">
        <span class="sync-card-stats-label">${escapeHTML(t('data.online_local'))}</span>
        <span class="sync-card-stats-value">${escapeHTML(t('data.online_stats_brief', { persons: lStats.persons, roles: lStats.roles, levels: lStats.levels, absent: lStats.absent }))}</span>
      </div>
      ${personDiffLines}
    </div>
    <div class="data-online-actions">
      <button class="btn-secondary" data-action="data-online-pull-full" data-source-id="${escapeHTML(sourceId)}">
        ↓ ${escapeHTML(t('data.online_pull_full'))}
      </button>
      <button class="btn-secondary" data-action="data-online-push-full" data-source-id="${escapeHTML(sourceId)}">
        ↑ ${escapeHTML(t('data.online_push_full'))}
      </button>
    </div>
    <div class="data-online-action-hint">${escapeHTML(t('data.online_action_hint'))}</div>
  `;
}

async function dataOnlineRefresh(sourceId) {
  clearPreviewCache(sourceId);
  await refreshDataOnlineCard(sourceId);
}

async function dataOnlineUnlock(sourceId) {
  const src = Sync.getSource(sourceId);
  if (!src) return;
  const passphrase = await promptPassphrase(src);
  if (!passphrase) { renderDataModal(); return; }
  try {
    const saltB64 = (src.encryption || {}).salt || SyncCrypto.randomSaltB64();
    if (!(src.encryption || {}).salt) {
      Sync.updateSource(src.id, { encryption: Object.assign({}, src.encryption || {}, { enabled: true, salt: saltB64 }) });
    }
    const key = await SyncCrypto.deriveKey(passphrase, saltB64);
    Sync.setKeyForSource(src.id, key);
    Sync.setPassphraseForSource(src.id, passphrase);
    clearPreviewCache(sourceId);
    renderDataModal();
  } catch (e) {
    showToast(t('settings.sync_err_key_derive', { msg: String(e.message || e) }), 'error');
    renderDataModal();
  }
}

async function dataOnlinePullFull(sourceId) {
  const src = Sync.getSource(sourceId);
  if (!src) return;
  const preview = await getCachedPreview(sourceId);
  if (!preview || preview.reachable === false || preview.empty) {
    showToast(t('data.online_err_nothing_to_pull'), 'error');
    return;
  }

  // Bestätigungsdialog mit Diff-Summary
  const lines = [];
  if (preview.stats) {
    lines.push(t('data.online_confirm_pull_line_server', { persons: preview.stats.server.persons, roles: preview.stats.server.roles, levels: preview.stats.server.levels }));
    lines.push(t('data.online_confirm_pull_line_local',  { persons: preview.stats.local.persons,  roles: preview.stats.local.roles,  levels: preview.stats.local.levels }));
  }
  const msg = t('data.online_confirm_pull', { label: src.label }) + '\n\n' + lines.join('\n') + '\n\n' + t('data.online_confirm_irreversible');
  if (!window.confirm(msg)) return;

  showToast(t('sync.online_pulling', { label: src.label }), 'info');
  try {
    await withPassphraseRecovery(src, () => Sync.pull(sourceId, { mode: 'full' }));
    showToast(t('data.online_pulled_full', { label: src.label }), 'success');
    render();
  } catch (e) {
    showToast(t('sync.online_pull_failed', { msg: String(e.message || e) }), 'error');
  }
  clearPreviewCache(sourceId);
  const backdrop = document.getElementById('modal-backdrop');
  if (backdrop && backdrop.style.display === 'flex') renderDataModal();
}

async function dataOnlinePushFull(sourceId) {
  const src = Sync.getSource(sourceId);
  if (!src) return;
  const preview = await getCachedPreview(sourceId);

  const lines = [];
  if (preview && preview.stats) {
    lines.push(t('data.online_confirm_push_line_local',  { persons: preview.stats.local.persons,  roles: preview.stats.local.roles,  levels: preview.stats.local.levels }));
    if (!preview.empty) {
      lines.push(t('data.online_confirm_push_line_server', { persons: preview.stats.server.persons, roles: preview.stats.server.roles, levels: preview.stats.server.levels }));
    } else {
      lines.push(t('data.online_confirm_push_line_empty'));
    }
  }
  const msg = t('data.online_confirm_push', { label: src.label }) + '\n\n' + lines.join('\n') + '\n\n' + t('data.online_confirm_irreversible');
  if (!window.confirm(msg)) return;

  showToast(t('sync.online_pushing', { label: src.label }), 'info');
  try {
    await withPassphraseRecovery(src, () => Sync.push(sourceId, { mode: 'full' }));
    showToast(t('data.online_pushed_full', { label: src.label }), 'success');
  } catch (e) {
    showToast(t('sync.online_push_failed', { msg: String(e.message || e) }), 'error');
  }
  clearPreviewCache(sourceId);
  const backdrop = document.getElementById('modal-backdrop');
  if (backdrop && backdrop.style.display === 'flex') renderDataModal();
}

function handleImportFileChange(e) {
  const file = e.target.files && e.target.files[0];
  const feedback = document.getElementById('import-feedback');
  if (!file) {
    if (feedback) feedback.innerHTML = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    const fb = document.getElementById('import-feedback');
    let parsed;
    try {
      parsed = JSON.parse(ev.target.result);
    } catch (err) {
      if (fb) fb.innerHTML = `<div class="sync-error">${escapeHTML(t('data.err_invalid_json'))}</div>`;
      dataModalState.importData = null;
      dataModalState.importFileName = null;
      updateImportPreview();
      return;
    }
    try {
      validateImportPayload(parsed);
    } catch (err) {
      if (fb) fb.innerHTML = `<div class="sync-error">${escapeHTML(t('data.err_invalid_format', { reason: err.message }))}</div>`;
      dataModalState.importData = null;
      dataModalState.importFileName = null;
      updateImportPreview();
      return;
    }
    dataModalState.importData = parsed;
    dataModalState.importFileName = file.name;
    if (fb) fb.innerHTML = '';
    updateImportPreview();
  };
  reader.readAsText(file);
}

// Aktualisiert nur die Preview-Sektion unterhalb des File-Inputs,
// ohne das gesamte Modal neu zu rendern (verhindert Race-Conditions
// zwischen File-Reader-Callback und DOM-Handlern).
function updateImportPreview() {
  const body = document.getElementById('modal-body');
  if (!body) return;

  // Alte Preview entfernen
  const oldPreview = body.querySelector('.import-preview');
  if (oldPreview) oldPreview.remove();

  const parsed = dataModalState.importData;
  if (!parsed || !parsed.config) return;

  const levels = parsed.config.levels ? parsed.config.levels.length : 0;
  const roles = parsed.config.levels ? parsed.config.levels.reduce((a, l) => a + (l.roles ? l.roles.length : 0), 0) : 0;
  const persons = parsed.config.persons ? parsed.config.persons.length : 0;
  const expTime = parsed.exportedAt ? formatDateTime(parsed.exportedAt) : '—';

  const preview = document.createElement('div');
  preview.className = 'import-preview';
  preview.innerHTML = `
    <div class="sync-meta-row" style="margin-top: 12px;">
      <div class="sync-meta-item">
        <span class="sync-meta-label">${escapeHTML(t('data.stats_levels'))}</span>
        <span class="sync-meta-value">${levels}</span>
      </div>
      <div class="sync-meta-item">
        <span class="sync-meta-label">${escapeHTML(t('data.stats_roles'))}</span>
        <span class="sync-meta-value">${roles}</span>
      </div>
      <div class="sync-meta-item">
        <span class="sync-meta-label">${escapeHTML(t('data.stats_persons'))}</span>
        <span class="sync-meta-value">${persons}</span>
      </div>
    </div>
    <div class="sync-meta-item" style="margin-top: 8px;">
      <span class="sync-meta-label">${escapeHTML(dataModalState.importFileName || '')}</span>
      <span class="sync-meta-value" style="font-size: 11px;">${escapeHTML(t('data.file_info', { levels, roles, persons, time: expTime }))}</span>
    </div>
    ${parsed.runtime ? `
      <div class="form-field form-field-check" style="margin-top: 12px;">
        <label class="form-check-row">
          <input type="checkbox" id="import-overwrite-runtime" checked />
          <span>${escapeHTML(t('data.overwrite_runtime'))}</span>
        </label>
      </div>
    ` : ''}
  `;
  body.appendChild(preview);
}

function applyImport() {
  const parsed = dataModalState.importData;
  if (!parsed) {
    const feedback = document.getElementById('import-feedback');
    feedback.innerHTML = `<div class="sync-error">${escapeHTML(t('data.err_no_file'))}</div>`;
    return;
  }
  if (!confirm(t('data.confirm_import'))) return;

  // Runtime-Option
  const overwriteRuntimeEl = document.getElementById('import-overwrite-runtime');
  const overwriteRuntime = overwriteRuntimeEl ? overwriteRuntimeEl.checked : false;

  State.config = parsed.config;
  Storage.saveConfig(State.config);

  if (overwriteRuntime && parsed.runtime) {
    State.runtime = {
      unavailable: parsed.runtime.unavailable || {},
      manualAssignments: parsed.runtime.manualAssignments || {},
    };
  } else {
    State.runtime = { unavailable: {}, manualAssignments: {} };
  }
  Storage.saveRuntime(State.runtime);

  // Selektion zurücksetzen
  State.selectedPersonId = null;

  const levels = State.config.levels.length;
  const persons = State.config.persons.length;

  Storage.appendAudit({
    id: uid('a'),
    timestamp: new Date().toISOString(),
    type: 'config_edit',
    action: 'config_edit',
    detail: t('audit.config_imported') + ` (${levels} / ${persons})`,
  });

  closeModal();
  render();
  showToast(t('toast.import_done', { levels, persons }), 'success');
}

/* =========================================================================
   PRINT / PDF
   ----------------------------------------------------------------
   Drei Vorlagen (Übersicht / Rollen-Detail / Personen-Liste),
   drei Papierformate (A4 / A3 / Letter), zwei Ausrichtungen.

   Ablauf:
     1. openPrintModal() — Auswahl-Modal rendern
     2. User wählt Variante + Format + Orientierung
     3. startPrint() — Layout in #print-container rendern,
        @page-Direktive setzen, --print-scale setzen, window.print()
     4. Browser-Dialog übernimmt Drucker-/PDF-Auswahl
   ========================================================================= */

let printState = { variant: 'overview', format: 'a4', orientation: 'landscape' };

// Kartenabmessungen der gewählten Kombis — grob, fürs Skalieren der Schrift
const PAPER_MM = {
  a4:     { w: 210, h: 297 },
  a3:     { w: 297, h: 420 },
  letter: { w: 216, h: 279 },
};

function openPrintModal() {
  const saved = State.prefs.printState;
  if (saved && saved.variant && saved.format && saved.orientation) {
    printState = { ...saved };
  }
  renderPrintModal();
  document.getElementById('modal-backdrop').style.display = 'flex';
}

function renderPrintModal() {
  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');

  title.textContent = t('print.title');

  const variantOptions = [
    { v: 'overview', labelKey: 'print.variant_overview', hintKey: 'print.variant_overview_hint' },
    { v: 'detail',   labelKey: 'print.variant_detail',   hintKey: 'print.variant_detail_hint' },
    { v: 'persons',  labelKey: 'print.variant_persons',  hintKey: 'print.variant_persons_hint' },
  ];
  const formatOptions = [
    { f: 'a4',     label: 'A4' },
    { f: 'a3',     label: 'A3' },
    { f: 'letter', label: 'Letter' },
  ];
  const orientationOptions = [
    { o: 'landscape', labelKey: 'print.orientation_landscape' },
    { o: 'portrait',  labelKey: 'print.orientation_portrait' },
  ];

  body.innerHTML = `
    <div class="sync-explain">${escapeHTML(t('print.intro'))}</div>

    <div class="form-field" style="margin-top: 14px;">
      <label class="form-label">${escapeHTML(t('print.variant_label'))}</label>
      <div class="print-variant-group">
        ${variantOptions.map(o => `
          <label class="print-variant-row">
            <input type="radio" name="print-variant" value="${o.v}" ${printState.variant === o.v ? 'checked' : ''} />
            <div class="print-variant-text">
              <div class="print-variant-title">${escapeHTML(t(o.labelKey))}</div>
              <div class="print-variant-hint">${escapeHTML(t(o.hintKey))}</div>
            </div>
          </label>
        `).join('')}
      </div>
    </div>

    <div class="form-row" style="display: flex; gap: 12px; margin-top: 12px;">
      <div class="form-field" style="flex: 1;">
        <label class="form-label" for="print-format">${escapeHTML(t('print.format_label'))}</label>
        <select id="print-format" class="form-select">
          ${formatOptions.map(o => `<option value="${o.f}" ${printState.format === o.f ? 'selected' : ''}>${escapeHTML(o.label)}</option>`).join('')}
        </select>
      </div>
      <div class="form-field" style="flex: 1;">
        <label class="form-label" for="print-orientation">${escapeHTML(t('print.orientation_label'))}</label>
        <select id="print-orientation" class="form-select">
          ${orientationOptions.map(o => `<option value="${o.o}" ${printState.orientation === o.o ? 'selected' : ''}>${escapeHTML(t(o.labelKey))}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="sync-explain" style="margin-top: 12px; font-size: 11px;">
      ${escapeHTML(t('print.hint_dialog'))}
    </div>
  `;
  footer.innerHTML = `
    <button class="btn-secondary" data-action="modal-cancel">${escapeHTML(t('btn.cancel'))}</button>
    <button class="btn-primary" data-action="print-start">${escapeHTML(t('print.btn_print'))}</button>
  `;

  // Radio-Handler — kein Dispatcher, direkter change-Listener
  body.querySelectorAll('input[name="print-variant"]').forEach(r => {
    r.addEventListener('change', () => { printState.variant = r.value; });
  });
  document.getElementById('print-format').addEventListener('change', (e) => {
    printState.format = e.target.value;
  });
  document.getElementById('print-orientation').addEventListener('change', (e) => {
    printState.orientation = e.target.value;
  });
}

function startPrint() {
  try {
    // Auswahl persistieren
    State.prefs.printState = { ...printState };
    Storage.savePrefs(State.prefs);

    // 1. @page-Direktive setzen
    applyPrintPageStyle(printState.format, printState.orientation);

    // 2. Container befüllen
    const container = document.getElementById('print-container');
    container.innerHTML = buildPrintHTML(printState.variant, printState.format, printState.orientation);

    // 3. Modal schließen — Backdrop sofort ausblenden (keine State-Reset-Kaskade,
    //    weil wir im User-Click-Kontext bleiben müssen für window.print())
    document.getElementById('modal-backdrop').style.display = 'none';

    // 4. Synchron drucken — KEIN setTimeout! Sonst verliert Safari/iOS den
    //    user-initiated-action-Kontext und blockiert den Druckdialog still.
    window.print();
  } catch (err) {
    console.error('Print-Fehler:', err);
    showToast('Druckfehler: ' + (err.message || err), 'warning');
  }
}

function applyPrintPageStyle(format, orientation) {
  let styleEl = document.getElementById('print-page-size');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'print-page-size';
    document.head.appendChild(styleEl);
  }
  const sizeMap = { a4: 'A4', a3: 'A3', letter: 'letter' };
  const paperSize = sizeMap[format] || 'A4';
  // Zweistufige Margin-Strategie:
  //  1. @page { margin: 18mm } — wenn der Browser das respektiert, hat
  //     jeder Seitenumbruch sauber 18mm Rand, auch bei Mehrseitigkeit.
  //  2. #print-container padding 5mm — kleiner Puffer, falls der User
  //     im Druckdialog „Ränder: Keine/Minimum" wählt. Dann kommt der
  //     Inhalt wenigstens nicht bündig am Rand.
  // Ergebnis: Default (beide greifen) = 23mm, User mit „Keine" = 5mm.
  styleEl.textContent = `@media print {
    @page {
      size: ${paperSize} ${orientation};
      margin: 18mm;
    }
  }`;
}

function computePrintScale(format, orientation) {
  // Referenz: A4 = 1.0. Bei größerem Papier skaliert die Schrift mit der
  // kleineren Papierdimension (denn Landscape A3 ist 297×420, wir wollen
  // dass die Schrift sich nach der „kurzen" Seite richtet, damit die Spalten
  // sinnvoll breit bleiben)
  const paper = PAPER_MM[format] || PAPER_MM.a4;
  const shortSide = Math.min(paper.w, paper.h);  // A4: 210, A3: 297, Letter: 216
  // A4 als Referenz = 210mm → scale 1.0
  const scale = shortSide / 210;
  // Begrenze auf sinnvollen Rahmen
  return Math.max(0.85, Math.min(1.6, scale));
}

function computeOverviewColumns(format, orientation, totalRoles) {
  // Ziel: alles auf eine Seite. Schätzt sinnvolle Spaltenzahl
  // basierend auf Breite (landscape → breitere Seite).
  const paper = PAPER_MM[format] || PAPER_MM.a4;
  const usableW = orientation === 'landscape' ? paper.h - 36 : paper.w - 36; // 18mm margin l+r
  // Pro Spalte sollen ca. 60mm Breite sein für gute Lesbarkeit
  const targetColW = 62;
  let cols = Math.max(1, Math.floor(usableW / targetColW));
  // Wenn wenige Rollen → weniger Spalten
  if (totalRoles > 0 && totalRoles < cols) cols = totalRoles;
  return Math.min(cols, 6);
}

function buildPrintHTML(variant, format, orientation) {
  // Defensiv: Occupancy frisch berechnen, falls render() noch nie lief
  // oder die Daten aus irgendeinem Grund stale sind
  if (!State.occupancy || Object.keys(State.occupancy).length === 0) {
    State.occupancy = resolveOccupancy(State.config, State.runtime);
  }

  const scale = computePrintScale(format, orientation);
  const fingerprint = computeConfigHash(State.config);
  const printedAt = formatDateTime(new Date().toISOString());
  const meta = State.config.meta || {};
  const orgName = meta.organizationName || '';
  // Drucktitel: explizit konfiguriert → nehmen. Sonst Default-Übersetzung.
  const printTitle = (meta.printTitle || '').trim() || t('print.header_title_default');

  const headerHTML = `
    <div class="p-header">
      <div class="p-header-main">
        <div class="p-h1">${escapeHTML(printTitle)}</div>
        ${orgName ? `<div class="p-small">${escapeHTML(orgName)}</div>` : ''}
      </div>
      <div class="p-header-meta">
        <div><strong>${escapeHTML(t('print.header_printed'))}:</strong> ${escapeHTML(printedAt)}</div>
        <div><strong>${escapeHTML(t('print.header_fingerprint'))}:</strong> <code>${escapeHTML(fingerprint)}</code></div>
      </div>
    </div>
  `;

  let contentHTML = '';
  if (variant === 'overview') {
    contentHTML = buildPrintOverview(format, orientation);
  } else if (variant === 'detail') {
    contentHTML = buildPrintDetail();
  } else if (variant === 'persons') {
    contentHTML = buildPrintPersons();
  }

  return `
    <div style="--print-scale: ${scale};" class="p-${variant}">
      ${headerHTML}
      ${contentHTML}
    </div>
  `;
}

function buildPrintOverview(format, orientation) {
  const totalRoles = State.config.levels.reduce((a, l) => a + l.roles.length, 0);
  const cols = computeOverviewColumns(format, orientation, State.config.levels.length);

  // Pro Level ein Block mit den Rollen drin. Wir packen die Level in
  // ein Grid mit auto-berechneter Spaltenzahl.
  const levelsHTML = State.config.levels.map(level => {
    const rolesHTML = level.roles.map(role => {
      const occ = State.occupancy[role.id];
      let personName = '';
      let phone = '';
      let subHint = '';
      let unoccupied = false;

      if (occ && occ.personId) {
        const person = findPerson(occ.personId);
        personName = person ? person.name : '?';
        phone = person && person.phone ? person.phone : '';
        if (occ.rank > 0) {
          // Vertretung aktiv — Hinweis auf den eigentlich Primären
          const primary = role.assignments.find(a => a.rank === 0);
          const primaryPerson = primary ? findPerson(primary.personId) : null;
          if (primaryPerson) {
            subHint = t('print.currently_absent_note', { name: primaryPerson.name });
          }
        } else if (occ.manual) {
          subHint = '🔒 ' + t('manual.badge');
        }
      } else {
        personName = t('print.no_person');
        unoccupied = true;
      }

      const critBadge = role.critical
        ? `<span class="p-critical-badge">${escapeHTML(t('print.critical_marker'))}</span>`
        : '';

      return `
        <div class="p-role-card" data-critical="${role.critical || false}">
          <div class="p-role-name">${escapeHTML(role.name)}${critBadge ? ' ' + critBadge : ''}</div>
          <div class="p-role-person"${unoccupied ? ' data-unoccupied="true"' : ''}>${escapeHTML(personName)}</div>
          ${phone ? `<div class="p-role-phone">${escapeHTML(phone)}</div>` : ''}
          ${subHint ? `<div class="p-role-sub-hint">${escapeHTML(subHint)}</div>` : ''}
        </div>
      `;
    }).join('');

    return `
      <div class="p-level-block">
        <div class="p-level-name">${escapeHTML(level.name)}</div>
        ${rolesHTML}
      </div>
    `;
  }).join('');

  return `
    <div class="p-levels-grid" style="--p-cols: ${cols};">
      ${levelsHTML}
    </div>
  `;
}

function buildPrintDetail() {
  const levelsHTML = State.config.levels.map((level, lIdx) => {
    const rolesHTML = level.roles.map(role => {
      const occ = State.occupancy[role.id];

      // Vollständige Kette — der aktive Eintrag ist hervorgehoben,
      // das ist die einzige Darstellung (keine redundante Current-Zeile
      // darüber, die zu Inkonsistenzen im Layout geführt hat).
      let chainHTML = '';
      if (role.assignments.length === 0) {
        chainHTML = `<div class="p-no-chain"><em>${escapeHTML(t('print.no_substitution'))}</em></div>`;
      } else {
        const sortedAssignments = [...role.assignments].sort((a, b) => a.rank - b.rank);
        chainHTML = `<ul class="p-chain-list">` + sortedAssignments.map(a => {
          const p = findPerson(a.personId);
          const isAbsent = !!(State.runtime.unavailable && State.runtime.unavailable[a.personId]);
          const isActive = occ && occ.personId === a.personId && !occ.manual;
          const rankLbl = a.rank === 0
            ? t('print.rank_primary')
            : t('print.rank_substitute', { n: a.rank });
          const absentTag = isAbsent
            ? `<span class="p-absent-tag">${escapeHTML(t('print.status_absent'))}</span>`
            : '';
          const contact = p && p.phone ? p.phone : '';
          return `
            <li class="p-chain-item" data-absent="${isAbsent}" data-active="${isActive}">
              <span class="p-chain-rank">${escapeHTML(rankLbl)}</span>
              <span class="p-chain-name">${escapeHTML(p ? p.name : '?')}${absentTag}</span>
              <span class="p-chain-contact">${escapeHTML(contact)}</span>
            </li>
          `;
        }).join('') + `</ul>`;
      }

      // Manuelle Zuordnung: separater Hinweis über der Kette, da sie
      // nicht Teil der assignments ist, aber der aktuell Besetzende.
      let manualNote = '';
      if (occ && occ.manual && occ.personId) {
        const mp = findPerson(occ.personId);
        const mphone = mp && mp.phone ? ' — ' + mp.phone : '';
        manualNote = `
          <div class="p-detail-manual-note">
            🔒 ${escapeHTML(t('manual.badge'))}: <strong>${escapeHTML(mp ? mp.name : '?')}</strong>${escapeHTML(mphone)}
          </div>
        `;
      }

      // Rollen ohne jegliche Besetzung und ohne Kette
      let emptyNote = '';
      if (!occ && role.assignments.length === 0) {
        emptyNote = `<div class="p-no-chain"><em>${escapeHTML(t('print.no_person'))}</em></div>`;
      }

      const critBadge = role.critical
        ? `<span class="p-critical-badge">${escapeHTML(t('print.critical_marker'))}</span>`
        : '';

      return `
        <div class="p-detail-role" data-critical="${role.critical || false}">
          <div class="p-detail-role-head">
            <div class="p-detail-role-name">${escapeHTML(role.name)}</div>
            ${critBadge}
          </div>
          ${role.description ? `<div class="p-small" style="margin-bottom: 3pt;">${escapeHTML(role.description)}</div>` : ''}
          ${manualNote}
          ${chainHTML || emptyNote}
        </div>
      `;
    }).join('');

    return `
      <div class="p-level-section">
        <div class="p-h2">${escapeHTML(t('print.level_prefix'))} ${lIdx + 1} — ${escapeHTML(level.name)}</div>
        ${rolesHTML}
      </div>
    `;
  }).join('');

  return levelsHTML;
}

function buildPrintPersons() {
  const allPersons = [...State.config.persons].sort((a, b) =>
    a.name.localeCompare(b.name, State.language || 'de')
  );

  // Abwesend oben, verfügbar unten
  const absentPersons = allPersons.filter(p => State.runtime.unavailable && State.runtime.unavailable[p.id]);
  const availablePersons = allPersons.filter(p => !(State.runtime.unavailable && State.runtime.unavailable[p.id]));

  const buildRow = (p) => {
    const roles = getRolesForPerson(p.id);
    const absent = !!(State.runtime.unavailable && State.runtime.unavailable[p.id]);
    const absence = absent ? State.runtime.unavailable[p.id] : null;

    const rolesHTML = roles.length === 0
      ? `<span class="p-small"><em>${escapeHTML(t('print.persons_no_roles'))}</em></span>`
      : roles.map(r => {
          const rankLbl = r.rank === 0
            ? t('print.rank_primary')
            : t('print.rank_substitute', { n: r.rank });
          return `<span class="p-person-role-chip">${escapeHTML(r.role.name)} · ${escapeHTML(rankLbl)}</span>`;
        }).join('');

    const absenceInfo = absence
      ? ` <span class="p-small">(${escapeHTML(categoryLabel(absence.category))}${absence.note ? ' — ' + escapeHTML(absence.note) : ''})</span>`
      : '';

    return `
      <div class="p-person-row" data-absent="${absent}">
        <div class="p-person-main">
          <div class="p-person-name" data-absent="${absent}">${escapeHTML(p.name)}${absenceInfo}</div>
          <div class="p-person-contact">${p.phone ? escapeHTML(p.phone) : ''}${p.phone && p.email ? ' · ' : ''}${p.email ? escapeHTML(p.email) : ''}</div>
        </div>
        <div class="p-person-roles">
          <span class="p-small">${escapeHTML(t('print.persons_roles_label'))}:</span> ${rolesHTML}
        </div>
      </div>
    `;
  };

  let html = '';
  if (absentPersons.length > 0) {
    html += `
      <div class="p-person-section">
        <div class="p-h2">${escapeHTML(t('print.persons_absent_section'))} (${absentPersons.length})</div>
        ${absentPersons.map(buildRow).join('')}
      </div>
    `;
  }
  html += `
    <div class="p-person-section">
      <div class="p-h2">${escapeHTML(t('print.persons_available_section'))} (${availablePersons.length})</div>
      ${availablePersons.map(buildRow).join('')}
    </div>
  `;
  return html;
}

/* =========================================================================
   ALLGEMEINE EINSTELLUNGEN (META / TITEL)
   ----------------------------------------------------------------
   Zugänglich nur im Edit-Modus. Bearbeitbar: Organisationsname und
   Drucktitel. Werden in config.meta gespeichert und sind damit Teil
   der Config (Sync / Export enthält sie automatisch).
   ========================================================================= */
/* Settings-Modal mit Tabs (V1.2):
   - 'general': Organisationsname + Drucktitel
   - 'sync':    Sync-Sources verwalten (CRUD)
   - 'about':   Version, Projekt, Lizenz
   Der module-state hält den aktiven Tab und ggf. die laufende Form-Aktion
   im sync-Tab fest; jeder Render baut die UI neu auf. */
let settingsState = {
  activeTab: 'general',
  editingSourceId: null,
  formMode: null,         // 'add' | 'edit' | null
  formSourceType: null,   // 'http' | 'fileSystem'
};

function openSettingsModal() {
  settingsState = {
    activeTab: 'general', editingSourceId: null, formMode: null, formSourceType: null,
  };
  renderSettingsModal();
}

function switchSettingsTab(tab) {
  settingsState.activeTab = tab;
  settingsState.editingSourceId = null;
  settingsState.formMode = null;
  settingsState.formSourceType = null;
  delete settingsState._pendingDirHandle;
  delete settingsState._pendingDirName;
  renderSettingsModal();
}

function renderSettingsModal() {
  const title = document.getElementById('modal-title');
  const body  = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');

  title.textContent = t('settings.title');

  const tabs = [
    { id: 'general', label: t('settings.tab_general') },
    { id: 'sync',    label: t('settings.tab_sync') },
    { id: 'about',   label: t('settings.tab_about') },
  ];

  const tabsHTML = `
    <div class="settings-tabs" role="tablist">
      ${tabs.map(tab => `
        <button class="settings-tab" data-action="settings-tab" data-tab="${escapeHTML(tab.id)}"
                data-active="${settingsState.activeTab === tab.id}">
          ${escapeHTML(tab.label)}
        </button>
      `).join('')}
    </div>
  `;

  let panelHTML;
  if (settingsState.activeTab === 'general')      panelHTML = renderSettingsGeneral();
  else if (settingsState.activeTab === 'sync')    panelHTML = renderSettingsSync();
  else                                            panelHTML = renderSettingsAbout();

  body.innerHTML = tabsHTML + '<div class="settings-panel">' + panelHTML + '</div>';

  // Footer per Tab:
  // - 'general' hat Save-Button (für Org-Name / Print-Title)
  // - 'sync' und 'about' sind self-contained / read-only → nur Close
  if (settingsState.activeTab === 'general') {
    footer.innerHTML = `
      <button class="btn-secondary" data-action="modal-cancel">${escapeHTML(t('btn.cancel'))}</button>
      <button class="btn-primary" data-action="settings-save">${escapeHTML(t('settings.save'))}</button>
    `;
  } else {
    footer.innerHTML = `
      <button class="btn-secondary" data-action="modal-cancel">${escapeHTML(t('btn.close'))}</button>
    `;
  }

  document.getElementById('modal-backdrop').style.display = 'flex';

  // Auto-focus + Listener für Auth-Type-Select (change-Event ist nicht im
  // CLICK_HANDLERS-Dispatcher abgedeckt)
  if (settingsState.activeTab === 'general') {
    setTimeout(() => {
      const el = document.getElementById('settings-org-name');
      if (el) el.focus();
    }, 50);
  } else if (settingsState.activeTab === 'sync' && settingsState.formMode) {
    const authSel = document.getElementById('sync-form-auth');
    if (authSel) authSel.addEventListener('change', syncFormAuthChanged);
    const encChk = document.getElementById('sync-form-enc-enabled');
    if (encChk) encChk.addEventListener('change', syncFormEncToggled);
    setTimeout(() => {
      const labelEl = document.getElementById('sync-form-label');
      if (labelEl) labelEl.focus();
    }, 50);
  }
}

function renderSettingsGeneral() {
  const meta = State.config.meta || {};
  const orgName = meta.organizationName || '';
  const printTitle = meta.printTitle || '';

  return `
    <div class="sync-explain">${escapeHTML(t('settings.intro'))}</div>

    <div class="form-field" style="margin-top: 14px;">
      <label class="form-label" for="settings-org-name">${escapeHTML(t('settings.field_org_name'))}</label>
      <input type="text" id="settings-org-name" class="form-input"
             value="${escapeHTML(orgName)}"
             placeholder="${escapeHTML(t('settings.placeholder_org_name'))}"
             autocomplete="off" />
      <div class="form-hint">${escapeHTML(t('settings.field_org_name_hint'))}</div>
    </div>

    <div class="form-field" style="margin-top: 12px;">
      <label class="form-label" for="settings-print-title">${escapeHTML(t('settings.field_print_title'))}</label>
      <input type="text" id="settings-print-title" class="form-input"
             value="${escapeHTML(printTitle)}"
             placeholder="${escapeHTML(t('settings.placeholder_print_title'))}"
             autocomplete="off" />
      <div class="form-hint">${escapeHTML(t('settings.field_print_title_hint'))}</div>
    </div>
  `;
}

function getBrowserSupport() {
  // Sammelt Feature-Detection-Ergebnisse für V1.2-relevante APIs.
  // Wird vom Browser-Warnungs-Banner und von den Backend-Initialisierungen
  // gleichermaßen genutzt.
  const fs = typeof window.showDirectoryPicker === 'function';
  const bd = typeof window.BarcodeDetector === 'function';
  const wc = !!(window.crypto && window.crypto.subtle);
  // Browser-Family für die Banner-Texte. Wir wollen NICHT spezifisch Firefox
  // outen, sondern beschreiben das fehlende Feature — aber bei Firefox liefert
  // userAgent das Hinweis-Token, was die Doku-Verweise zielgenauer macht.
  const ua = navigator.userAgent || '';
  const isFirefox = /Firefox/i.test(ua) && !/Seamonkey/i.test(ua);
  const isSafari = /Safari/i.test(ua) && !/Chrome|Chromium|Edg/i.test(ua);
  return { fileSystemAccess: fs, barcodeDetector: bd, webCrypto: wc, isFirefox, isSafari };
}

function renderBrowserSupportBanner() {
  const sup = getBrowserSupport();
  const limits = [];
  if (!sup.fileSystemAccess) limits.push(t('browser.limit_fs'));
  if (!sup.barcodeDetector) limits.push(t('browser.limit_qr'));
  if (limits.length === 0) return '';

  const lead = sup.isFirefox
    ? t('browser.lead_firefox')
    : (sup.isSafari ? t('browser.lead_safari') : t('browser.lead_generic'));

  return `
    <div class="browser-support-banner" role="status">
      <strong>${escapeHTML(t('browser.banner_title'))}</strong>
      <div class="browser-banner-lead">${escapeHTML(lead)}</div>
      <ul class="browser-banner-list">
        ${limits.map(l => `<li>${escapeHTML(l)}</li>`).join('')}
      </ul>
      <div class="browser-banner-foot">${escapeHTML(t('browser.banner_workaround'))}</div>
    </div>
  `;
}

/* V2.0 step 1: informational banner shown to V1.3 upgraders once.
   - Triggers when state.auto.migratedAt is set (set by Sync._migrate() on
     first load with existing sources) AND not yet dismissed.
   - Fresh installs never see it because migratedAt stays null.
   - Returns '' when not applicable so it can be inlined unconditionally. */
function renderSyncMigrationBanner() {
  // Read through the public API. load() is safe because _migrate is
  // idempotent — calling it during a render is cheap.
  const s = (typeof Sync.load === 'function') ? Sync.load() : null;
  const auto = s && s.auto ? s.auto : null;
  if (!auto || !auto.migratedAt || auto.migrationBannerDismissed) return '';
  return `
    <div class="sync-migration-banner" role="status">
      <strong>${escapeHTML(t('sync.migration_banner.title'))}</strong>
      <div class="sync-migration-banner-body">${escapeHTML(t('sync.migration_banner.body'))}</div>
      <div class="sync-migration-banner-actions">
        <button class="btn-secondary" data-action="sync-migration-open-settings">${escapeHTML(t('sync.migration_banner.cta_settings'))}</button>
        <button class="btn-ghost" data-action="sync-migration-dismiss">${escapeHTML(t('sync.migration_banner.dismiss'))}</button>
      </div>
    </div>
  `;
}

function renderSettingsSync() {
  const sources = Sync.listSources();
  // Banner order (V2.0 step 1 polish): both hint boxes grouped at the top
  // (migration -> browser-support), then the explanatory prose below.
  let html = renderSyncMigrationBanner();
  html += renderBrowserSupportBanner();
  html += `<div class="sync-explain">${escapeHTML(t('settings.sync_intro'))}</div>`;

  if (settingsState.formMode) {
    html += '<div style="margin-top: 12px;">' + renderSyncForm() + '</div>';
  }

  if (sources.length === 0) {
    if (!settingsState.formMode) {
      html += `<div class="sync-no-sources" style="margin-top: 12px;">${escapeHTML(t('settings.sync_no_sources'))}</div>`;
    }
  } else {
    html += `<div class="sync-source-list" style="margin-top: 12px;">`;
    sources.forEach(s => {
      const cfg = s.config || {};
      let metaLine;
      if (s.type === 'http') {
        metaLine = cfg.url || '';
      } else if (s.type === 'fileSystem') {
        metaLine = (cfg.dirName || '?') + '/' + (cfg.fileName || 'cram-sync.json');
      } else {
        metaLine = '';
      }
      const typeLabel = t('settings.sync_type_' + s.type) || s.type;
      html += `
        <div class="sync-source-row">
          <span class="sync-source-type-badge">${escapeHTML(typeLabel)}</span>
          <div class="sync-source-info">
            <div class="sync-source-label">${escapeHTML(s.label)}</div>
            <div class="sync-source-meta">${escapeHTML(metaLine)}</div>
          </div>
          <div class="sync-source-actions">
            <button data-action="sync-share-source" data-source-id="${escapeHTML(s.id)}">${escapeHTML(t('settings.sync_btn_share'))}</button>
            <button data-action="sync-edit-source" data-source-id="${escapeHTML(s.id)}">${escapeHTML(t('settings.sync_btn_edit'))}</button>
            <button class="danger" data-action="sync-delete-source" data-source-id="${escapeHTML(s.id)}" data-label="${escapeHTML(s.label)}">${escapeHTML(t('settings.sync_btn_delete'))}</button>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  if (!settingsState.formMode) {
    const fsSupported = typeof window.showDirectoryPicker === 'function';
    html += `
      <div class="sync-add-buttons" style="margin-top: 12px;">
        <button class="btn-secondary" data-action="sync-add-http">+ ${escapeHTML(t('settings.sync_add_http'))}</button>
        <button class="btn-secondary" data-action="sync-add-fs" ${fsSupported ? '' : 'disabled title="' + escapeHTML(t('settings.sync_add_fs_unsupported')) + '"'}>+ ${escapeHTML(t('settings.sync_add_fs'))}</button>
        <button class="btn-secondary" data-action="sync-import-bundle">⇩ ${escapeHTML(t('settings.sync_import_bundle'))}</button>
      </div>
    `;
  }

  return html;
}

function renderSyncForm() {
  const isEdit = settingsState.formMode === 'edit';
  const src = isEdit ? Sync.getSource(settingsState.editingSourceId) : null;
  const sourceType = isEdit
    ? (src ? src.type : 'http')
    : (settingsState.formSourceType || 'http');

  if (sourceType === 'fileSystem') return renderSyncFormFs(src);
  return renderSyncFormHttp(src);
}

function renderSyncFormHttp(src) {
  const isEdit = !!src;
  const cfg = src ? (src.config || {}) : {};
  const enc = src ? (src.encryption || {}) : { enabled: true };
  const label = src ? src.label : '';
  const url = cfg.url || '';
  const authType = cfg.authType || 'none';
  const encEnabled = enc.enabled !== false;  // default true
  const hasExistingKey = isEdit && src && Sync.hasKeyForSource(src.id);
  const titleKey = isEdit ? 'settings.sync_form_edit_title' : 'settings.sync_form_add_title';
  const saveKey  = isEdit ? 'settings.sync_btn_save_edit'   : 'settings.sync_btn_save_new';

  return `
    <div class="sync-form">
      <div style="font-weight: 600; font-size: 13px;">${escapeHTML(t(titleKey))}</div>

      <div class="form-field">
        <label class="form-label" for="sync-form-label">${escapeHTML(t('settings.sync_field_label'))}</label>
        <input type="text" id="sync-form-label" class="form-input" value="${escapeHTML(label)}"
               placeholder="${escapeHTML(t('settings.sync_field_label_placeholder'))}" autocomplete="off" />
      </div>

async function syncFormSave() {
  const label = (document.getElementById('sync-form-label').value || '').trim();
  const isEdit = settingsState.formMode === 'edit' && settingsState.editingSourceId;
  const existingSrc = isEdit ? Sync.getSource(settingsState.editingSourceId) : null;
  const sourceType = isEdit
    ? (existingSrc ? existingSrc.type : 'http')
    : (settingsState.formSourceType || 'http');

  // Pro Source-Typ unterschiedliche Config zusammensetzen
  let config;
  if (sourceType === 'fileSystem') {
    const fileName = (document.getElementById('sync-form-filename').value || '').trim() || 'cram-sync.json';
    let dirHandle = settingsState._pendingDirHandle || null;
    let dirName;
    if (dirHandle) {
      dirName = dirHandle.name;
    } else if (isEdit && existingSrc) {
      dirName = (existingSrc.config || {}).dirName;
    }
    if (!isEdit && !dirHandle) {
      showToast(t('settings.sync_fs_err_no_dir'), 'error');
      return;
    }
    if (!/^[\w.\-]+\.json$/i.test(fileName)) {
      showToast(t('settings.sync_fs_err_bad_filename'), 'error');
      return;
    }
    config = { fileName, dirName: dirName || '' };
  } else {
    const url = (document.getElementById('sync-form-url').value || '').trim();
    const authType = (document.getElementById('sync-form-auth').value || 'none');
    if (!url) {
      showToast(t('settings.sync_err_url_required'), 'error');
      return;
    }
    if (!/^https?:\/\//i.test(url)) {
      showToast(t('settings.sync_err_url_invalid'), 'error');
      return;
    }
    config = { url };
    if (authType === 'basic') {
      const user = (document.getElementById('sync-form-user').value || '').trim();
      const pass = (document.getElementById('sync-form-pass').value || '');
      if (!user) {
        showToast(t('settings.sync_err_user_required'), 'error');
        return;
      }
      config.authType = 'basic';
      config.authUser = user;
      config.authPass = pass;
    } else if (authType === 'bearer') {
      const token = (document.getElementById('sync-form-token').value || '').trim();
      if (!token) {
        showToast(t('settings.sync_err_token_required'), 'error');
        return;
      }
      config.authType = 'bearer';
      config.authToken = token;
    } else {
      config.authType = 'none';
    }
  }

  // Encryption setup (gemeinsam für beide Source-Typen)
  const encEnabled = document.getElementById('sync-form-enc-enabled').checked;
  const passphraseInput = document.getElementById('sync-form-passphrase');
  const passphrase = passphraseInput ? (passphraseInput.value || '') : '';
  const confirmInput = document.getElementById('sync-form-passphrase-confirm');
  const confirmPassphrase = confirmInput ? (confirmInput.value || '') : '';

  const existingEnc = existingSrc ? (existingSrc.encryption || {}) : {};
  const hadKeyAlready = isEdit && Sync.hasKeyForSource(settingsState.editingSourceId);

  let encryption;
  if (!encEnabled) {
    // Klartext-Modus
    encryption = { enabled: false };
    if (isEdit) Sync.clearKeyForSource(settingsState.editingSourceId);
  } else if (isEdit && hadKeyAlready && !passphrase) {
    // Edit ohne neue Passphrase → bestehender Salt+Key bleibt erhalten
    encryption = Object.assign({}, existingEnc, { enabled: true });
  } else {
    // Neue Source ODER Edit mit neuer Passphrase → Passphrase pflicht
    if (!passphrase) {
      showToast(t('settings.sync_err_passphrase_required'), 'error');
      return;
    }
    if (!isEdit && passphrase !== confirmPassphrase) {
      showToast(t('settings.sync_err_passphrase_mismatch'), 'error');
      return;
    }
    if (passphrase.length < 8) {
      showToast(t('settings.sync_err_passphrase_short'), 'error');
      return;
    }
    // Salt: bei neuer Passphrase oder neuer Source → frisch generieren.
    // (Bei neuer Passphrase darf der alte Salt nicht recycled werden, sonst
    // wäre die alte Server-Datei unlesbar mit dem neuen Schlüssel und der
    // User würde nicht merken, dass es zwei Schlüssel-Sätze gibt.)
    const saltB64 = SyncCrypto.randomSaltB64();
    try {
      const cryptoKey = await SyncCrypto.deriveKey(passphrase, saltB64);
      encryption = { enabled: true, salt: saltB64 };
      // Key-Cache erst nach erfolgreichem Save setzen — Source-ID brauchen wir
      // dafür, daher unten nach add/update.
      settingsState._pendingKey = cryptoKey;
      settingsState._pendingPassphrase = passphrase;
    } catch (e) {
      showToast(t('settings.sync_err_key_derive', { msg: String(e.message || e) }), 'error');
      return;
    }
  }

  const fallbackLabel = t(sourceType === 'fileSystem'
    ? 'settings.sync_field_label_placeholder_fs'
    : 'settings.sync_field_label_placeholder');
  let savedSource;
  if (isEdit) {
    savedSource = Sync.updateSource(settingsState.editingSourceId, {
      label: label || fallbackLabel,
      config,
      encryption,
    });
    showToast(t('toast.sync_source_updated'), 'success');
  } else {
    savedSource = Sync.addSource({
      type: sourceType,
      label: label || fallbackLabel,
      config,
      encryption,
    });
    // Poller-Wiring nun zentral in Sync.addSource()
    showToast(t('toast.sync_source_added'), 'success');
  }

  // Cached key + passphrase nach erfolgreichem Save anlegen (falls gesetzt)
  if (settingsState._pendingKey && savedSource) {
    Sync.setKeyForSource(savedSource.id, settingsState._pendingKey);
    delete settingsState._pendingKey;
  }
  if (settingsState._pendingPassphrase && savedSource) {
    Sync.setPassphraseForSource(savedSource.id, settingsState._pendingPassphrase);
    delete settingsState._pendingPassphrase;
  }

  // Directory-Handle in IndexedDB persistieren (nur fileSystem)
  if (sourceType === 'fileSystem' && settingsState._pendingDirHandle && savedSource) {
    try {
      await SyncFileStore.setHandle(savedSource.id, settingsState._pendingDirHandle);
    } catch (e) {
      showToast(t('settings.sync_fs_err_handle_save', { msg: String(e.message || e) }), 'error');
    }
  }

  settingsState.formMode = null;
  settingsState.editingSourceId = null;
  settingsState.formSourceType = null;
  delete settingsState._pendingDirHandle;
  delete settingsState._pendingDirName;
  renderSettingsModal();
}

async function syncDeleteSource(sourceId, label) {
  const msg = t('settings.sync_delete_confirm', { label: label || '' });
  if (!window.confirm(msg)) return;
  const src = Sync.getSource(sourceId);
  // Poller-Wiring nun zentral in Sync.removeSource() (räumt vor Mutation auf)
  Sync.removeSource(sourceId);
  // Bei fileSystem: zusätzlich den DirectoryHandle aus IndexedDB entfernen.
  if (src && src.type === 'fileSystem') {
    try { await SyncFileStore.removeHandle(sourceId); } catch (e) { /* ignore */ }
  }
  showToast(t('toast.sync_source_deleted'), 'success');
  renderSettingsModal();
}

/* =========================================================================
   SYNC-BUNDLE SHARE / IMPORT FLOWS (V1.2 Phase 3.3)
   Beide Flows nutzen das gleiche Modal-Backdrop, ersetzen kurzzeitig den
   Settings-Modal-Inhalt, und kehren nach Close zum Settings → Sync-Tab
   zurück.
   ========================================================================= */

let bundleShareState = { sourceId: null, bundle: null, json: null };

async function openSyncShareModal(sourceId) {
  bundleShareState = { sourceId, bundle: null, json: null };
  const src = Sync.getSource(sourceId);
  if (!src) { showToast('Source not found', 'error'); return; }

  // Wenn Verschlüsselung aktiv und Passphrase nicht im Cache → prompten
  if (Sync.isEncryptionEnabled(src) && !Sync.hasPassphraseForSource(sourceId)) {
    const passphrase = await promptPassphrase(src);
    if (!passphrase) { renderSettingsModal(); return; }
    // Verify by deriving and comparing — wir vergleichen Keys nicht direkt,
    // sondern speichern beide ein und vertrauen, dass die Passphrase richtig
    // war. Falls falsch, würde der Empfänger ein Decryption-Failure sehen.
    try {
      const saltB64 = (src.encryption || {}).salt;
      const key = await SyncCrypto.deriveKey(passphrase, saltB64);
      Sync.setKeyForSource(sourceId, key);
      Sync.setPassphraseForSource(sourceId, passphrase);
    } catch (e) {
      showToast(t('settings.sync_err_key_derive', { msg: String(e.message || e) }), 'error');
      return;
    }
  }

  try {
    bundleShareState.bundle = SyncBundle.build(sourceId);
    bundleShareState.json = SyncBundle.serialize(bundleShareState.bundle);
  } catch (e) {
    showToast(t('bundle.share_build_failed', { msg: String(e.message || e) }), 'error');
    renderSettingsModal();
    return;
  }

  renderSyncShareModal();
}

function renderSyncShareModal() {
  const src = Sync.getSource(bundleShareState.sourceId);
  const title = document.getElementById('modal-title');
  const body  = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');

  title.textContent = t('bundle.share_title', { label: (src && src.label) || '?' });
  body.innerHTML = `
    <div class="bundle-warning">
      <strong>⚠ ${escapeHTML(t('bundle.share_warn_title'))}</strong>
      <div>${escapeHTML(t('bundle.share_warn_body'))}</div>
    </div>
    <div class="form-field" style="margin-top: 12px;">
      <label class="form-label" for="bundle-share-text">${escapeHTML(t('bundle.share_field'))}</label>
      <textarea id="bundle-share-text" class="form-input bundle-text" rows="10" readonly>${escapeHTML(bundleShareState.json)}</textarea>
    </div>
    <div class="bundle-share-actions">
      <button class="btn-secondary" data-action="bundle-share-copy">⎘ ${escapeHTML(t('bundle.share_copy'))}</button>
      <button class="btn-secondary" data-action="bundle-share-download">⇩ ${escapeHTML(t('bundle.share_download'))}</button>
    </div>
  `;
  footer.innerHTML = `
    <button class="btn-secondary" data-action="bundle-share-close">${escapeHTML(t('btn.close'))}</button>
  `;
  document.getElementById('modal-backdrop').style.display = 'flex';
}

async function syncShareCopy() {
  const txt = document.getElementById('bundle-share-text');
  if (!txt) return;
  try {
    await navigator.clipboard.writeText(txt.value);
    showToast(t('bundle.share_copied'), 'success');
  } catch (e) {
    // Fallback: select + manual copy
    txt.focus();
    txt.select();
    showToast(t('bundle.share_copy_manual'), 'info');
  }
}

function syncShareDownload() {
  const json = bundleShareState.json;
  if (!json) return;
  const src = Sync.getSource(bundleShareState.sourceId);
  const safeLabel = (src && src.label ? src.label : 'source').replace(/[^\w.-]+/g, '_');
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cram-bundle-${safeLabel}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);
  showToast(t('bundle.share_downloaded'), 'success');
}

function syncShareClose() {
  bundleShareState = { sourceId: null, bundle: null, json: null };
  // Zurück zum Settings-Modal, Sync-Tab
  closeModal();
  setTimeout(() => { openSettingsModal(); switchSettingsTab('sync'); }, 0);
}

/* ---- Import flow ---- */

let bundleImportState = { rawText: '', bundle: null, parseError: null };

function openSyncImportModal() {
  bundleImportState = { rawText: '', bundle: null, parseError: null };

function renderSyncImportModal() {
  const title = document.getElementById('modal-title');
  const body  = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');

  title.textContent = t('bundle.import_title');

  const b = bundleImportState.bundle;
  const fingerprintLocal = SyncBundle.getFingerprintLocal();
  const fpMatch = b && b.configFingerprint === fingerprintLocal;

  let preview = '';
  if (b) {
    const fpLine = b.configFingerprint
      ? `<div class="bundle-preview-fp" data-match="${fpMatch}">
           <span>${escapeHTML(t('bundle.preview_fingerprint'))}: <code>${escapeHTML(b.configFingerprint)}</code>
             vs. lokal <code>${escapeHTML(fingerprintLocal)}</code></span>
           <span class="bundle-fp-tag">${escapeHTML(fpMatch ? t('bundle.preview_fp_match') : t('bundle.preview_fp_mismatch'))}</span>
         </div>`
      : '';
    let detail = '';
    if (b.type === 'http') {
      detail = `<div class="bundle-preview-row"><strong>URL:</strong> <code>${escapeHTML((b.config || {}).url || '')}</code></div>`;
    } else if (b.type === 'fileSystem') {
      detail = `<div class="bundle-preview-row"><strong>${escapeHTML(t('bundle.preview_filename'))}:</strong> <code>${escapeHTML((b.config || {}).fileName || 'cram-sync.json')}</code></div>
                <div class="bundle-preview-hint">${escapeHTML(t('bundle.preview_fs_hint'))}</div>`;
    }
    const encLine = b.encryption && b.encryption.enabled
      ? `<div class="bundle-preview-row">🔒 ${escapeHTML(t('bundle.preview_encrypted'))}</div>`
      : `<div class="bundle-preview-row">⚠ ${escapeHTML(t('bundle.preview_unencrypted'))}</div>`;
    preview = `
      <div class="bundle-preview">
        <div class="bundle-preview-row"><strong>${escapeHTML(t('bundle.preview_type'))}:</strong> ${escapeHTML(b.type)}</div>
        <div class="bundle-preview-row"><strong>${escapeHTML(t('bundle.preview_label'))}:</strong> ${escapeHTML(b.label)}</div>
        ${detail}
        ${encLine}
        ${fpLine}
        ${!fpMatch && b.configFingerprint ? `<div class="bundle-fp-warn">${escapeHTML(t('bundle.preview_fp_warn'))}</div>` : ''}
      </div>
    `;
  }

  const errBlock = bundleImportState.parseError
    ? `<div class="bundle-import-err">${escapeHTML(bundleImportState.parseError)}</div>`
    : '';

  body.innerHTML = `
    <div class="sync-explain">${escapeHTML(t('bundle.import_intro'))}</div>
    <div class="form-field" style="margin-top: 12px;">
      <label class="form-label" for="bundle-import-text">${escapeHTML(t('bundle.import_field'))}</label>
      <textarea id="bundle-import-text" class="form-input bundle-text" rows="8"
                placeholder="${escapeHTML(t('bundle.import_placeholder'))}">${escapeHTML(bundleImportState.rawText)}</textarea>
    </div>
    <div class="bundle-import-actions">
      <button class="btn-secondary" data-action="bundle-import-file">${escapeHTML(t('bundle.import_from_file'))}</button>
      <button class="btn-secondary" data-action="bundle-import-parse">${escapeHTML(t('bundle.import_parse'))}</button>
    </div>
    ${errBlock}
    ${preview}
  `;
  footer.innerHTML = `
    <button class="btn-secondary" data-action="bundle-import-close">${escapeHTML(t('btn.cancel'))}</button>
    <button class="btn-primary" data-action="bundle-import-apply" ${b ? '' : 'disabled'}>${escapeHTML(t('bundle.import_apply'))}</button>
  `;
  document.getElementById('modal-backdrop').style.display = 'flex';

  // Live-Parse beim Tippen (debounced über change-Event)
  const ta = document.getElementById('bundle-import-text');
  if (ta) {
    ta.addEventListener('input', () => { bundleImportState.rawText = ta.value; });
  }
}

function syncImportParse() {
  const txt = document.getElementById('bundle-import-text');
  if (!txt) return;
  const raw = txt.value.trim();
  bundleImportState.rawText = raw;
  if (!raw) {
    bundleImportState.bundle = null;
    bundleImportState.parseError = t('bundle.import_err_empty');
    renderSyncImportModal();
    return;
  }
  try {
    bundleImportState.bundle = SyncBundle.parse(raw);
    bundleImportState.parseError = null;
  } catch (e) {
    bundleImportState.bundle = null;
    bundleImportState.parseError = String(e.message || e);
  }
  renderSyncImportModal();
}

function syncImportFromFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.addEventListener('change', async () => {
    const file = input.files && input.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      bundleImportState.rawText = text;
      // Auto-parse after loading
      try {
        bundleImportState.bundle = SyncBundle.parse(text);
        bundleImportState.parseError = null;
      } catch (e) {
        bundleImportState.bundle = null;
        bundleImportState.parseError = String(e.message || e);
      }
      renderSyncImportModal();
    } catch (e) {
      showToast(t('bundle.import_err_file_read', { msg: String(e.message || e) }), 'error');
    }
  });
  input.click();
}

async function syncImportApply() {
  if (!bundleImportState.bundle) {
    showToast(t('bundle.import_err_no_bundle'), 'error');
    return;
  }
  const fpLocal = SyncBundle.getFingerprintLocal();
  if (bundleImportState.bundle.configFingerprint &&
      bundleImportState.bundle.configFingerprint !== fpLocal) {
    if (!window.confirm(t('bundle.import_confirm_fp_mismatch'))) return;
  }
  try {
    const result = await SyncBundle.apply(bundleImportState.bundle);
    if (result === null) {
      // user cancelled the directory picker (fileSystem)
      return;
    }
    showToast(t('bundle.import_success', { label: result.source.label }), 'success');
    syncImportClose();

    // V1.3 Onboarding-Auto-Pull: nach erfolgreichem Bundle-Import die
    // Source einmal probehören. Wenn der Server bereits einen Stand hat,
    // anbieten ihn direkt zu übernehmen — sonst muss der User erst über
    // Daten → Online den Stand explizit holen, was eine zähe Onboarding-
    // Erfahrung wäre.
    setTimeout(async () => {
      try {
        const meta = await Sync.probeMeta(result.source.id);
        if (!meta || !meta.reachable || meta.empty) return;
        const msg = t('bundle.onboard_auto_pull_prompt', { label: result.source.label });
        if (window.confirm(msg)) {
          showToast(t('sync.online_pulling', { label: result.source.label }), 'info');
          try {
            await withPassphraseRecovery(result.source, () => Sync.pull(result.source.id, { mode: 'full' }));
            showToast(t('bundle.onboard_auto_pull_done', { label: result.source.label }), 'success');
            render();
          } catch (e) {
            showToast(t('sync.online_pull_failed', { msg: String(e.message || e) }), 'error');
          }
        }
      } catch (e) { /* probe fehler ignorieren — User kann später manuell */ }
    }, 200);
  } catch (e) {
    showToast(t('bundle.import_err_apply', { msg: String(e.message || e) }), 'error');
  }
}

function syncImportClose() {
  bundleImportState = { rawText: '', bundle: null, parseError: null };
  closeModal();
  setTimeout(() => { openSettingsModal(); switchSettingsTab('sync'); }, 0);
}

/* =========================================================================
   KEYBOARD SHORTCUTS
   ========================================================================= */
function setupKeyboard() {
  document.addEventListener('keydown', (e) => {
    // Escape: close modal / clear selection
    if (e.key === 'Escape') {
      const backdrop = document.getElementById('modal-backdrop');
      if (backdrop.style.display === 'flex') {
        closeModal();
        return;
      }
      if (State.selectedPersonId) {
        State.selectedPersonId = null;
        renderSidePanel();
      }
    }

    // Ignore shortcuts when typing in an input
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

    // 'u' toggles unavailable for focused role card's occupant
    if (e.key.toLowerCase() === 'u') {
      const focused = document.activeElement;
      if (focused && focused.classList.contains('role-card')) {
        const personId = focused.dataset.occupantId;
        if (personId) {
          const isUnavail = !!(State.runtime.unavailable && State.runtime.unavailable[personId]);
          if (isUnavail) {
            markAvailable(personId);
          } else {
            openMarkUnavailableModal(personId);
          }
        }
      }
    }

    // 't' toggles theme
    if (e.key.toLowerCase() === 't') {
      toggleTheme();
    }
  });
}

/* =========================================================================
   INITIALIZATION
   ========================================================================= */
function init() {
  // Config laden oder Default setzen
  State.config = Storage.loadConfig();
  if (!State.config) {
    State.config = DEFAULT_CONFIG;
    Storage.saveConfig(State.config);
  }

  State.runtime = Storage.loadRuntime();
  State.prefs = Storage.loadPrefs();
  State.activeTab = State.prefs.activeTab || 'active';
  State.language = State.prefs.language || 'de';
  State.mobileView = State.prefs.mobileView || 'org';
  State.isEditMode = false;

  // Theme anwenden
  applyTheme(State.prefs.theme);

  // Ansichtsgröße anwenden
  applySize(State.prefs.viewSize || 'm');

  // Panel-Sichtbarkeit (Desktop) anwenden
  applyPanelVisibility();

  // Mobile-View anwenden (wirkt nur auf Mobile über CSS)
  applyMobileView();

  // Sprachauswahl initialisieren
  setupLanguageSelect();
  applyLanguage(State.language);

  // Tab-UI synchron
  updateTabsUI();

  // GLOBALER EVENT-DISPATCHER — EIN Click-Handler für alle data-action-Elemente.
  // Immun gegen Re-Renders, weil er am document hängt, nicht an einzelnen Buttons.
  document.addEventListener('click', handleGlobalClick);
  document.addEventListener('keydown', handleGlobalKeyDown);

  // Modal-Backdrop: schließt Modal nur bei Klick auf den Hintergrund selbst
  document.getElementById('modal-backdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });

  // Cascade-Lines bei Fenstergröße-Änderung und Scroll neu zeichnen
  let cascadeRedrawTimer = null;
  const scheduleCascadeRedraw = () => {
    if (!State.prefs.showCascade) return;
    if (cascadeRedrawTimer) cancelAnimationFrame(cascadeRedrawTimer);
    cascadeRedrawTimer = requestAnimationFrame(() => renderCascadeLines());
  };
  window.addEventListener('resize', scheduleCascadeRedraw);
  applyCascade();

  setupTabs();
  setupKeyboard();
  setupPWA();

  // Sync-Awareness-Indikator: bei jeder Sync-State-Mutation neu rendern
  Sync.onChange(() => renderSyncIndicator());

  // V2.0 Auto-Sync Poller: globale Listener registrieren (Visibility, Online/
  // Offline) und alle existierenden Sources eintragen. Default autoMode='off'
  // bedeutet: kein Timer startet, bis User in Settings opt-in macht.
  try {
    SyncPoller.start();
    const syncState = Sync.load();
    if (syncState && Array.isArray(syncState.sources)) {
      for (const src of syncState.sources) {
        SyncPoller.registerSource(src.id);
      }
    }
  } catch (e) {
    console.warn('SyncPoller-Setup übersprungen:', e && e.message);
  }

  render();
}

// Start
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
