<script>
'use strict';


/* =========================================================================
   STORAGE LAYER
   Abstrahiert für späteren Wechsel auf zentrale DB (REST-API).
   ========================================================================= */
const Storage = (function() {
  const KEY_CONFIG = 'cram.config.v1';
  const KEY_RUNTIME = 'cram.runtime.v1';
  const KEY_AUDIT = 'cram.audit.v1';
  const KEY_PREFS = 'cram.prefs.v1';
  const AUDIT_RETENTION_DAYS = 30;

  function get(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) {
      console.warn('Storage read failed for', key, e);
      return fallback;
    }
  }

  function set(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      // V1.2: Writes auf Config oder Runtime markieren den Sync-State als
      // 'dirty' (= ungepushte Änderungen). Sync ist evtl. noch nicht
      // ausgewertet, wenn dieses Modul zum ersten Mal lädt — daher typeof-Guard.
      if ((key === KEY_CONFIG || key === KEY_RUNTIME) &&
          typeof Sync !== 'undefined' && Sync.markDirty) {
        Sync.markDirty();
      }
      return true;
    } catch (e) {
      console.error('Storage write failed for', key, e);
      return false;
    }
  }

  return {
    loadConfig: () => get(KEY_CONFIG, null),
    saveConfig: (config) => set(KEY_CONFIG, config),

    loadRuntime: () => {
      const rt = get(KEY_RUNTIME, { unavailable: {}, manualAssignments: {} });
      // Migration: älteren Runtime ohne manualAssignments absichern
      if (!rt.manualAssignments) rt.manualAssignments = {};
      if (!rt.unavailable) rt.unavailable = {};
      return rt;
    },
    saveRuntime: (runtime) => set(KEY_RUNTIME, runtime),

    loadAudit: () => {
      const log = get(KEY_AUDIT, []);
      // Ringpuffer: Einträge älter als 30 Tage entfernen
      const cutoff = Date.now() - AUDIT_RETENTION_DAYS * 24 * 60 * 60 * 1000;
      return log.filter(entry => new Date(entry.timestamp).getTime() >= cutoff);
    },
    appendAudit: (entry) => {
      const log = get(KEY_AUDIT, []);
      log.unshift(entry); // neueste oben
      // Vorsichtshalber Hard-Cap bei 10.000 Einträgen
      const trimmed = log.slice(0, 10000);
      // Retention-Filter
      const cutoff = Date.now() - AUDIT_RETENTION_DAYS * 24 * 60 * 60 * 1000;
      const filtered = trimmed.filter(e => new Date(e.timestamp).getTime() >= cutoff);
      set(KEY_AUDIT, filtered);
    },

    loadPrefs: () => get(KEY_PREFS, { theme: 'dark', activeTab: 'active', language: 'de', viewSize: 'm', showCascade: false }),
    savePrefs: (prefs) => set(KEY_PREFS, prefs),
  };
})();

/* =========================================================================
   SYNC CRYPTO (V1.2)
   PBKDF2-HMAC-SHA256 (250 000 Iterationen) leitet aus einer User-Passphrase
   plus 16-Byte-Salt einen AES-256-GCM-Schlüssel ab. WebCrypto-Only, keine
   externen Libraries. Salt liegt unverschlüsselt im Envelope und in der
   Source-Config (Salt ist nicht geheim). IV ist pro Write neu (12 Bytes).

   Schlüssel-Lebensdauer: nur im RAM (CryptoKey-Objekt im Sync-Modul-Cache),
   beim Tab-Close weg. Beim nächsten Start muss der User die Passphrase
   erneut eingeben → siehe promptForPassphrase().

   Detail-Spec: docs/specs/v1.2-manual-sync.md §5 (Encryption).
   ========================================================================= */
const SyncCrypto = (function() {
  const ITERATIONS = 250000;
  const SALT_LEN = 16;
  const IV_LEN = 12;
  const enc = new TextEncoder();
  const dec = new TextDecoder();

  function bytesToBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }

  function base64ToBytes(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }

  function randomBytes(n) {
    const a = new Uint8Array(n);
    crypto.getRandomValues(a);
    return a;
  }

  function randomSaltB64() { return bytesToBase64(randomBytes(SALT_LEN)); }
  function randomIvB64()   { return bytesToBase64(randomBytes(IV_LEN)); }

  async function deriveKey(passphrase, saltB64) {
    if (!passphrase) throw new Error('Passphrase required');
    if (!saltB64) throw new Error('Salt required');
    const keyMaterial = await crypto.subtle.importKey(
      'raw',
      enc.encode(passphrase),
      { name: 'PBKDF2' },
      false,
      ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: base64ToBytes(saltB64), iterations: ITERATIONS, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  async function encryptJSON(key, plaintextObj) {
    const ivBytes = randomBytes(IV_LEN);
    const data = enc.encode(JSON.stringify(plaintextObj));
    const cipherBuf = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv: ivBytes },
      key,
      data
    );
    return {
      iv: bytesToBase64(ivBytes),
      ciphertext: bytesToBase64(new Uint8Array(cipherBuf)),
    };
  }

  async function decryptJSON(key, ivB64, ciphertextB64) {
    const plain = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: base64ToBytes(ivB64) },
      key,
      base64ToBytes(ciphertextB64)
    );
    return JSON.parse(dec.decode(plain));
  }

  return {
    ITERATIONS, SALT_LEN, IV_LEN,
    bytesToBase64, base64ToBytes,
    randomSaltB64, randomIvB64,
    deriveKey, encryptJSON, decryptJSON,
  };
})();

/* =========================================================================
   SYNC LAYER (V1.2 — manual)
   Sync-Source-Abstraktion: einheitliche Schnittstelle für Backend-Typen
   (HTTP, FileSystem, ...). State unter cram.sync.v1. Version-Counter wird
   beim Push inkrementiert; lastSyncedVersion markiert den letzten
   erfolgreichen Push, dirty signalisiert lokale Änderungen seit Push.

   Backend-Implementierungen (S1, S5, ...) registrieren sich via
   Sync.registerBackend(type, factory). Sync.createSourceClient(source)
   liefert ein Client-Objekt mit asynchronen read()/write()/probe().

   Detail-Spec: docs/specs/v1.2-manual-sync.md
   ========================================================================= */
const Sync = (function() {
  const KEY = 'cram.sync.v1';
  // V2.0 step 1: schema bumped from 1 -> 2 to introduce per-source AutoMode
  // fields and a global 'auto' block (offline tracker + migration banner).
  // _migrate() is idempotent and runs on load() when either schemaVersion < 2
  // or the auto block is missing (guards against V2->V1.3->V2 cycles).
  const SCHEMA_VERSION = 2;

  const DEFAULT_STATE = {
    schemaVersion: SCHEMA_VERSION,
    lastSyncedVersion: 0,
    lastSyncedAt: null,
    lastSyncedSourceId: null,
    dirty: false,
    lastError: null,
    sources: [],
    // V2.0 auto-sync globals. offlineSince tracks the start of an offline
    // window (H1). migrationBannerDismissed persists the user's "Got it"
    // click on the V1.3 -> V2.0 informational banner. migratedAt is set the
    // first time _migrate() touches an existing source set; for fresh
    // installs it stays null so no banner ever appears.
    auto: {
      offlineSince: null,
      migrationBannerDismissed: false,
      migratedAt: null,
    },
  };

  // Per-source defaults applied by _migrate(). Kept here so addSource()
  // and _migrate() stay in sync; if you add a field, touch both call sites.
  const SOURCE_AUTO_DEFAULTS = {
    autoMode: 'off',          // D1: opt-in. Default 'off' for ALL sources,
                              // including ones newly created in V2.0.
    pollIntervalSec: 90,
    lastAutoPollAt: null,
    lastAutoPollError: null,
    authError: null,          // H2: surfaced when a 401/403 happens.
    pendingPush: null,        // H3: queued push waiting for online.
    permissionRequired: false, // H5: FS handle lost user-activation gesture.
  };

  function _migrate(state) {
    // Idempotent guard: a fully-migrated state passes through unchanged.
    if (state && state.schemaVersion >= SCHEMA_VERSION && state.auto) {
      return state;
    }
    // Defensive: never mutate the input. Build a shallow clone.
    const next = Object.assign({}, state || {});
    next.sources = Array.isArray(state && state.sources) ? state.sources.slice() : [];

    // Apply per-source defaults without overwriting existing values.
    next.sources = next.sources.map(src => {
      const merged = Object.assign({}, src);
      for (const k of Object.keys(SOURCE_AUTO_DEFAULTS)) {
        if (merged[k] === undefined) merged[k] = SOURCE_AUTO_DEFAULTS[k];
      }
      return merged;
    });

    // Global auto block. Preserve any caller-supplied fields.
    const hadAuto = !!(state && state.auto);
    const prevAuto = hadAuto ? state.auto : {};
    next.auto = {
      offlineSince: prevAuto.offlineSince !== undefined ? prevAuto.offlineSince : null,
      migrationBannerDismissed: prevAuto.migrationBannerDismissed === true,
      // migratedAt only fires for upgrades from a state with existing sources.
      // Fresh installs (sources.length === 0) keep migratedAt = null so the
      // banner stays hidden. Once stamped, never overwritten.
      migratedAt: (prevAuto.migratedAt !== undefined && prevAuto.migratedAt !== null)
        ? prevAuto.migratedAt
        : (next.sources.length > 0 ? new Date().toISOString() : null),
    };

    next.schemaVersion = SCHEMA_VERSION;
    return next;
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return Object.assign({}, DEFAULT_STATE);
      const parsed = JSON.parse(raw);
      // Run migration first so downstream Object.assign sees v2 shape.
      // If anything changed, persist immediately so the next load is a
      // no-op pass through the idempotent guard.
      const needsMigration = !parsed || parsed.schemaVersion !== SCHEMA_VERSION || !parsed.auto;
      const migrated = needsMigration ? _migrate(parsed) : parsed;
      if (needsMigration) {
        try {
          localStorage.setItem(KEY, JSON.stringify(migrated));
        } catch (e) {
          console.warn('Sync state migration write failed:', e);
        }
      }
      return Object.assign({}, DEFAULT_STATE, migrated);
    } catch (e) {
      console.warn('Sync state read failed, using default:', e);
      return Object.assign({}, DEFAULT_STATE);
    }
  }

  function save(state) {
    try {
      localStorage.setItem(KEY, JSON.stringify(state));
      return true;
    } catch (e) {
      console.error('Sync state write failed:', e);
      return false;
    }
  }

  // In-Memory: ist gerade eine Sync-Operation im Gange? Wird beim Pull/Push
  // gesetzt, getrennt vom dirty-flag in localStorage. Optional callback
  // benachrichtigt die UI (Awareness-Indikator) bei Änderung.
  let _syncing = false;
  let _suppressDirty = false;
  let _onChange = null;

  // Key-Cache: pro Source-ID ein abgeleiteter CryptoKey. Niemals persistiert,
  // beim Tab-Close weg. Wird durch setKeyForSource() befüllt (typisch nach
  // einer Passphrase-Eingabe).
  const _keyCache = new Map();
  // Passphrase-Cache: parallel zum Key-Cache. Brauchen wir, damit ein Bundle
  // die ursprüngliche Passphrase einschließen kann (der Empfänger leitet seinen
  // eigenen CryptoKey daraus ab). Wenn nicht gecached, prompted die UI vor dem
  // Bundle-Export erneut.
  const _passphraseCache = new Map();

  // Custom error: erlaubt der UI, gezielt auf "Passphrase fehlt" zu reagieren
  // und einen Prompt einzublenden, ohne den allgemeinen Error-Pfad zu stören.
  class PassphraseRequiredError extends Error {
    constructor(sourceId, sourceLabel) {
      super('Passphrase required for source ' + sourceId);
      this.name = 'PassphraseRequiredError';
      this.sourceId = sourceId;
      this.sourceLabel = sourceLabel;
    }
  }

  // V1.3 Trennung Sync (Status) vs Data (Config + Status): wenn Sync im
  // 'status'-Modus operiert und Server-Fingerprint != lokaler Fingerprint,
  // wird die Operation mit dieser Error-Klasse abgelehnt. Die UI fängt sie
  // ab und verweist auf den Data-Tab für den Config-Abgleich.
  class ConfigDriftError extends Error {
    constructor(serverFingerprint, localFingerprint) {
      super('Configuration drift: server ' + serverFingerprint + ' vs local ' + localFingerprint);
      this.name = 'ConfigDriftError';
      this.serverFingerprint = serverFingerprint;
      this.localFingerprint = localFingerprint;
    }
  }

  function isSyncing() { return _syncing; }

  function onChange(fn) { _onChange = (typeof fn === 'function') ? fn : null; }

  function _emitChange() {
    if (typeof _onChange === 'function') {
      try { _onChange(); } catch (e) { /* swallow UI errors */ }
    }
  }

  function _setSyncing(v) {
    if (_syncing === v) return;
    _syncing = v;
    _emitChange();
  }

  function markDirty() {
    if (_suppressDirty) return;
    const state = load();
    if (!state.dirty) {
      state.dirty = true;
      save(state);
      _emitChange();
    }
    // V2.0 Schritt 4: Auto-Push-Hook. Pro Source debouncen — der Poller
    // entscheidet selbst (autoMode, online, paused, authError,
    // permissionRequired, _needsRecovery), ob er den Timer überhaupt
    // aufsetzt. No-op wenn keine Source autoMode!='off' hat.
    // typeof-Guard: SyncPoller-IIFE wird textuell NACH Sync definiert.
    if (typeof SyncPoller !== 'undefined' && SyncPoller.scheduleAutoPush) {
      const sources = state.sources || [];
      for (const s of sources) {
        try { SyncPoller.scheduleAutoPush(s.id, 'markDirty'); }
        catch (e) { console.warn('scheduleAutoPush failed:', e && e.message); }
      }
    }
  }

  function isDirty() {
    return !!load().dirty;
  }

  function getStatus() {
    const state = load();
    if (!state.sources || state.sources.length === 0) return 'disabled';
    if (state.lastError) return 'error';
    if (state.dirty) return 'out-of-sync';
    return 'synced';
  }

  /* ---- Source CRUD ---- */

  function listSources() {
    return load().sources || [];
  }

  function getSource(id) {
    return listSources().find(s => s.id === id) || null;
  }

  function addSource(input) {
    if (!input || !input.type) throw new Error('Source must have a type');
    const state = load();
    // V2.0 D1: even brand-new sources start with autoMode='off'. The user
    // turns auto-sync on explicitly per source after creation. SOURCE_AUTO_DEFAULTS
    // is the single source of truth — Object.assign order ensures caller
    // input (if ever provided) can override, but normal callers pass none.
    const source = Object.assign(
      {
        id: uid('src'),
        type: input.type,
        label: input.label || 'Unnamed source',
        config: input.config || {},
        encryption: Object.assign({ enabled: true }, input.encryption || {}),
        createdAt: new Date().toISOString(),
      },
      SOURCE_AUTO_DEFAULTS
    );
    state.sources.push(source);
    save(state);
    _emitChange();
    // V2.0: Poller-Wiring zentral hier — alle Aufrufer (UI, Bundle-Restore,
    // Tests, künftige API-Calls) registrieren automatisch beim Poller.
    // typeof-Guard: SyncPoller-IIFE wird textuell NACH Sync definiert, also
    // ist SyncPoller zur Sync-Definitionszeit undefined; zur Aufrufzeit von
    // addSource() existiert er aber.
    if (typeof SyncPoller !== 'undefined' && SyncPoller.registerSource) {
      try { SyncPoller.registerSource(source.id); }
      catch (e) { console.warn('SyncPoller.registerSource failed:', e && e.message); }
    }
    return source;
  }

  function updateSource(id, patch) {
    const state = load();
    const idx = state.sources.findIndex(s => s.id === id);
    if (idx < 0) return null;
    state.sources[idx] = Object.assign({}, state.sources[idx], patch);
    save(state);
    _emitChange();
    return state.sources[idx];
  }

  function removeSource(id) {
    // V2.0: Poller VOR Sources-Array-Mutation abräumen, damit kein Timer auf
    // einer gerade gelöschten Source weiterläuft. typeof-Guard wie addSource().
    if (typeof SyncPoller !== 'undefined' && SyncPoller.unregisterSource) {
      try { SyncPoller.unregisterSource(id); }
      catch (e) { console.warn('SyncPoller.unregisterSource failed:', e && e.message); }
    }
    const state = load();
    state.sources = state.sources.filter(s => s.id !== id);
    save(state);
    _emitChange();
  }

  /* ---- Backend factory registry ---- */

  const backends = {};

  function registerBackend(type, factory) {
    backends[type] = factory;
  }

  function listBackendTypes() {
    return Object.keys(backends);
  }

  function createSourceClient(source) {
    const factory = backends[source.type];
    if (!factory) {
      throw new Error('No backend registered for source type: ' + source.type);
    }
    return factory(source);
  }

  /* ---- Key-Cache + Encryption helpers ---- */

  function isEncryptionEnabled(source) {
    return !!(source && source.encryption && source.encryption.enabled);
  }
  function hasKeyForSource(id) { return _keyCache.has(id); }
  function setKeyForSource(id, cryptoKey) { _keyCache.set(id, cryptoKey); }
  function clearKeyForSource(id) { _keyCache.delete(id); _passphraseCache.delete(id); }
  function clearAllKeys() { _keyCache.clear(); _passphraseCache.clear(); }
  function setPassphraseForSource(id, passphrase) { _passphraseCache.set(id, passphrase); }
  function getPassphraseForSource(id) { return _passphraseCache.get(id) || null; }
  function hasPassphraseForSource(id) { return _passphraseCache.has(id); }
  function needsPassphrase(source) {
    return isEncryptionEnabled(source) && !_keyCache.has(source.id);
  }

  /* ---- Payload helpers ----
     buildEnvelope() / applyEnvelope() bleiben für Tests + Code-Pfade ohne
     Encryption erhalten. Die Push/Pull-Funktionen nutzen die *ForSource-
     Varianten, die Encryption automatisch handhaben. */

  function _innerPayload() {
    return {
      format: 'cram-export',
      formatVersion: EXPORT_FORMAT_VERSION,
      appVersion: APP_VERSION,
      exportedAt: new Date().toISOString(),
      config: State.config,
      runtime: State.runtime,
    };
  }

  function buildEnvelope() {
    const state = load();
    return {
      format: 'cram-sync-v1',
      version: (state.lastSyncedVersion || 0) + 1,
      timestamp: Date.now(),
      fingerprint: computeConfigHash(State.config),
      encrypted: false,
      payload: _innerPayload(),
    };
  }

  async function buildEnvelopeForSource(source) {
    const state = load();
    const envelope = {
      format: 'cram-sync-v1',
      version: (state.lastSyncedVersion || 0) + 1,
      timestamp: Date.now(),
      fingerprint: computeConfigHash(State.config),
      encrypted: false,
    };

    if (!isEncryptionEnabled(source)) {
      envelope.payload = _innerPayload();
      return envelope;
    }

    const key = _keyCache.get(source.id);
    if (!key) throw new PassphraseRequiredError(source.id, source.label);

    // Salt muss in source.encryption.salt liegen — bei Quell-Erstellung über
    // die Settings-Form wird er generiert. Falls aus älterer Source ohne Salt
    // (Migration), wird beim ersten Empfang vom Server der Server-Salt
    // übernommen — siehe applyEnvelopeForSource.
    const saltB64 = (source.encryption && source.encryption.salt) || '';
    if (!saltB64) {
      throw new Error('Source has encryption enabled but no salt — please re-enter passphrase');
    }
    const { iv, ciphertext } = await SyncCrypto.encryptJSON(key, _innerPayload());
    envelope.encrypted = true;
    envelope.salt = saltB64;
    envelope.iv = iv;
    envelope.ciphertext = ciphertext;
    return envelope;
  }

  function applyEnvelope(envelope) {
    if (!envelope || envelope.format !== 'cram-sync-v1') {
      throw new Error('Invalid envelope format');
    }
    if (envelope.encrypted) {
      throw new Error('applyEnvelope cannot decrypt — use applyEnvelopeForSource');
    }
    const inner = envelope.payload;
    if (!inner || inner.format !== 'cram-export') {
      throw new Error('Invalid inner payload format');
    }
    const localFp = computeConfigHash(State.config);
    if (envelope.fingerprint && envelope.fingerprint !== localFp) {
      throw new Error('Fingerprint mismatch (local ' + localFp + ', remote ' + envelope.fingerprint + ')');
    }
    State.config = inner.config;
    State.runtime = inner.runtime || { unavailable: {}, manualAssignments: {} };
    Storage.saveConfig(State.config);
    Storage.saveRuntime(State.runtime);
  }

  /* applyEnvelopeForSource(envelope, source, opts)
       opts.mode = 'status' | 'full' (Default 'full')
     'status'  → erzwingt Fingerprint-Match, applied NUR runtime
     'full'    → ersetzt config + runtime, Fingerprint-Differenz wird
                 ins Audit-Log geloggt aber nicht abgelehnt
     Beide Modi geben den entschlüsselten inner payload zurück, damit
     Caller darauf zugreifen können (UI für preview-vor-apply). */
  async function applyEnvelopeForSource(envelope, source, opts) {
    opts = opts || {};
    const mode = opts.mode || 'full';

    if (!envelope || envelope.format !== 'cram-sync-v1') {
      throw new Error('Invalid envelope format');
    }

    let inner;
    if (envelope.encrypted) {
      if (!source || !isEncryptionEnabled(source)) {
        throw new Error('Received encrypted envelope but source has no encryption configured');
      }
      // Salt-Bootstrap: wenn dieser Source noch kein Salt hat, übernimm den
      // aus dem Server-Envelope (mehrere User, gleiche Passphrase, gleicher Salt).
      if (source.encryption && !source.encryption.salt && envelope.salt) {
        updateSource(source.id, {
          encryption: Object.assign({}, source.encryption, { salt: envelope.salt }),
        });
        if (!_keyCache.has(source.id)) {
          throw new PassphraseRequiredError(source.id, source.label);
        }
      }
      const key = _keyCache.get(source.id);
      if (!key) throw new PassphraseRequiredError(source.id, source.label);
      try {
        inner = await SyncCrypto.decryptJSON(key, envelope.iv, envelope.ciphertext);
      } catch (e) {
        throw new Error('Decryption failed — wrong passphrase?');
      }
    } else {
      inner = envelope.payload;
    }

    if (!inner || inner.format !== 'cram-export') {
      throw new Error('Invalid inner payload format');
    }

    const localFp = computeConfigHash(State.config);
    const remoteFp = envelope.fingerprint || computeConfigHash(inner.config);

    if (mode === 'status') {
      // Status-only: Fingerprint MUSS matchen. Sonst Drift-Error.
      if (remoteFp !== localFp) {
        throw new ConfigDriftError(remoteFp, localFp);
      }
      // Config bleibt unverändert; nur runtime wird angewandt.
      State.runtime = inner.runtime || { unavailable: {}, manualAssignments: {} };
      Storage.saveRuntime(State.runtime);
      return inner;
    }

    // mode === 'full': config + runtime ersetzen, Drift loggen
    if (remoteFp !== localFp) {
      try {
        Storage.appendAudit({
          id: uid('a'),
          timestamp: new Date().toISOString(),
          type: 'sync_config_replaced',
          action: 'sync_config_replaced',
          detail: 'Source ' + (source ? source.label : '?') + ' lieferte andere Config (' + localFp + ' → ' + remoteFp + ')',
        });
      } catch (e) { /* audit ist best-effort */ }
    }
    State.config = inner.config;
    State.runtime = inner.runtime || { unavailable: {}, manualAssignments: {} };
    Storage.saveConfig(State.config);
    Storage.saveRuntime(State.runtime);
    return inner;
  }

  /* ---- Manual sync actions ---- */

  /* pull(sourceId, opts)
       opts.mode = 'status' | 'full' (Default 'status' für sicherheit)
     'status' → nur Runtime wird angewandt; Drift → ConfigDriftError
     'full'   → kompletter State (config + runtime) wird ersetzt */
  async function pull(sourceId, opts) {
    opts = opts || {};
    const mode = opts.mode || 'status';
    const source = getSource(sourceId);
    if (!source) throw new Error('Source not found: ' + sourceId);
    _setSyncing(true);
    try {
      const client = createSourceClient(source);
      const envelope = await client.read();
      if (envelope === null) return null;
      _suppressDirty = true;
      try { await applyEnvelopeForSource(envelope, source, { mode }); }
      finally { _suppressDirty = false; }
      const state = load();
      state.lastSyncedVersion = envelope.version;
      state.lastSyncedAt = Date.now();
      state.lastSyncedSourceId = sourceId;
      state.dirty = false;
      state.lastError = null;
      save(state);
      return envelope;
    } catch (e) {
      if (e && (e.name === 'PassphraseRequiredError' || e.name === 'ConfigDriftError')) {
        throw e;
      }
      const state = load();
      state.lastError = String(e.message || e);
      save(state);
      throw e;
    } finally {
      _setSyncing(false);
      _emitChange();
    }
  }

  /* push(sourceId, opts)
       opts.mode = 'status' | 'full' (Default 'status')
     'status' → probt zuerst den Server-Fingerprint; bei Drift ConfigDriftError
                und Abbruch. Verhindert versehentliches Überschreiben einer
                fremden Server-Config.
     'full'   → schreibt vollen Envelope ohne Probe. Ersetzt den Server-Stand. */
  async function push(sourceId, opts) {
    opts = opts || {};
    const mode = opts.mode || 'status';
    const source = getSource(sourceId);
    if (!source) throw new Error('Source not found: ' + sourceId);
    _setSyncing(true);
    try {
      const client = createSourceClient(source);

      // Status-mode pre-check: server muss gleiche Config haben
      if (mode === 'status') {
        let serverEnvelope = null;
        try { serverEnvelope = await client.read(); } catch (e) {
          // Server unerreichbar: lassen wir den Push trotzdem versuchen — der
          // write() bringt dann den richtigen Fehler.
        }
        if (serverEnvelope) {
          const localFp = computeConfigHash(State.config);
          const remoteFp = serverEnvelope.fingerprint || '';
          if (remoteFp && remoteFp !== localFp) {
            throw new ConfigDriftError(remoteFp, localFp);
          }
        }
      }

      const envelope = await buildEnvelopeForSource(source);
      await client.write(envelope);
      const state = load();
      state.lastSyncedVersion = envelope.version;
      state.lastSyncedAt = Date.now();
      state.lastSyncedSourceId = sourceId;
      state.dirty = false;
      state.lastError = null;
      save(state);
      return envelope;
    } catch (e) {
      if (e && (e.name === 'PassphraseRequiredError' || e.name === 'ConfigDriftError')) {
        throw e;
      }
      const state = load();
      state.lastError = String(e.message || e);
      save(state);
      throw e;
    } finally {
      _setSyncing(false);
      _emitChange();
    }
  }

  /* probeMeta(sourceId) — lädt das Envelope vom Server und gibt
     ausschließlich Metadaten zurück. Keine Decryption, kein
     Apply. Nutzbar für leichte "was liegt auf dem Server"-
     Abfragen aus der UI (Sync-Modal-Card, Awareness-Indikator). */
  async function probeMeta(sourceId) {
    const source = getSource(sourceId);
    if (!source) throw new Error('Source not found: ' + sourceId);
    try {
      const client = createSourceClient(source);
      const envelope = await client.read();
      if (envelope === null) {
        return { reachable: true, empty: true };
      }
      return {
        reachable: true,
        empty: false,
        version: envelope.version || 0,
        timestamp: envelope.timestamp || 0,
        fingerprint: envelope.fingerprint || '',
        encrypted: !!envelope.encrypted,
        _envelope: envelope,  // für previewDiff
      };
    } catch (e) {
      return { reachable: false, error: String(e.message || e) };
    }
  }

  /* previewDiff(sourceId) — vollständiger Vergleich Server vs lokal,
     inklusive Decryption (falls Schlüssel im Cache) und Count-Stats.
     Liefert ein Objekt, das die UI direkt rendern kann. Wenn die
     Decryption fehlschlägt (Passphrase fehlt) wird ein eingeschränktes
     Objekt zurückgegeben (nur Fingerprint-Vergleich möglich). */
  async function previewDiff(sourceId) {
    const meta = await probeMeta(sourceId);
    if (!meta.reachable) return { reachable: false, error: meta.error };
    if (meta.empty)     return { reachable: true, empty: true, fingerprintLocal: computeConfigHash(State.config) };

    const source = getSource(sourceId);
    const localFp = computeConfigHash(State.config);
    const result = {
      reachable: true,
      empty: false,
      version: meta.version,
      timestamp: meta.timestamp,
      fingerprint: meta.fingerprint,
      fingerprintLocal: localFp,
      fingerprintMatches: meta.fingerprint === localFp,
      encrypted: meta.encrypted,
      decrypted: false,
    };

    let inner;
    if (meta.encrypted) {
      const key = _keyCache.get(sourceId);
      if (!key) {
        result.needsPassphrase = true;
        return result;
      }
      try {
        inner = await SyncCrypto.decryptJSON(key, meta._envelope.iv, meta._envelope.ciphertext);
      } catch (e) {
        result.decryptError = String(e.message || e);
        return result;
      }
    } else {
      inner = meta._envelope.payload;
    }
    if (!inner || inner.format !== 'cram-export') {
      result.malformed = true;
      return result;
    }
    result.decrypted = true;

    const sCfg = inner.config || {};
    const sRt  = inner.runtime || { unavailable: {}, manualAssignments: {} };
    const lCfg = State.config;
    const lRt  = State.runtime;

    function countRoles(cfg) {
      return (cfg.levels || []).reduce((s, l) => s + (l.roles || []).length, 0);
    }

    result.stats = {
      server: {
        persons: (sCfg.persons || []).length,
        levels:  (sCfg.levels  || []).length,
        roles:   countRoles(sCfg),
        absent:  Object.keys(sRt.unavailable || {}).length,
        manual:  Object.keys(sRt.manualAssignments || {}).length,
      },
      local: {
        persons: (lCfg.persons || []).length,
        levels:  (lCfg.levels  || []).length,
        roles:   countRoles(lCfg),
        absent:  Object.keys(lRt.unavailable || {}).length,
        manual:  Object.keys(lRt.manualAssignments || {}).length,
      },
    };

    // Personen-Diff (welche IDs gibt es nur auf einer Seite)
    const serverIds = new Set((sCfg.persons || []).map(p => p.id));
    const localIds  = new Set((lCfg.persons || []).map(p => p.id));
    result.onlyLocal  = (lCfg.persons || []).filter(p => !serverIds.has(p.id)).map(p => ({ id: p.id, name: p.name }));
    result.onlyServer = (sCfg.persons || []).filter(p => !localIds.has(p.id)).map(p => ({ id: p.id, name: p.name }));

    return result;
  }

  return {
    load, save,
    markDirty, isDirty, isSyncing, getStatus, onChange,
    listSources, getSource, addSource, updateSource, removeSource,
    registerBackend, listBackendTypes, createSourceClient,
    buildEnvelope, applyEnvelope,
    buildEnvelopeForSource, applyEnvelopeForSource,
    isEncryptionEnabled, hasKeyForSource, setKeyForSource,
    clearKeyForSource, clearAllKeys, needsPassphrase,
    setPassphraseForSource, getPassphraseForSource, hasPassphraseForSource,
    PassphraseRequiredError, ConfigDriftError,
    pull, push,
    probeMeta, previewDiff,
  };
})();

/* =========================================================================
   SYNC BACKEND S1 — HTTP PUT/GET
   Backend für selbst-gehostete HTTPS-Endpoints (nginx mit dav_methods,
   Caddy + webdav, MinIO, SharePoint-WebDAV, Synology NAS).

   source.config schema:
     {
       url:        'https://corp.example.com/cram/state.json',  // required
       authType:   'none' | 'basic' | 'bearer',                  // default 'none'
       authUser:   '...' (basic only),
       authPass:   '...' (basic only),
       authToken:  '...' (bearer only)
     }

   Server requirements: GET, HEAD, PUT, OPTIONS support; CORS headers
   permitting CRAM origin and Authorization, Content-Type headers.
   See docs/specs/v1.2-manual-sync.md for nginx/Caddy reference setups.
   For local development, scripts/dev-sync-backend.py provides a minimal
   stdlib-only Python server on http://127.0.0.1:8765/cram/state.json.
   ========================================================================= */
(function() {
  function buildAuthHeader(cfg) {
    if (cfg.authType === 'basic' && cfg.authUser) {
      return { 'Authorization': 'Basic ' + btoa(cfg.authUser + ':' + (cfg.authPass || '')) };
    }
    if (cfg.authType === 'bearer' && cfg.authToken) {
      return { 'Authorization': 'Bearer ' + cfg.authToken };
    }
    return {};
  }

  function createHttpClient(source) {
    const cfg = source.config || {};
    if (!cfg.url) throw new Error('HTTP source requires config.url');

    return {
      async read() {
        const res = await fetch(cfg.url, {
          method: 'GET',
          headers: buildAuthHeader(cfg),
          cache: 'no-store',
        });
        if (res.status === 404) return null;
        if (!res.ok) {
          throw new Error('GET ' + cfg.url + ' failed: ' + res.status + ' ' + res.statusText);
        }
        const text = await res.text();
        if (!text) return null;
        return JSON.parse(text);
      },

      async write(envelope) {
        const headers = Object.assign(
          { 'Content-Type': 'application/json' },
          buildAuthHeader(cfg)
        );
        const res = await fetch(cfg.url, {
          method: 'PUT',
          headers,
          body: JSON.stringify(envelope),
        });
        if (!res.ok) {
          throw new Error('PUT ' + cfg.url + ' failed: ' + res.status + ' ' + res.statusText);
        }
      },

      async probe() {
        try {
          const res = await fetch(cfg.url, {
            method: 'HEAD',
            headers: buildAuthHeader(cfg),
            cache: 'no-store',
          });
          return {
            reachable: res.ok || res.status === 404,
            status: res.status,
            lastModified: res.headers.get('Last-Modified'),
            etag: res.headers.get('ETag'),
          };
        } catch (e) {
          return { reachable: false, error: String(e.message || e) };
        }
      },
    };
  }

  Sync.registerBackend('http', createHttpClient);
})();

/* =========================================================================
   SYNC FILE STORE (V1.2)
   Persistenter Schlüssel-Wert-Store für FileSystemDirectoryHandle-Objekte.
   localStorage kann diese Objekte nicht serialisieren — IndexedDB hingegen
   kann sie nativ via structured clone speichern. Ein winziger Wrapper
   reicht: ein Object-Store, key=sourceId, value=DirectoryHandle.
   ========================================================================= */
const SyncFileStore = (function() {
  const DB_NAME = 'cram-sync-handles';
  const DB_VERSION = 1;
  const STORE_NAME = 'handles';

  function open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        if (!req.result.objectStoreNames.contains(STORE_NAME)) {
          req.result.createObjectStore(STORE_NAME);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function getHandle(sourceId) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(sourceId);
      req.onsuccess = () => { db.close(); resolve(req.result || null); };
      req.onerror = () => { db.close(); reject(req.error); };
    });
  }

  async function setHandle(sourceId, handle) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(handle, sourceId);
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  }

  async function removeHandle(sourceId) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).delete(sourceId);
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  }

  return { getHandle, setHandle, removeHandle };
})();

/* =========================================================================
   SYNC BACKEND S5 — File System Access API
   Backend für lokale Verzeichnisse (typisch ein OneDrive-/Dropbox-/Drive-
   Sync-Folder, ein NAS-Mount, oder einfach ein Ordner auf der Platte). Der
   Desktop-Sync-Agent des Cloud-Anbieters macht die eigentliche Verteilung
   zwischen Geräten — CRAM schreibt nur die Datei in den lokalen Ordner.

   source.config schema:
     { fileName: 'cram-sync.json',  // optional, default oben
       dirName:  '<Display-Name>'   // nur Anzeige in der UI }
   Der DirectoryHandle selbst liegt in SyncFileStore (IndexedDB).

   Browser-Support: Chromium ✓, Safari teilweise (Permission per Session
   neu zu erteilen), Firefox ✗. Wer S5 nicht nutzen kann, sieht eine
   Browser-Warnung (Phase 3.4).
   ========================================================================= */
(function() {
  function isSupported() {
    return typeof window !== 'undefined'
        && typeof window.showDirectoryPicker === 'function';
  }

  async function ensurePermission(handle, mode) {
    if (!handle.queryPermission || !handle.requestPermission) return true;
    const current = await handle.queryPermission({ mode });
    if (current === 'granted') return true;
    const requested = await handle.requestPermission({ mode });
    return requested === 'granted';
  }

  function createFileSystemClient(source) {
    const cfg = source.config || {};
    const fileName = cfg.fileName || 'cram-sync.json';

    async function getDirHandle() {
      const handle = await SyncFileStore.getHandle(source.id);
      if (!handle) throw new Error('No directory handle for source — please reconfigure');
      const ok = await ensurePermission(handle, 'readwrite');
      if (!ok) throw new Error('Permission denied for directory access');
      return handle;
    }

    return {
      async read() {
        const dirHandle = await getDirHandle();
        let fileHandle;
        try {
          fileHandle = await dirHandle.getFileHandle(fileName, { create: false });
        } catch (e) {
          if (e.name === 'NotFoundError') return null;
          throw e;
        }
        const file = await fileHandle.getFile();
        const text = await file.text();
        if (!text) return null;
        return JSON.parse(text);
      },

      async write(envelope) {
        const dirHandle = await getDirHandle();
        const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(JSON.stringify(envelope));
        await writable.close();
      },

      async probe() {
        try {
          const dirHandle = await getDirHandle();
          const fileHandle = await dirHandle.getFileHandle(fileName, { create: false });
          const file = await fileHandle.getFile();
          return {
            reachable: true,
            lastModified: new Date(file.lastModified).toUTCString(),
            size: file.size,
          };
        } catch (e) {
          if (e.name === 'NotFoundError') return { reachable: true, missing: true };
          return { reachable: false, error: String(e.message || e) };
        }
      },

      // exposed so the UI can check support before showing the option
      isSupported,
    };
  }

  // Tools (z.B. die Settings-Form) brauchen einen Support-Check, ohne erst
  // einen Source zu instantiieren — daher exportiert als Property:
  createFileSystemClient.isSupported = isSupported;

  Sync.registerBackend('fileSystem', createFileSystemClient);
})();

/* =========================================================================
   SYNC BUNDLE (V1.2)
   Onboarding-Artefakt: ein selbstständiges JSON, das alles enthält, was
   ein Empfänger braucht, um auf dieselbe Sync-Source zu zeigen.

   Bundle-Schema:
     {
       format: 'cram-bundle-v1',
       type:   'http' | 'fileSystem',
       label:  '...',
       config: { ... },                  // ohne dirName bei fileSystem
       encryption: {
         enabled: bool,
         salt:    '...',                 // wenn enabled
         passphrase: '...'               // wenn enabled — Empfänger leitet
       },                                //   seinen eigenen Key daraus ab
       configFingerprint: 'F4BC',
       createdAt: '2026-...'
     }

   Wichtig: Bundle enthält Passphrase und Auth-Token im Klartext. Es ist
   ein vertrauliches Artefakt — Distribution über sicheren Kanal nötig.
   Die UI markiert das deutlich.
   ========================================================================= */
const SyncBundle = (function() {
  const FORMAT = 'cram-bundle-v1';

  function build(sourceId) {
    const src = Sync.getSource(sourceId);
    if (!src) throw new Error('Source not found: ' + sourceId);

    const bundle = {
      format: FORMAT,
      type: src.type,
      label: src.label,
      config: Object.assign({}, src.config || {}),
      encryption: { enabled: !!(src.encryption && src.encryption.enabled) },
      configFingerprint: computeConfigHash(State.config),
      createdAt: new Date().toISOString(),
    };

    // fileSystem: dirName ist gerätspezifisch → raus aus dem Bundle.
    // Der Empfänger wählt seinen eigenen Ordner.
    if (src.type === 'fileSystem') {
      delete bundle.config.dirName;
    }

    if (bundle.encryption.enabled) {
      bundle.encryption.salt = (src.encryption || {}).salt || '';
      const passphrase = Sync.getPassphraseForSource(sourceId);
      if (!passphrase) {
        const e = new Error('Passphrase not cached — please re-enter to share');
        e.name = 'BundlePassphraseRequiredError';
        e.sourceId = sourceId;
        e.sourceLabel = src.label;
        throw e;
      }
      bundle.encryption.passphrase = passphrase;
    }

    return bundle;
  }

  function serialize(bundle) {
    return JSON.stringify(bundle, null, 2);
  }

  function parse(text) {
    let obj;
    try { obj = JSON.parse(text); }
    catch (e) { throw new Error('Bundle JSON is not valid: ' + e.message); }
    if (!obj || obj.format !== FORMAT) {
      throw new Error('Not a valid CRAM sync bundle (format mismatch)');
    }
    if (!obj.type || !obj.label || !obj.config) {
      throw new Error('Bundle is missing required fields (type, label, config)');
    }
    if (obj.type !== 'http' && obj.type !== 'fileSystem') {
      throw new Error('Unknown bundle source type: ' + obj.type);
    }
    if (obj.encryption && obj.encryption.enabled) {
      if (!obj.encryption.passphrase || !obj.encryption.salt) {
        throw new Error('Encrypted bundle missing passphrase or salt');
      }
    }
    return obj;
  }

  // Wendet ein parsed Bundle an. Bei fileSystem wird der User aufgefordert,
  // einen lokalen Ordner zu wählen (Rückgabe null bei Cancel). Liefert die
  // neu angelegte Source oder null.
  async function apply(bundle) {
    const fingerprintLocal = computeConfigHash(State.config);
    // Fingerprint-Mismatch wird vom Aufrufer (UI) abgefragt — hier nur ein
    // Hinweis als Property auf der gelieferten Source, falls relevant.

    let dirHandle = null;
    if (bundle.type === 'fileSystem') {
      if (typeof window.showDirectoryPicker !== 'function') {
        throw new Error('Browser does not support file system access — use a Chromium-based browser to import file-system bundles.');
      }
      try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      } catch (e) {
        if (e && e.name === 'AbortError') return null;
        throw e;
      }
    }

    const enc = bundle.encryption || {};
    const encryptionForSrc = enc.enabled
      ? { enabled: true, salt: enc.salt }
      : { enabled: false };

    const cfgClone = Object.assign({}, bundle.config);
    if (bundle.type === 'fileSystem' && dirHandle) {
      cfgClone.dirName = dirHandle.name;
    }

    const savedSource = Sync.addSource({
      type: bundle.type,
      label: bundle.label,
      config: cfgClone,
      encryption: encryptionForSrc,
    });
    // Poller-Wiring nun zentral in Sync.addSource()

    if (bundle.type === 'fileSystem' && dirHandle) {
      await SyncFileStore.setHandle(savedSource.id, dirHandle);
    }

    if (enc.enabled) {
      try {
        const key = await SyncCrypto.deriveKey(enc.passphrase, enc.salt);
        Sync.setKeyForSource(savedSource.id, key);
        Sync.setPassphraseForSource(savedSource.id, enc.passphrase);
      } catch (e) {
        // Source bleibt drin, aber ohne Key — User kann beim nächsten Sync
        // erneut die Passphrase eingeben.
        console.warn('Bundle key derivation failed:', e);
      }
    }

    return { source: savedSource, fingerprintMatches: bundle.configFingerprint === fingerprintLocal };
  }

  function getFingerprintLocal() {
    return computeConfigHash(State.config);
  }

  return { FORMAT, build, serialize, parse, apply, getFingerprintLocal };
})();

/* =========================================================================
   SYNC POLLER — V2.0 AUTO-SYNC (Schritt 3: Backoff + 3-Class Errors + Tick)
   --------------------------------------------------------------------------
   Verantwortet das aktive Polling von Sync-Quellen im 'status'-Modus. Auf
   dem Skeleton aus Schritt 2 (API-Surface, RAM-Runtime, Visibility/Online-
   Listener) sitzt jetzt der Tick-Loop:

     - Pro Source rekursiver setTimeout mit effektivem Intervall
         max(base * visibilityMultiplier, errorDelayMs)
     - Drei-Klassen-Fehler-Modell (transient | auth | permission)
         transient   -> exponential backoff (Cap 16× baseInterval)
         auth        -> autoMode='off' für diese Source + authError-Flag
         permission  -> permissionRequired=true, hard-pause der Source
     - visibilitychange -> visible: nur visibilityMultiplier reset, kein
       errorDelayMs-Reset (H4-Akzeptanzkriterium)
     - online-event: direkter Tick aller aktiven Sources (H1)
     - lastAutoPollError ist sanitized (status + stripped message + iso +
       class); KEIN Response-Body, KEIN WWW-Authenticate, KEIN Token-Bleed

   Mode-Constraint (Security Watch 7): Auto-Polling ruft ausschließlich
   Sync.pull(id, { mode: POLL_MODE='status' }). 'full' bleibt der Data-UI
   vorbehalten.

   Toast-System für authError/permissionRequired kommt in Schritt 6;
   hier nur console.warn als Platzhalter.

   Konstanten sind als SyncPoller.CONSTANTS exportiert — Settings-UI in
   Schritt 5 konsumiert daraus die Min/Max/Default-Werte.
   ========================================================================= */
const SyncPoller = (function() {
  'use strict';

  // ---- Constants (Single-Source-of-Truth, von Settings-UI konsumiert) ----
  const POLL_MODE = 'status';              // immer status, nie data (Mode-Constraint)
  const VISIBILITY_HIDDEN_MULTIPLIER = 4;  // D3: Tab hidden -> Intervall × 4
  // Security-Reviewer Watch-Point 3: konservativer Floor 30s statt 15s.
  // V2.0 führt zum ersten Mal automatisches Polling ein — defensiver Floor
  // schützt gegen versehentliche Last (Spec-Bug, korrupte Persistenz,
  // Settings-UI-Bug). Power-User-Override wäre ein separates Future-Feature
  // mit explizitem Opt-In.
  const POLL_INTERVAL_MIN_SEC = 30;
  const POLL_INTERVAL_MAX_SEC = 300;       // Spec-Cap
  const POLL_INTERVAL_DEFAULT_SEC = 90;    // Spec-Default
  const BACKOFF_MAX_MULTIPLIER = 16;       // Spec: errorDelay <= 16× baseInterval

  // ---- RAM-only Runtime-State (NIE persistiert) ----
  // Map<sourceId, RuntimeState>. Verschwindet beim Tab-Reload — das ist
  // beabsichtigt. Persistente Felder leben in Sync.load().sources[i]
  // (lastAutoPollAt, lastAutoPollError, authError, pendingPush).
  const _runtime = new Map();

  function _defaultRuntime(sourceId) {
    return {
      sourceId: sourceId,
      timerId: null,             // setTimeout-Handle (Pull-Tick)
      consecutiveFailures: 0,    // Backoff-Counter
      errorDelayMs: 0,           // aktueller Backoff-Delay (RAM, nicht persistiert)
      lastTickAt: null,          // performance.now() Timestamp, Diagnose
      nextTickAt: null,          // Wand-Zeit-Timestamp (ms epoch) für getStats()
      inFlight: false,           // Re-Entrancy-Guard: kein Overlap pro Source
      // V2.0 Schritt 4: Auto-Push-Debounce
      _pushDebounceTimer: null,  // setTimeout-Handle für scheduleAutoPush
      _pushInFlight: false,      // Re-Entrancy für Auto-Push
      _needsRecovery: false,     // H3: gesetzt wenn pendingPush beim Boot vorlag
    };
  }

  // V2.0 Schritt 4: Auto-Push-Debounce-Konstante. 2 Sekunden coalesce
  // rapide Edits (mehrere Klicks/Tipps am Stück) zu einem einzigen Push.
  const PUSH_DEBOUNCE_MS = 2000;

  // Globaler RAM-State: Lifecycle, Listener-Refs, Visibility, Online.
  const _global = {
    started: false,
    paused: false,
    visibilityMultiplier: 1,     // 1 oder VISIBILITY_HIDDEN_MULTIPLIER (D3)
    isOnline: (typeof navigator !== 'undefined' && typeof navigator.onLine === 'boolean')
      ? navigator.onLine
      : true,
    visibilityListener: null,    // gespeichert für stop()-cleanup
    onlineListener: null,
    offlineListener: null,
  };

  // ---- Helpers: Sync-State lookup ----

  function _loadState() {
    try { return Sync.load(); }
    catch (e) { return null; }
  }

  function _getSource(state, sourceId) {
    if (!state || !Array.isArray(state.sources)) return null;
    for (const s of state.sources) if (s.id === sourceId) return s;
    return null;
  }

  // ---- Helpers: Error sanitization (Security Watch 2) ----
  //
  // lastAutoPollError landet in localStorage. Wir geben NUR weiter:
  //   - status/code (numerisch)
  //   - sanitized message (max 200 chars, URLs/Tokens entfernt)
  //   - ISO timestamp
  //   - Klassifikation
  // KEIN Response-Body, KEIN WWW-Authenticate-Header, KEINE Query-Strings,
  // keine Passphrase-Bestandteile.

  function _stripUrlsAndTokens(s) {
    if (typeof s !== 'string') return '';
    return s
      .replace(/https?:\/\/\S+/gi, '[url]')
      .replace(/Bearer\s+\S+/gi, 'Bearer [token]')
      .replace(/[?&](token|password|passphrase|secret|key|auth)=\S+/gi, '?[redacted]');
  }

  function _sanitizeErrorForStorage(error, errorClass) {
    const code = (error && (error.code != null ? error.code : error.status));
    const rawMessage = error && error.message ? String(error.message) : '';
    return {
      code: typeof code === 'number' ? code : null,
      message: _stripUrlsAndTokens(rawMessage).slice(0, 200),
      at: new Date().toISOString(),
      class: errorClass,
    };
  }

  // ---- Helpers: Error classification (3-Klassen-Modell) ----

  function _classifyError(error) {
    if (!error) return 'transient';
    const code = (error.code != null ? error.code : error.status);
    if (code === 401 || code === 403) return 'auth';
    if (error.name === 'NotAllowedError' || error.name === 'NotFoundError') return 'permission';
    // PassphraseRequiredError aus dem V1.3-Sync-Modul ist KEIN auth-Fehler
    // im Sinne des Polls — Passphrase ist clientseitig und kommt durch
    // Cache-Verlust beim Reload. Behandeln wir transient: das Settings-UI
    // (Schritt 5) wird Passphrase-Prompts beim Resume separat surfaceisieren.
    // ConfigDriftError -> transient, weil das passend ist (User pushed
    // gerade einen neuen Config-Stand, Drift löst sich beim nächsten
    // Status-Pull auf, kein autoMode-Wechsel nötig).
    return 'transient';
  }

  // ---- Tick loop ----

  function _baseMs(source) {
    const sec = (source && typeof source.pollIntervalSec === 'number')
      ? source.pollIntervalSec
      : POLL_INTERVAL_DEFAULT_SEC;
    // Clamp gegen Floor und Cap, damit eine korrupte/alte Persistenz uns
    // nicht unter 30s drückt (Security Watch 3 defensiv).
    const clamped = Math.min(Math.max(sec, POLL_INTERVAL_MIN_SEC), POLL_INTERVAL_MAX_SEC);
    return clamped * 1000;
  }

  function _effectiveDelayMs(source, runtime) {
    const baseMs = _baseMs(source);
    const visibilityAdjusted = baseMs * _global.visibilityMultiplier;
    return Math.max(visibilityAdjusted, runtime.errorDelayMs || 0);
  }

  function _scheduleNext(sourceId, source, runtime, overrideDelayMs) {
    if (runtime.timerId !== null) {
      clearTimeout(runtime.timerId);
      runtime.timerId = null;
    }
    const delay = (typeof overrideDelayMs === 'number')
      ? overrideDelayMs
      : _effectiveDelayMs(source, runtime);
    runtime.nextTickAt = Date.now() + delay;
    runtime.timerId = setTimeout(() => _tick(sourceId), delay);
  }

  function _shouldSkipTick(source) {
    // Reihenfolge: harte Blocker zuerst (paused/online),
    // dann Source-spezifische (autoMode/permission/auth/recovery).
    if (_global.paused) return 'paused';
    if (!_global.isOnline) return 'offline';
    if (!source) return 'no-source';
    if (source.autoMode === 'off') return 'auto-off';
    if (source.permissionRequired === true) return 'permission';
    if (source.authError && source.authError.acknowledged === false) return 'auth';
    // V2.0 Schritt 4 (H3): solange pendingPush im Storage steht oder
    // _needsRecovery im RAM gesetzt ist, weder push noch pull. Schritt 6
    // bietet das Recovery-Modal.
    if (source.pendingPush) return 'recovery';
    const rt = _runtime.get(source.id);
    if (rt && rt._needsRecovery === true) return 'recovery';
    return null;
  }

  async function _tick(sourceId) {
    const runtime = _runtime.get(sourceId);
    if (!runtime) return;
    runtime.timerId = null;

    // Re-Entrancy: ein laufender Tick darf nicht überlappt werden.
    // Sollte durch sauberes Scheduling nie passieren, aber Defense-in-Depth.
    if (runtime.inFlight) {
      const state = _loadState();
      const source = _getSource(state, sourceId);
      if (source) _scheduleNext(sourceId, source, runtime);
      return;
    }

    const state = _loadState();
    const source = _getSource(state, sourceId);
    if (!source) {
      // Source verschwand — kein neuer Timer. unregisterSource() entfernt
      // den runtime-Eintrag separat.
      return;
    }

    const skipReason = _shouldSkipTick(source);
    if (skipReason) {
      // Backoff-Variablen NICHT anfassen — H4: errorDelayMs überlebt
      // visibility/offline-Phasen. Wenn autoMode='off' oder permission/auth
      // blockieren: keinen neuen Timer planen (Hard-Pause der Source).
      if (skipReason === 'auto-off' || skipReason === 'permission' ||
          skipReason === 'auth' || skipReason === 'recovery') {
        return;
      }
      // Sonst (paused/offline): nächsten Timer einplanen, Backoff
      // läuft weiter.
      _scheduleNext(sourceId, source, runtime);
      return;
    }

    runtime.inFlight = true;
    runtime.lastTickAt = (typeof performance !== 'undefined' && performance.now)
      ? performance.now()
      : Date.now();

    let resultClass = 'success';
    let sanitizedError = null;

    try {
      // POLL_MODE-Constraint (Security Watch 7): hartcodiert 'status'.
      // Sync.pull respektiert opts.mode (V1.3-API). Auto-Polling darf
      // NIE 'full' triggern — das ist der Data-UI vorbehalten.
      await Sync.pull(sourceId, { mode: POLL_MODE });
    } catch (e) {
      resultClass = _classifyError(e);
      sanitizedError = _sanitizeErrorForStorage(e, resultClass);
    } finally {
      runtime.inFlight = false;
    }

    // State neu laden — pull() könnte selbst geschrieben haben.
    const post = _loadState();
    const persistedSource = _getSource(post, sourceId);
    if (!persistedSource) {
      // Source wurde währenddessen entfernt.
      return;
    }

    if (resultClass === 'success') {
      runtime.consecutiveFailures = 0;
      runtime.errorDelayMs = 0;
      persistedSource.lastAutoPollAt = new Date().toISOString();
      persistedSource.lastAutoPollError = null;
      // H2: bei erfolgreicher Antwort einen ggf. ausstehenden authError
      // automatisch löschen (Recovery-Pfad). permissionRequired bleibt,
      // weil ein erfolgreicher pull nach FS-Re-Grant separat in der UI
      // bestätigt werden muss.
      if (persistedSource.authError) persistedSource.authError = null;
      try { Sync.save(post); } catch (e) { /* swallow */ }
      _scheduleNext(sourceId, persistedSource, runtime);
      return;
    }

    if (resultClass === 'transient') {
      runtime.consecutiveFailures += 1;
      // Exponential: 2^n bis Cap 16×.
      const baseMs = _baseMs(persistedSource);
      const factor = Math.min(Math.pow(2, runtime.consecutiveFailures), BACKOFF_MAX_MULTIPLIER);
      runtime.errorDelayMs = baseMs * factor;
      persistedSource.lastAutoPollError = sanitizedError;
      try { Sync.save(post); } catch (e) { /* swallow */ }
      // Watch-Point 6: console.debug ohne URLs/Tokens. sourceId.slice(0,8)
      // ist eine random ID — kein PII.
      console.debug('[SyncPoller] transient failure', sourceId.slice(0, 8),
        'fails=' + runtime.consecutiveFailures, 'delayMs=' + runtime.errorDelayMs);
      _scheduleNext(sourceId, persistedSource, runtime);
      return;
    }

    if (resultClass === 'auth') {
      // H2: autoMode='off' für DIESE Source. Toast kommt in Schritt 6.
      persistedSource.autoMode = 'off';
      persistedSource.authError = {
        timestamp: new Date().toISOString(),
        code: sanitizedError ? sanitizedError.code : null,
        acknowledged: false,
      };
      persistedSource.lastAutoPollError = sanitizedError;
      try { Sync.save(post); } catch (e) { /* swallow */ }
      console.warn('[SyncPoller] auth error -> autoMode=off for source', sourceId.slice(0, 8));
      // Kein Reschedule: Hard-Pause bis User-Aktion.
      return;
    }

    if (resultClass === 'permission') {
      // H5: FS-Handle verlor User-Activation. Settings-UI bietet
      // "Re-grant" Button (Schritt 5/6). Hier nur Flag setzen.
      persistedSource.permissionRequired = true;
      persistedSource.lastAutoPollError = sanitizedError;
      try { Sync.save(post); } catch (e) { /* swallow */ }
      console.warn('[SyncPoller] permission required for source', sourceId.slice(0, 8));
      // Kein Reschedule: Hard-Pause bis User-Aktion.
      return;
    }
  }

  // ---- Auto-Push (Schritt 4) ----
  //
  // scheduleAutoPush(sourceId) wird von Sync.markDirty() aufgerufen, sobald
  // der User lokal etwas ändert. Pro Source ein eigener Debounce-Timer
  // (2 s). Bei Trigger: prüfen ob Push erlaubt ist, dann Sync.push(id,
  // { mode: POLL_MODE }) — POLL_MODE ist hartcodiert 'status' (Watch-Point 7,
  // gleiche Constraint wie Pull-Tick).
  //
  // pendingPush-Sentinel (H3): bevor wir den Push starten, schreiben wir
  // pendingPush={startedAt, payloadHash, etag} nach localStorage. Bei
  // erfolgreichem Push: clearen. Wenn der Tab mid-push crasht, bleibt
  // pendingPush stehen — der nächste Boot detektiert das und hard-paust
  // die Source bis User-Aktion (Recovery-Modal kommt Schritt 6).
  //
  // payloadHash ist ein 64-bit SHA-256-Präfix (16 hex chars). Reicht für
  // Diagnose-Korrelation, kein Klartext im Storage (Security Watch 4).
  // Hinweis: wir hashen den ENVELOPE-Stringify (= verschlüsselten Blob
  // wenn Encryption an), nicht den Klartext-Payload. So sieht der Hash
  // den Klartext nie — selbst wenn das nur kosmetisch ist, hält es die
  // Architektur-Disziplin sauber.

  async function _hashPayload(input) {
    try {
      const text = typeof input === 'string' ? input : JSON.stringify(input);
      const buf = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest('SHA-256', buf);
      const hex = Array.from(new Uint8Array(digest))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
      return hex.slice(0, 16);  // 64 bit, reicht für Korrelation
    } catch (e) {
      // Hash darf den Push nicht blocken — fallback ist 'unhashed',
      // Recovery-Logik prüft nur "pendingPush !== null", nicht den Wert.
      return 'unhashed';
    }
  }

  async function _writePendingPushSentinel(sourceId, envelope) {
    let payloadHash = 'unhashed';
    try {
      payloadHash = await _hashPayload(envelope);
    } catch (e) { /* swallow, payloadHash stays 'unhashed' */ }

    const state = _loadState();
    if (!state) return;
    const source = _getSource(state, sourceId);
    if (!source) return;
    source.pendingPush = {
      startedAt: new Date().toISOString(),
      payloadHash: payloadHash,
      etag: source.lastEtag || null,
    };
    try { Sync.save(state); } catch (e) { /* swallow */ }
  }

  function _clearPendingPushSentinel(sourceId) {
    const state = _loadState();
    if (!state) return;
    const source = _getSource(state, sourceId);
    if (!source) return;
    if (source.pendingPush === null || source.pendingPush === undefined) return;
    source.pendingPush = null;
    try { Sync.save(state); } catch (e) { /* swallow */ }
  }

  function _shouldSkipPush(source) {
    // Push-spezifische Skip-Kriterien. autoMode='pull' heißt: User will
    // nur Server-Updates konsumieren, keine eigenen Edits hochschieben.
    if (_global.paused) return 'paused';
    if (!_global.isOnline) return 'offline';
    if (!source) return 'no-source';
    if (source.autoMode === 'off' || source.autoMode === 'pull') return 'push-disabled';
    if (source.permissionRequired === true) return 'permission';
    if (source.authError && source.authError.acknowledged === false) return 'auth';
    if (source._needsRecovery === true) return 'recovery';  // H3 hard-pause
    return null;
  }

  async function _pushTick(sourceId) {
    const runtime = _runtime.get(sourceId);
    if (!runtime) return;
    runtime._pushDebounceTimer = null;

    if (runtime._pushInFlight) {
      // Re-Entrancy: anderer Push läuft schon. scheduleAutoPush() wird
      // nach Abschluss durch den nächsten markDirty erneut greifen.
      return;
    }

    const state = _loadState();
    const source = _getSource(state, sourceId);
    if (!source) return;

    const skipReason = _shouldSkipPush(source);
    if (skipReason) {
      console.debug('[SyncPoller] auto-push skipped', sourceId.slice(0, 8),
        'reason=' + skipReason);
      return;
    }

    // Recovery-Check direkt aus der Persistenz: könnte sich zwischen
    // _runtime-Flag und Storage unterscheiden, wenn die Source via
    // pendingPush wiederhergestellt wurde.
    if (source.pendingPush) {
      runtime._needsRecovery = true;
      console.warn('[SyncPoller] auto-push aborted, pendingPush already set',
        sourceId.slice(0, 8));
      return;
    }

    runtime._pushInFlight = true;
    let envelope = null;
    let resultClass = 'success';
    let sanitizedError = null;

    try {
      // Envelope bauen (verschlüsselt wenn Encryption an). Wir bauen ihn
      // *vor* dem Sentinel-Write, damit _hashPayload den verschlüsselten
      // Blob sieht (Watch-Point 4: kein Klartext-Hash im Storage).
      envelope = await Sync.buildEnvelopeForSource(source);
      await _writePendingPushSentinel(sourceId, envelope);

      // POLL_MODE-Constraint (Watch-Point 7): immer 'status', nie 'full'.
      // Push mit mode='full' (Daten-Push) ist der Data-UI vorbehalten.
      await Sync.push(sourceId, { mode: POLL_MODE });

      // 2xx ok: Sentinel löschen.
      _clearPendingPushSentinel(sourceId);
    } catch (e) {
      // PassphraseRequiredError: Passphrase-Cache leer (Tab-Reload).
      // Wir behandeln das transient — der nächste markDirty triggert
      // einen erneuten Versuch, oder der User entsperrt manuell.
      if (e && e.name === 'PassphraseRequiredError') {
        resultClass = 'transient';
      } else {
        resultClass = _classifyError(e);
      }
      sanitizedError = _sanitizeErrorForStorage(e, resultClass);

      // Bei Fehler: pendingPush bleibt stehen — Boot-Recovery oder nächste
      // erfolgreiche Push-Iteration räumt auf. Bei auth/permission ist das
      // korrekt (User-Aktion nötig); bei transient räumt der nächste
      // erfolgreiche Push auf.
    } finally {
      runtime._pushInFlight = false;
    }

    // State neu laden — push() schreibt selbst.
    const post = _loadState();
    const persistedSource = _getSource(post, sourceId);
    if (!persistedSource) return;

    if (resultClass === 'success') {
      persistedSource.lastAutoPollAt = new Date().toISOString();
      persistedSource.lastAutoPollError = null;
      // Erfolgreicher Push deutet auf Server-Erreichbarkeit hin — Pull-
      // Backoff-Counter resetten, damit der nächste Pull-Tick nicht
      // unnötig auf den Strafdelay wartet.
      runtime.consecutiveFailures = 0;
      runtime.errorDelayMs = 0;
      try { Sync.save(post); } catch (e) { /* swallow */ }
      return;
    }

    if (resultClass === 'transient') {
      persistedSource.lastAutoPollError = sanitizedError;
      try { Sync.save(post); } catch (e) { /* swallow */ }
      console.debug('[SyncPoller] auto-push transient failure', sourceId.slice(0, 8));
      return;
    }

    if (resultClass === 'auth') {
      // Gleiche Logik wie Pull-Tick: autoMode=off, authError setzen.
      persistedSource.autoMode = 'off';
      persistedSource.authError = {
        timestamp: new Date().toISOString(),
        code: sanitizedError ? sanitizedError.code : null,
        acknowledged: false,
      };
      persistedSource.lastAutoPollError = sanitizedError;
      try { Sync.save(post); } catch (e) { /* swallow */ }
      console.warn('[SyncPoller] auto-push auth error -> autoMode=off for source',
        sourceId.slice(0, 8));
      return;
    }

    if (resultClass === 'permission') {
      persistedSource.permissionRequired = true;
      persistedSource.lastAutoPollError = sanitizedError;
      try { Sync.save(post); } catch (e) { /* swallow */ }
      console.warn('[SyncPoller] auto-push permission required for source',
        sourceId.slice(0, 8));
      return;
    }
  }

  function scheduleAutoPush(sourceId, reason) {
    if (!sourceId || typeof sourceId !== 'string') return;

    // Source-Lookup vor Debounce-Setup: wenn die Source autoMode='off'
    // oder 'pull' hat, kein Timer aufsetzen — vermeidet 2 s leerlaufenden
    // Timer bei jedem markDirty mit nicht-push-fähigen Sources.
    const state = _loadState();
    const source = _getSource(state, sourceId);
    if (!source) return;
    if (source.autoMode === 'off' || source.autoMode === 'pull') return;

    // _runtime-Eintrag muss existieren — registerSource() erstellt ihn.
    // Wenn nicht (z.B. Poller noch nicht gestartet): lazy create, damit
    // markDirty vor SyncPoller.start() nicht verloren geht.
    let runtime = _runtime.get(sourceId);
    if (!runtime) {
      runtime = _defaultRuntime(sourceId);
      _runtime.set(sourceId, runtime);
    }

    // Coalescing: läuft schon ein Timer, clearen und neu setzen — der
    // letzte Edit gewinnt.
    if (runtime._pushDebounceTimer !== null) {
      clearTimeout(runtime._pushDebounceTimer);
      runtime._pushDebounceTimer = null;
    }

    runtime._pushDebounceTimer = setTimeout(() => {
      _pushTick(sourceId).catch(e => {
        console.warn('[SyncPoller] _pushTick threw:', e && e.message);
      });
    }, PUSH_DEBOUNCE_MS);
  }

  // Boot-Recovery: beim start() schauen wir, ob eine Source mit
  // pendingPush != null im Storage liegt — Anzeichen dafür, dass ein
  // vorheriger Tab/Window mitten im Push gecrasht ist. Hard-Pause der
  // Source, bis Schritt 6 den User per Modal befragt (Retry / Discard).
  function _detectPendingPushOnBoot() {
    const state = _loadState();
    if (!state || !Array.isArray(state.sources)) return;
    for (const src of state.sources) {
      if (src.pendingPush) {
        let runtime = _runtime.get(src.id);
        if (!runtime) {
          runtime = _defaultRuntime(src.id);
          _runtime.set(src.id, runtime);
        }
        runtime._needsRecovery = true;
        console.warn('[SyncPoller] boot-recovery: source has pendingPush, hard-paused',
          src.id.slice(0, 8), 'startedAt=' + src.pendingPush.startedAt);
      }
    }
  }

  function _rescheduleAllActive(directTick) {
    const state = _loadState();
    if (!state || !Array.isArray(state.sources)) return;
    const sourcesById = {};
    for (const s of state.sources) sourcesById[s.id] = s;

    _runtime.forEach((runtime, sourceId) => {
      const source = sourcesById[sourceId];
      if (!source) return;
      if (source.autoMode === 'off') return;
      if (source.permissionRequired === true) return;
      if (source.authError && source.authError.acknowledged === false) return;
      if (directTick) {
        // Sofort-Tick: 0ms delay. Falls schon inFlight, _tick() blockt
        // durch den Re-Entrancy-Guard.
        _scheduleNext(sourceId, source, runtime, 0);
      } else {
        _scheduleNext(sourceId, source, runtime);
      }
    });
  }

  // ---- Listener-Handler ----

  function _onVisibilityChange() {
    const hidden = (typeof document !== 'undefined') && document.hidden === true;
    _global.visibilityMultiplier = hidden ? VISIBILITY_HIDDEN_MULTIPLIER : 1;
    if (!hidden) {
      // H4-Akzeptanzkriterium: NUR visibilityMultiplier resetten,
      // errorDelayMs bleibt unangetastet. Sources mit aktivem Backoff
      // erholen sich weiterhin gemäß ihrer eigenen Kurve.
      console.debug('[SyncPoller] visibility -> visible');
      _rescheduleAllActive(/*directTick*/ false);
    } else {
      console.debug('[SyncPoller] visibility -> hidden (multiplier x' + VISIBILITY_HIDDEN_MULTIPLIER + ')');
      _rescheduleAllActive(/*directTick*/ false);
    }
  }

  function _onOnline() {
    _global.isOnline = true;
    // H1: offlineSince zurücksetzen, sobald wir wieder online sind.
    try {
      const state = Sync.load();
      if (state && state.auto && state.auto.offlineSince !== null) {
        state.auto.offlineSince = null;
        Sync.save(state);
      }
    } catch (e) {
      console.warn('[SyncPoller] online handler: Sync.load/save failed:', e && e.message);
    }
    // H1: Direkter Tick für alle aktiven Sources — User soll nicht auf
    // das nächste Intervall warten müssen.
    console.debug('[SyncPoller] online -> direct tick for active sources');
    _rescheduleAllActive(/*directTick*/ true);
  }

  function _onOffline() {
    _global.isOnline = false;
    try {
      const state = Sync.load();
      if (state && state.auto && state.auto.offlineSince === null) {
        state.auto.offlineSince = new Date().toISOString();
        Sync.save(state);
      }
    } catch (e) {
      console.warn('[SyncPoller] offline handler: Sync.load/save failed:', e && e.message);
    }
    console.debug('[SyncPoller] offline');
    // Ticks werden in _shouldSkipTick() abgewiesen, Timer laufen weiter.
  }

  // ---- Lifecycle ----

  function start() {
    if (_global.started) return;
    _global.started = true;

    if (typeof document !== 'undefined') {
      _global.visibilityMultiplier = document.hidden === true
        ? VISIBILITY_HIDDEN_MULTIPLIER
        : 1;
      _global.visibilityListener = _onVisibilityChange;
      document.addEventListener('visibilitychange', _global.visibilityListener);
    }

    if (typeof window !== 'undefined') {
      _global.onlineListener = _onOnline;
      _global.offlineListener = _onOffline;
      window.addEventListener('online', _global.onlineListener);
      window.addEventListener('offline', _global.offlineListener);
    }

    // V2.0 Schritt 4 (H3): Boot-Recovery — Sources mit pendingPush != null
    // im Storage werden hard-paused, bis Schritt 6 das Recovery-Modal
    // rendert. _needsRecovery=true verhindert sowohl Auto-Push als auch
    // Auto-Pull für diese Source.
    try { _detectPendingPushOnBoot(); }
    catch (e) { console.warn('[SyncPoller] boot-recovery failed:', e && e.message); }
  }

  function stop() {
    if (!_global.started) return;

    // Watch-Point 5: stop() ist vollständiger Lifecycle-Reset (z.B. Tab-
    // Cleanup, Source-Komplettentfernung). Wir leeren _runtime hier,
    // damit ein späteres start() mit sauberen Backoff-Countern startet.
    // pause() hingegen behält die Counter, weil pause() für User-Wartung
    // gedacht ist und der Backoff sich nur durch echten Erfolg auflösen
    // soll.
    _runtime.forEach((rt) => {
      if (rt.timerId !== null) {
        clearTimeout(rt.timerId);
        rt.timerId = null;
      }
      // V2.0 Schritt 4: Push-Debounce-Timer mitcancelen.
      if (rt._pushDebounceTimer !== null) {
        clearTimeout(rt._pushDebounceTimer);
        rt._pushDebounceTimer = null;
      }
    });
    _runtime.clear();

    if (_global.visibilityListener && typeof document !== 'undefined') {
      document.removeEventListener('visibilitychange', _global.visibilityListener);
      _global.visibilityListener = null;
    }
    if (_global.onlineListener && typeof window !== 'undefined') {
      window.removeEventListener('online', _global.onlineListener);
      _global.onlineListener = null;
    }
    if (_global.offlineListener && typeof window !== 'undefined') {
      window.removeEventListener('offline', _global.offlineListener);
      _global.offlineListener = null;
    }

    _global.started = false;
  }

  function pause() {
    if (_global.paused) return;
    _global.paused = true;
    // Watch-Point 5: laufende Timer cancelen, aber _runtime behalten.
    // consecutiveFailures und errorDelayMs überleben resume() — bewusste
    // Entscheidung: wenn Backend tot war und User während der Wartung
    // pausiert/resumed, soll der Backoff sich erst durch echten Erfolg
    // (success-Branch in _tick) auflösen.
    _runtime.forEach((rt) => {
      if (rt.timerId !== null) {
        clearTimeout(rt.timerId);
        rt.timerId = null;
      }
      // V2.0 Schritt 4: Push-Debounce-Timer ebenfalls pausieren. resume()
      // setzt ihn NICHT automatisch neu — dazu braucht's einen neuen
      // markDirty (User-Edit). Pending User-Edits gehen also bei pause()
      // verloren, aber dirty=true bleibt im Storage und der nächste Edit
      // nach resume() pusht alles auf einen Schlag.
      if (rt._pushDebounceTimer !== null) {
        clearTimeout(rt._pushDebounceTimer);
        rt._pushDebounceTimer = null;
      }
      rt.nextTickAt = null;
    });
  }

  function resume() {
    if (!_global.paused) return;
    _global.paused = false;
    // Alle aktiven Sources mit ihrem aktuellen errorDelayMs neu planen.
    _rescheduleAllActive(/*directTick*/ false);
  }

  // ---- Source-Registrierung ----

  function registerSource(sourceId) {
    if (!sourceId || typeof sourceId !== 'string') return;
    if (_runtime.has(sourceId)) return;        // idempotent
    const runtime = _defaultRuntime(sourceId);
    _runtime.set(sourceId, runtime);

    // Wenn Poller schon läuft UND die Source autoMode!=='off' hat:
    // ersten Timer aufsetzen. Sonst (autoMode='off' oder Poller noch
    // nicht gestartet) bleibt timerId null — sauberer Eintrag ohne Tick.
    if (!_global.started) return;
    const state = _loadState();
    const source = _getSource(state, sourceId);
    if (!source) return;
    if (source.autoMode === 'off') return;
    if (source.permissionRequired === true) return;
    if (source.authError && source.authError.acknowledged === false) return;
    _scheduleNext(sourceId, source, runtime);
  }

  function unregisterSource(sourceId) {
    if (!sourceId) return;
    const rt = _runtime.get(sourceId);
    if (!rt) return;
    if (rt.timerId !== null) {
      clearTimeout(rt.timerId);
      rt.timerId = null;
    }
    // V2.0 Schritt 4: Auto-Push-Debounce-Timer ebenfalls cancelen.
    if (rt._pushDebounceTimer !== null) {
      clearTimeout(rt._pushDebounceTimer);
      rt._pushDebounceTimer = null;
    }
    _runtime.delete(sourceId);
  }

  // ---- Diagnose ----

  function getStats() {
    // Read-only Snapshot für Settings-UI (Schritt 5). Pro registrierter
    // Source ein Objekt; persistente Felder kommen aus Sync.load(),
    // RAM-Felder aus _runtime.
    let persisted = null;
    try {
      persisted = Sync.load();
    } catch (e) {
      persisted = { sources: [] };
    }
    const sourcesById = {};
    if (persisted && Array.isArray(persisted.sources)) {
      for (const s of persisted.sources) sourcesById[s.id] = s;
    }

    const out = [];
    _runtime.forEach((rt, sourceId) => {
      const src = sourcesById[sourceId] || {};
      out.push({
        sourceId: sourceId,
        autoMode: src.autoMode || 'off',
        pollIntervalSec: typeof src.pollIntervalSec === 'number'
          ? src.pollIntervalSec
          : POLL_INTERVAL_DEFAULT_SEC,
        lastAutoPollAt: src.lastAutoPollAt || null,
        lastAutoPollError: src.lastAutoPollError || null,
        authError: src.authError || null,
        permissionRequired: src.permissionRequired === true,
        // V2.0 Schritt 4: Push/Recovery-Diagnose für Settings-UI (Schritt 5).
        pendingPush: src.pendingPush || null,
        needsRecovery: rt._needsRecovery === true,
        pushDebouncePending: rt._pushDebounceTimer !== null,
        pushInFlight: rt._pushInFlight === true,
        consecutiveFailures: rt.consecutiveFailures,
        errorDelayMs: rt.errorDelayMs,
        nextTickAt: rt.nextTickAt,
        inFlight: rt.inFlight === true,
        isOnline: _global.isOnline,
        isPaused: _global.paused,
        visibilityMultiplier: _global.visibilityMultiplier,
      });
    });
    return out;
  }

  // ---- Public API ----

  return {
    start, stop,
    pause, resume,
    registerSource, unregisterSource,
    scheduleAutoPush,
    getStats,
    CONSTANTS: {
      POLL_MODE,
      VISIBILITY_HIDDEN_MULTIPLIER,
      POLL_INTERVAL_MIN_SEC,
      POLL_INTERVAL_MAX_SEC,
      POLL_INTERVAL_DEFAULT_SEC,
      BACKOFF_MAX_MULTIPLIER,
      PUSH_DEBOUNCE_MS,
    },
  };
})();

/* =========================================================================
   SAMPLE / DEFAULT CONFIG
   Typische Krisenstab-Struktur für Cyber-Security-Vorfälle als Ausgangspunkt.
   ========================================================================= */
const DEFAULT_CONFIG = {
  schemaVersion: 1,
  meta: {

function t(key, replacements) {
  replacements = replacements || {};
  const lang = (State && State.language) || 'de';
  const table = TRANSLATIONS[lang] || TRANSLATIONS.de;

  let template;
  // Plural-Auswahl wenn n (Zahl) gegeben und _one/_other existieren
  if (typeof replacements.n === 'number' &&
      (table[key + '_one'] || table[key + '_other'])) {
    const suffix = replacements.n === 1 ? '_one' : '_other';
    template = table[key + suffix] || TRANSLATIONS.de[key + suffix];
  }
  if (!template) {
    template = table[key] || TRANSLATIONS.de[key] || key;
  }
  return template.replace(/\{(\w+)\}/g, (_, k) =>
    replacements[k] !== undefined ? String(replacements[k]) : '{' + k + '}'
  );
}
