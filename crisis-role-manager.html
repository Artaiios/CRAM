/* =========================================================================
   SIMPLE SYNC
   ----------------------------------------------------------------
   Ziel: Kurzer, telefonisch übertragbarer Code zur Synchronisation
   des Anwesenheitsstatus zwischen zwei Instanzen mit identischer
   Grundkonfiguration.

   Format (alle Hex-Zeichen, Bindestriche nur zur Anzeige):
     V-HHHH-BBBB[-BBBB...]-CC
       V    = 1 Hex: Format-Version (aktuell 1)
       HHHH = 4 Hex: Config-Fingerprint (16-bit Hash der
              sortierten Personen-IDs)
       BBBB = Bitvektor als Hex-Bytes (1 Bit pro Person,
              sortiert nach ID; 1 = abwesend, 0 = verfügbar)
       CC   = 2 Hex: XOR-Prüfsumme über alle Payload-Bytes
              (erkennt Tippfehler bei Übertragung)

   Beispiel bei 12 Personen, niemand abwesend:
     "1-A3F2-0000-A3"  (11 Zeichen ohne Bindestriche)
   ========================================================================= */
const SYNC_VERSION = 2;
// V1 war: Version + Hash + Bitvector + Checksum
// V2 ergänzt: optionale manuelle Zuordnungen als (Rollen-Idx, Personen-Idx)-Paare

function getSortedPersonIds(config) {
  return [...config.persons].map(p => p.id).sort();
}

// Liefert eine stabile, sortierte Liste aller Rollen-IDs über alle Ebenen.
// Sortiert nach roleId — nicht nach Level-Reihenfolge, damit Umsortierungen
// die Indizes nicht verschieben solange die IDs gleich bleiben.
function getSortedRoleIds(config) {
  const ids = [];
  (config.levels || []).forEach(lvl => {
    (lvl.roles || []).forEach(r => ids.push(r.id));
  });
  return ids.sort();
}

// 16-bit djb2-artiger Hash der sortierten Personen-IDs
function computeConfigHash(config) {
  const input = getSortedPersonIds(config).join('|');
  let h = 5381;
  for (let i = 0; i < input.length; i++) {
    h = (((h << 5) + h) + input.charCodeAt(i)) | 0;
  }
  return ((h >>> 0) & 0xFFFF).toString(16).padStart(4, '0').toUpperCase();
}

function encodeAvailabilityBitvector(config, runtime) {
  const ids = getSortedPersonIds(config);
  const unavailable = runtime.unavailable || {};
  const numBytes = Math.ceil(ids.length / 8);
  const bytes = new Array(numBytes).fill(0);
  ids.forEach((id, idx) => {
    if (unavailable[id]) {
      const byteIdx = Math.floor(idx / 8);
      const bitIdx = 7 - (idx % 8);
      bytes[byteIdx] |= (1 << bitIdx);
    }
  });
  return bytes.map(b => b.toString(16).padStart(2, '0').toUpperCase()).join('');
}

function decodeAvailabilityBitvector(config, hex) {
  const ids = getSortedPersonIds(config);
  const expectedBytes = Math.ceil(ids.length / 8);
  if (hex.length !== expectedBytes * 2) {
    throw new Error(t('sync.err_bitvector_length', { expected: expectedBytes * 2, got: hex.length }));
  }
  const absent = [];
  for (let i = 0; i < ids.length; i++) {
    const byteIdx = Math.floor(i / 8);
    const bitIdx = 7 - (i % 8);
    const byteHex = hex.substr(byteIdx * 2, 2);
    const byte = parseInt(byteHex, 16);
    if (Number.isNaN(byte)) throw new Error(t('sync.err_hex'));
    if (byte & (1 << bitIdx)) absent.push(ids[i]);
  }
  return absent;
}

// Kodiert manuelle Zuordnungen als (Rollen-Idx, Personen-Idx)-Paare.
// Format: 2 Hex-Zeichen Anzahl (0..255) + N × 4 Hex-Zeichen (je 2 für Role-Idx, 2 für Person-Idx).
// Unbekannte Rollen oder Personen werden übersprungen (defensiv für Config-Drift,
// den Hash-Check fängt so einen Fall aber schon vorher ab).
function encodeManualAssignments(config, runtime) {
  const manual = runtime.manualAssignments || {};
  const roleIds = getSortedRoleIds(config);
  const personIds = getSortedPersonIds(config);
  const roleIdxMap = new Map(roleIds.map((id, i) => [id, i]));
  const personIdxMap = new Map(personIds.map((id, i) => [id, i]));

  const pairs = [];
  Object.keys(manual).forEach(roleId => {
    const personId = manual[roleId];
    const rIdx = roleIdxMap.get(roleId);
    const pIdx = personIdxMap.get(personId);
    if (rIdx === undefined || pIdx === undefined) return;
    if (rIdx > 255 || pIdx > 255) return; // Schutz vor Überlauf: nur 2 Hex-Zeichen = 0..255
    pairs.push([rIdx, pIdx]);
  });

  if (pairs.length > 255) {
    // sehr unrealistisch, aber schützen
    pairs.length = 255;
  }

  const countHex = pairs.length.toString(16).padStart(2, '0').toUpperCase();
  const pairsHex = pairs.map(([r, p]) =>
    r.toString(16).padStart(2, '0').toUpperCase() +
    p.toString(16).padStart(2, '0').toUpperCase()
  ).join('');
  return countHex + pairsHex;
}

function decodeManualAssignments(config, hex) {
  if (hex.length < 2) throw new Error(t('sync.err_manuals_short'));
  const countHex = hex.substr(0, 2);
  const count = parseInt(countHex, 16);
  if (Number.isNaN(count)) throw new Error(t('sync.err_hex'));
  const expectedLen = 2 + count * 4;
  if (hex.length !== expectedLen) {
    throw new Error(t('sync.err_manuals_length', { expected: expectedLen, got: hex.length }));
  }
  const roleIds = getSortedRoleIds(config);
  const personIds = getSortedPersonIds(config);
  const out = {};
  for (let i = 0; i < count; i++) {
    const off = 2 + i * 4;
    const rIdx = parseInt(hex.substr(off, 2), 16);
    const pIdx = parseInt(hex.substr(off + 2, 2), 16);
    if (Number.isNaN(rIdx) || Number.isNaN(pIdx)) throw new Error(t('sync.err_hex'));
    const roleId = roleIds[rIdx];
    const personId = personIds[pIdx];
    if (roleId === undefined || personId === undefined) {
      throw new Error(t('sync.err_manuals_range'));
    }
    out[roleId] = personId;
  }
  return out;
}

function computeXorChecksum(hexString) {
  let sum = 0;
  for (let i = 0; i < hexString.length; i += 2) {
    const byte = parseInt(hexString.substr(i, 2), 16);
    if (Number.isNaN(byte)) throw new Error(t('sync.err_hex'));
    sum ^= byte;
  }
  return sum.toString(16).padStart(2, '0').toUpperCase();
}

function generateSyncCode(config, runtime) {
  const versionHex = SYNC_VERSION.toString(16).toUpperCase();
  const hashHex = computeConfigHash(config);
  const vectorHex = encodeAvailabilityBitvector(config, runtime);
  // V2: Manuelle Zuordnungen als zusätzliches Segment
  const manualsHex = encodeManualAssignments(config, runtime);
  // Prüfsumme über alle Nutzdaten (ohne Version)
  const checksumHex = computeXorChecksum(hashHex + vectorHex + manualsHex);
  return versionHex + hashHex + vectorHex + manualsHex + checksumHex;
}

function formatSyncCode(raw) {
  // In 4er-Gruppen mit Bindestrich darstellen
  return raw.match(/.{1,4}/g).join('-');
}

function parseSyncCode(rawInput) {
  // Normalisieren: alles ausser Hex-Zeichen entfernen, uppercase
  const clean = rawInput.toUpperCase().replace(/[^0-9A-F]/g, '');
  // Mindestlänge: 1 (Version) + 4 (Hash) + 2 (Vektor, 1 Byte) + 2 (Prüfsumme) = 9
  if (clean.length < 9) {
    throw new Error(t('sync.err_too_short'));
  }
  const version = parseInt(clean[0], 16);
  // Akzeptiere V1 und V2 — neuere V2-Clients lesen V1-Codes ohne Manuals,
  // V1-Clients würden V2-Codes mit sync.err_version ablehnen (erwünscht).
  if (version !== 1 && version !== 2) {
    throw new Error(t('sync.err_version', { v: version }));
  }

  const hashHex = clean.substr(1, 4);
  const checksumHex = clean.slice(-2);

  // Bitvektor-Länge aus der lokalen Config ableiten — Sender und Empfänger
  // müssen dieselbe Personenanzahl haben (sonst schlägt eh der Hash-Check fehl).
  const personsCount = (State.config.persons || []).length;
  const vectorBytes = Math.ceil(personsCount / 8);
  const vectorLen = vectorBytes * 2;
  if (clean.length < 1 + 4 + vectorLen + 2) {
    throw new Error(t('sync.err_too_short'));
  }
  const vectorHex = clean.substr(5, vectorLen);

  // V2: manuelle Zuordnungen folgen nach Vektor
  let manualsHex = '';
  if (version === 2) {
    const restAfterVector = clean.length - (5 + vectorLen) - 2; // minus Checksum
    if (restAfterVector < 2) {
      throw new Error(t('sync.err_manuals_short'));
    }
    manualsHex = clean.substr(5 + vectorLen, restAfterVector);
  }

  const expectedChecksum = computeXorChecksum(hashHex + vectorHex + manualsHex);
  if (checksumHex !== expectedChecksum) {
    throw new Error(t('sync.err_checksum', { expected: expectedChecksum, got: checksumHex }));
  }
  return { version, hash: hashHex, vector: vectorHex, manuals: manualsHex };
}

function applySyncCode(rawInput) {
  const parsed = parseSyncCode(rawInput);
  const currentHash = computeConfigHash(State.config);
  if (parsed.hash !== currentHash) {
    throw new Error(t('sync.err_fingerprint', { local: currentHash, code: parsed.hash }));
  }
  const absentIds = decodeAvailabilityBitvector(State.config, parsed.vector);

  // V2: manuelle Zuordnungen dekodieren
  let incomingManuals = {};
  if (parsed.version === 2 && parsed.manuals) {
    incomingManuals = decodeManualAssignments(State.config, parsed.manuals);
  }
  const absentSet = new Set(absentIds);

  // Neue unavailable-Map: bestehende Metadaten erhalten wo möglich
  const newUnavailable = {};
  const now = new Date().toISOString();
  absentIds.forEach(id => {
    if (State.runtime.unavailable && State.runtime.unavailable[id]) {
      newUnavailable[id] = State.runtime.unavailable[id];
    } else {
      newUnavailable[id] = {
        since: now,
        category: 'sonstiges',
        note: t('sync.note_via_sync'),
      };
    }
  });

  // Diff für Audit-Log berechnen
  const previousIds = new Set(Object.keys(State.runtime.unavailable || {}));
  const newIds = new Set(absentIds);
  const becameAbsent = [...newIds].filter(id => !previousIds.has(id));
  const becameAvailable = [...previousIds].filter(id => !newIds.has(id));

  // Manuelle Zuordnungen: komplett durch Sync-Daten ersetzen (auch leer = leer)
  const previousManuals = State.runtime.manualAssignments || {};
  const prevManualKeys = Object.keys(previousManuals);
  const newManualKeys = Object.keys(incomingManuals);
  const manualsChanged = prevManualKeys.length !== newManualKeys.length ||
    prevManualKeys.some(k => previousManuals[k] !== incomingManuals[k]);

  State.runtime.unavailable = newUnavailable;
  State.runtime.manualAssignments = incomingManuals;
  Storage.saveRuntime(State.runtime);

  Storage.appendAudit({
    id: uid('a'),
    timestamp: now,
    type: 'sync_applied',
    action: 'sync_applied',
    hash: parsed.hash,
    totalAbsent: absentIds.length,
    becameAbsent,
    becameAvailable,
    manualsCount: newManualKeys.length,
    manualsChanged,
  });

  render();

  return {
    totalAbsent: absentIds.length,
    becameAbsent: becameAbsent.length,
    becameAvailable: becameAvailable.length,
    manualsCount: newManualKeys.length,
    manualsChanged,
  };
}

/* =========================================================================
   QR-CODE TRANSFER
   ----------------------------------------------------------------
   Überträgt Config und/oder Status per QR-Code. Wenn die komprimierten
   Daten in einen einzigen QR passen, gibt's einen QR-Code. Andernfalls
   werden die Daten in mehrere Fragmente zerlegt, die nacheinander
   gescannt werden müssen.

   Fragment-Protokoll:
     CRAMv1|{transferId}|{seq}/{total}|{scope}|{payload}

     transferId  : 6 Zeichen Hex, zufällig je Transfer.
                   Verhindert Vermischung verschiedener Exports.
     seq         : 1-basiert, laufende Nummer.
     total       : Gesamtzahl Fragmente.
     scope       : 'c' (config), 's' (status), 'cs' (beides).
     payload     : Base64 eines Stücks der gzip-komprimierten JSON.

   Empfänger sammelt Fragmente, sobald alle seq∈[1..total] da sind →
   zusammenführen, Base64-decode, gunzip, JSON parse, Import-Preview.
   ========================================================================= */

// QR Version 10 bei Error-Correction-Level 'M' kann ca. 271 alphanumerische
// oder ~213 Byte-Zeichen aufnehmen. Wir sind im Byte-Modus (Base64 enthält
// /+= die NICHT alphanumerisch sind). Für zuverlässiges Scannen auf mobilen
// Kameras begrenzen wir die Payload pro Fragment bewusst konservativ.
const QR_FRAGMENT_PAYLOAD_MAX = 400;
const QR_SCOPE_CONFIG = 'c';
const QR_SCOPE_STATUS = 's';
const QR_SCOPE_BOTH = 'cs';
const QR_PROTOCOL_PREFIX = 'CRAMv1';

function buildTransferPayload(scope) {
  // Erzeugt das Objekt, das serialisiert und komprimiert wird
  const payload = { v: 1, scope };
  if (scope === QR_SCOPE_CONFIG || scope === QR_SCOPE_BOTH) {
    payload.config = State.config;
  }
  if (scope === QR_SCOPE_STATUS || scope === QR_SCOPE_BOTH) {
    payload.runtime = {
      unavailable: State.runtime.unavailable || {},
      manualAssignments: State.runtime.manualAssignments || {},
    };
  }
  return payload;
}

function compressAndEncodePayload(payload) {
  // JSON → UTF-8 Bytes → gzip → Base64
  const json = JSON.stringify(payload);
  const bytes = new TextEncoder().encode(json);
  const compressed = fflate.gzipSync(bytes, { level: 9 });
  // Uint8Array → Base64: via btoa, aber btoa nimmt nur Strings mit
  // einzelnen Bytes. Wir müssen die Uint8Array in einen String umwandeln.
  let binary = '';
  const chunk = 0x8000;
  for (let i = 0; i < compressed.length; i += chunk) {
    binary += String.fromCharCode.apply(null, compressed.subarray(i, i + chunk));
  }
  return btoa(binary);
}

function decodeAndDecompressPayload(base64) {
  // Base64 → Bytes → gunzip → JSON
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  const decompressed = fflate.gunzipSync(bytes);
  const json = new TextDecoder().decode(decompressed);
  return JSON.parse(json);
}

function generateTransferId() {
  // 6 Hex-Zeichen, genug Entropie um Kollisionen zwischen gleichzeitigen Exports praktisch auszuschließen
  const bytes = new Uint8Array(3);
  (crypto.getRandomValues || crypto.randomFillSync).call(crypto, bytes);
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
}

function chunkIntoFragments(base64, scope, transferId) {
  const total = Math.max(1, Math.ceil(base64.length / QR_FRAGMENT_PAYLOAD_MAX));
  const fragments = [];
  for (let i = 0; i < total; i++) {
    const seq = i + 1;
    const chunk = base64.substr(i * QR_FRAGMENT_PAYLOAD_MAX, QR_FRAGMENT_PAYLOAD_MAX);
    const fragment = `${QR_PROTOCOL_PREFIX}|${transferId}|${seq}/${total}|${scope}|${chunk}`;
    fragments.push(fragment);
  }
  return fragments;
}

function parseFragment(raw) {
  // Parst einen einzelnen QR-Fragment-String.
  // Wirft Error bei Format-Mismatch — Aufrufer sollte das fangen
  // (Scanner bekommt irrelevante QRs, einfach ignorieren).
  if (typeof raw !== 'string') throw new Error('invalid-fragment-type');
  const parts = raw.split('|');
  if (parts.length !== 5) throw new Error('invalid-fragment-shape');
  const [prefix, transferId, seqTotal, scope, payload] = parts;
  if (prefix !== QR_PROTOCOL_PREFIX) throw new Error('invalid-fragment-prefix');
  if (!/^[0-9A-F]{6}$/.test(transferId)) throw new Error('invalid-transfer-id');
  const stMatch = seqTotal.match(/^(\d+)\/(\d+)$/);
  if (!stMatch) throw new Error('invalid-seq');
  const seq = parseInt(stMatch[1], 10);
  const total = parseInt(stMatch[2], 10);
  if (seq < 1 || seq > total || total < 1 || total > 999) throw new Error('invalid-seq-range');
  if (!['c', 's', 'cs'].includes(scope)) throw new Error('invalid-scope');
  if (!payload) throw new Error('empty-payload');
  return { prefix, transferId, seq, total, scope, payload };
}

function assembleFragments(fragments) {
  // fragments: Array von parseFragment-Ergebnissen, alle mit selber transferId
  // Wenn alle seq vorhanden: in Reihenfolge zusammenfügen → Base64-String
  if (!fragments || fragments.length === 0) throw new Error('no-fragments');
  const total = fragments[0].total;
  const transferId = fragments[0].transferId;
  const scope = fragments[0].scope;
  const sorted = [...fragments].sort((a, b) => a.seq - b.seq);
  const seen = new Set();
  const payload = sorted.map(f => {
    if (f.total !== total) throw new Error('total-mismatch');
    if (f.transferId !== transferId) throw new Error('transfer-id-mismatch');
    if (f.scope !== scope) throw new Error('scope-mismatch');
    if (seen.has(f.seq)) throw new Error('duplicate-seq');
    seen.add(f.seq);
    return f.payload;
  }).join('');
  if (seen.size !== total) throw new Error('incomplete-fragments');
  return { base64: payload, scope, transferId };
}

// Zentrale Funktion: erzeugt alle Fragmente für einen Transfer-Scope
function buildTransferFragments(scope) {
  const payload = buildTransferPayload(scope);
  const base64 = compressAndEncodePayload(payload);
  const transferId = generateTransferId();
  const fragments = chunkIntoFragments(base64, scope, transferId);
  return {
    fragments,
    transferId,
    scope,
    totalBytes: base64.length,
    fragmentCount: fragments.length,
  };
}

function renderQRCodeSVG(data, targetSizePx) {
  // Erzeugt SVG-String eines QR-Codes. targetSizePx ≈ gewünschte Pixelgröße.
  // Version 0 = automatisch passende Version finden.
  // ECC-Level 'M' (~15% Wiederherstellung) als guter Kompromiss zwischen
  // Kapazität und Fehlertoleranz.
  const qr = qrcode(0, 'M');
  qr.addData(data);
  qr.make();
  const moduleCount = qr.getModuleCount();
  const cellSize = Math.max(1, Math.floor(targetSizePx / (moduleCount + 2)));
  const margin = cellSize; // ein Modul Rand
  const sizePx = cellSize * moduleCount + 2 * margin;
  const rects = [];
  for (let row = 0; row < moduleCount; row++) {
    for (let col = 0; col < moduleCount; col++) {
      if (qr.isDark(row, col)) {
        const x = margin + col * cellSize;
        const y = margin + row * cellSize;
        rects.push(`<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}"/>`);
      }
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${sizePx}" height="${sizePx}" viewBox="0 0 ${sizePx} ${sizePx}">
    <rect x="0" y="0" width="${sizePx}" height="${sizePx}" fill="#ffffff"/>
    <g fill="#000000">${rects.join('')}</g>
  </svg>`;
}

/* =========================================================================
   QR-SEND STATE + WORKFLOW
   ========================================================================= */
const QR_DEFAULT_SCOPE = 'cs';
const QR_AUTOCYCLE_MS = 2500;

function qrResetSendState() {
  if (State.qrSendState && State.qrSendState.autoCycleTimer) {
    clearInterval(State.qrSendState.autoCycleTimer);
  }
  State.qrSendState = {
    scope: (State.qrSendState && State.qrSendState.scope) || QR_DEFAULT_SCOPE,
    fragments: [],
    currentIndex: 0,
    autoCycle: false,
    autoCycleTimer: null,
    transferId: null,
    totalBytes: 0,
  };
  renderSyncModal();
}

function qrGenerateFragments() {
  try {
    const scope = State.qrSendState.scope || QR_DEFAULT_SCOPE;
    const result = buildTransferFragments(scope);
    State.qrSendState.fragments = result.fragments;
    State.qrSendState.currentIndex = 0;
    State.qrSendState.transferId = result.transferId;
    State.qrSendState.totalBytes = result.totalBytes;
    renderSyncModal();
  } catch (e) {
    showToast(t('qr.err_generate') + ': ' + (e.message || e), 'warning');
    console.error('QR generate failed:', e);
  }
}

function qrNavigateFragment(delta) {
  const s = State.qrSendState;
  if (!s || !s.fragments || s.fragments.length === 0) return;
  const n = s.fragments.length;
  s.currentIndex = (s.currentIndex + delta + n) % n;
  renderSyncModal();
}

function qrToggleAutocycle() {
  const s = State.qrSendState;
  if (!s) return;
  if (s.autoCycleTimer) {
    clearInterval(s.autoCycleTimer);
    s.autoCycleTimer = null;
    s.autoCycle = false;
  } else {
    s.autoCycle = true;
    s.autoCycleTimer = setInterval(() => {
      qrNavigateFragment(1);
    }, QR_AUTOCYCLE_MS);
  }
  renderSyncModal();
}

function qrCleanupOnModalClose() {
  if (State.qrSendState && State.qrSendState.autoCycleTimer) {
    clearInterval(State.qrSendState.autoCycleTimer);
    State.qrSendState.autoCycleTimer = null;
    State.qrSendState.autoCycle = false;
  }
}

/* =========================================================================
   QR-RECEIVE STATE + SCANNER
   ----------------------------------------------------------------
   Scanner nutzt die native BarcodeDetector-API (Chrome/Edge/Safari).
   Fallback-Verhalten: Firefox sieht klare Fehlermeldung mit Hinweis
   auf Browser-Wechsel oder JSON-Import als Alternative.

   Fragmente werden nach (transferId, seq) gesammelt, Duplikate
   stillschweigend verworfen. Sobald alle seq∈[1..total] da sind,
   wird der Payload zusammengesetzt, dekomprimiert und als
   Import-Preview dem User zur Bestätigung gezeigt.
   ========================================================================= */
const QR_SCAN_INTERVAL_MS = 250;  // 4 FPS — reicht für Handhold, schont CPU

function qrResetReceiveState() {
  qrStopScanner();
  State.qrReceiveState = {
    supported: null,        // null = ungeprüft, true/false nach erstem Start
    active: false,          // Scanner läuft gerade
    error: null,            // Fehlermeldung (Permission denied, etc.)
    stream: null,           // MediaStream (Kamera)
    video: null,            // HTMLVideoElement
    detector: null,         // BarcodeDetector-Instanz
    detectTimer: null,      // setInterval-Handle
    transferId: null,       // aktueller Transfer (erstes Fragment setzt ihn)
    expectedTotal: null,    // wie viele Fragmente insgesamt
    scope: null,            // aus Fragment
    collectedFragments: {}, // Map seq → parsed-Fragment
    completed: false,       // alle Fragmente da
    assembledPayload: null, // nach Assemblierung: decodierte JSON
    applyError: null,
  };
  renderSyncModal();
}

async function qrStartScanner() {
  const s = State.qrReceiveState || {};
  if (s.active) return;

  // BarcodeDetector-Verfügbarkeit prüfen
  if (typeof window.BarcodeDetector === 'undefined') {
    State.qrReceiveState.supported = false;
    State.qrReceiveState.error = t('qr.err_not_supported');
    renderSyncModal();
    return;
  }

  // Formate prüfen — qr_code sollte verfügbar sein
  try {
    const formats = await BarcodeDetector.getSupportedFormats();
    if (!formats.includes('qr_code')) {
      State.qrReceiveState.supported = false;
      State.qrReceiveState.error = t('qr.err_no_qr_format');
      renderSyncModal();
      return;
    }
  } catch (e) {
    State.qrReceiveState.supported = false;
    State.qrReceiveState.error = t('qr.err_detector_init') + ': ' + e.message;
    renderSyncModal();
    return;
  }

  State.qrReceiveState.supported = true;
  State.qrReceiveState.error = null;

  // WICHTIG: Erst Video-Element ins DOM rendern, DANN Kamera starten.
  // Vorher war das umgekehrt, was dazu führte dass der Stream sofort
  // wieder freigegeben wurde, weil #qr-scanner-video nicht im DOM war.
  State.qrReceiveState.active = true;
  renderSyncModal();

  // Jetzt ist das Video-Element im DOM
  const video = document.getElementById('qr-scanner-video');
  if (!video) {
    console.error('qr-scanner-video element not in DOM after re-render');
    State.qrReceiveState.active = false;
    State.qrReceiveState.error = 'Internal error: video element not rendered';
    renderSyncModal();
    return;
  }

  // Pre-Flight: Secure-Context prüfen. Chrome/Android verweigert getUserMedia
  // auf file:// und http:// (außer localhost). Geben wir hier eine klare
  // Meldung statt erst bei getUserMedia zu scheitern.
  if (typeof window.isSecureContext !== 'undefined' && !window.isSecureContext) {
    State.qrReceiveState.active = false;
    State.qrReceiveState.error = t('qr.err_insecure_context');
    renderSyncModal();
    return;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    State.qrReceiveState.active = false;
    State.qrReceiveState.error = t('qr.err_no_mediadevices');
    renderSyncModal();
    return;
  }

  // Jetzt erst Kamera anfordern
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false,
    });
  } catch (e) {
    State.qrReceiveState.active = false;
    // Gezielte Fehler-Hilfstexte je nach Fehlertyp
    const errName = e.name || '';
    let hint = '';
    if (errName === 'NotAllowedError' || errName === 'PermissionDeniedError') {
      hint = t('qr.err_permission_denied');
    } else if (errName === 'NotFoundError' || errName === 'DevicesNotFoundError') {
      hint = t('qr.err_no_camera');
    } else if (errName === 'NotReadableError' || errName === 'TrackStartError') {
      hint = t('qr.err_camera_busy');
    } else if (errName === 'OverconstrainedError' || errName === 'ConstraintNotSatisfiedError') {
      // Rückkamera nicht verfügbar? Nochmal ohne facingMode versuchen
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      } catch (e2) {
        hint = t('qr.err_no_camera');
      }
    } else if (errName === 'SecurityError') {
      hint = t('qr.err_insecure_context');
    } else {
      hint = e.message || errName || 'unknown';
    }
    if (!stream) {
      State.qrReceiveState.error = t('qr.err_camera') + ': ' + hint;
      renderSyncModal();
      return;
    }
  }

  // Falls User in der Zwischenzeit gestoppt/navigiert hat, wieder abbauen
  if (!State.qrReceiveState.active) {
    stream.getTracks().forEach(t => t.stop());
    return;
  }

  video.srcObject = stream;
  video.setAttribute('playsinline', 'true');
  try { await video.play(); } catch (e) { console.warn('video.play() failed:', e); }

  const detector = new BarcodeDetector({ formats: ['qr_code'] });

  State.qrReceiveState.stream = stream;
  State.qrReceiveState.video = video;
  State.qrReceiveState.detector = detector;
  State.qrReceiveState.detectTimer = setInterval(() => qrDetectFrame(), QR_SCAN_INTERVAL_MS);
}

function qrStopScanner() {
  const s = State.qrReceiveState;
  if (!s) return;
  if (s.detectTimer) { clearInterval(s.detectTimer); s.detectTimer = null; }
  if (s.stream) {
    s.stream.getTracks().forEach(track => track.stop());
    s.stream = null;
  }
  if (s.video) {
    s.video.srcObject = null;
    s.video = null;
  }
  s.detector = null;
  s.active = false;
}

async function qrDetectFrame() {
  const s = State.qrReceiveState;
  if (!s || !s.active || !s.detector || !s.video || s.completed) return;
  if (s.video.readyState !== s.video.HAVE_ENOUGH_DATA) return;
  let barcodes;
  try {
    barcodes = await s.detector.detect(s.video);
  } catch (e) {
    // Einzelner Detection-Error darf Schleife nicht abbrechen
    return;
  }
  if (!barcodes || barcodes.length === 0) return;
  for (const bc of barcodes) {
    qrIngestFragment(bc.rawValue);
    if (s.completed) break;
  }
}

function qrIngestFragment(rawValue) {
  const s = State.qrReceiveState;
  if (!s || s.completed) return;

  let parsed;
  try { parsed = parseFragment(rawValue); }
  catch (e) {
    // Kein CRAM-Fragment oder kaputt → stillschweigend ignorieren
    return;
  }

  // Wenn neuer Transfer eingeht (oder erster überhaupt), Puffer ggf. resetten
  if (!s.transferId) {
    s.transferId = parsed.transferId;
    s.expectedTotal = parsed.total;
    s.scope = parsed.scope;
  } else if (s.transferId !== parsed.transferId) {
    // Anderer Transfer — wir wechseln den Puffer und zeigen Info
    s.transferId = parsed.transferId;
    s.expectedTotal = parsed.total;
    s.scope = parsed.scope;
    s.collectedFragments = {};
    showToast(t('qr.info_new_transfer', { id: parsed.transferId }), 'info');
  }

  // Duplikat?
  if (s.collectedFragments[parsed.seq]) {
    // Kein re-render nötig, wir haben das Fragment schon
    return;
  }
  s.collectedFragments[parsed.seq] = parsed;

  // Check auf Vollständigkeit
  const collectedCount = Object.keys(s.collectedFragments).length;
  if (collectedCount >= s.expectedTotal) {
    qrFinalizeReceive();
  } else {
    renderQrReceiveStatus();
  }
}

function qrFinalizeReceive() {
  const s = State.qrReceiveState;
  try {
    const fragments = [];
    for (let i = 1; i <= s.expectedTotal; i++) {
      if (!s.collectedFragments[i]) throw new Error('missing-' + i);
      fragments.push(s.collectedFragments[i]);
    }
    const assembled = assembleFragments(fragments);
    const payload = decodeAndDecompressPayload(assembled.base64);

    s.assembledPayload = payload;
    s.completed = true;
    qrStopScanner();  // Kamera frei
    renderSyncModal();
  } catch (e) {
    s.applyError = t('qr.err_assemble') + ': ' + (e.message || e);
    renderSyncModal();
  }
}

function qrApplyReceivedPayload() {
  const s = State.qrReceiveState;
  if (!s || !s.assembledPayload) return;
  const payload = s.assembledPayload;
  const now = new Date().toISOString();

  let configApplied = false;
  let runtimeApplied = false;
  let previousConfigHash = computeConfigHash(State.config);

  try {
    if (payload.config) {
      // Vollständige Config-Ersetzung. Analog zu applyImport.
      // Wir validieren kurz die Grundstruktur.
      if (!Array.isArray(payload.config.levels) || !Array.isArray(payload.config.persons)) {
        throw new Error(t('qr.err_invalid_config'));
      }
      State.config = payload.config;
      State.config.meta = State.config.meta || {};
      State.config.meta.lastModified = now;
      Storage.saveConfig(State.config);
      configApplied = true;
    }

    if (payload.runtime) {
      // Runtime-Daten übernehmen. Voraussetzung: Config-Hash passt
      // (außer eine neue Config wurde im selben Transfer mitgeliefert).
      const currentHash = computeConfigHash(State.config);
      const payloadHashOk = configApplied ||
        payload.runtime.configHash === undefined ||
        payload.runtime.configHash === currentHash;

      // Ohne Config-Übertragung prüfen wir den Hash (falls drin) sonst pragmatisch
      // übernehmen wir runtime — der User hat es explizit so konfiguriert.
      const rt = payload.runtime;
      State.runtime.unavailable = rt.unavailable || {};
      State.runtime.manualAssignments = rt.manualAssignments || {};
      Storage.saveRuntime(State.runtime);
      runtimeApplied = true;
    }

    // Audit-Log
    const levels = State.config.levels ? State.config.levels.length : 0;
    const persons = State.config.persons ? State.config.persons.length : 0;
    Storage.appendAudit({
      id: uid('a'),
      timestamp: now,
      type: 'qr_imported',
      action: 'qr_imported',
      scope: payload.scope || s.scope,
      transferId: s.transferId,
      configApplied,
      runtimeApplied,
      levels, persons,
      previousConfigHash,
      newConfigHash: computeConfigHash(State.config),
    });

    closeModal();
    render();

    // Toast — was passiert ist
    const parts = [];
    if (configApplied) parts.push(t('qr.toast_config_imported', { levels, persons }));
    if (runtimeApplied) {
      const absentCount = Object.keys(State.runtime.unavailable).length;
      const manualCount = Object.keys(State.runtime.manualAssignments).length;
      parts.push(t('qr.toast_status_imported', { absent: absentCount, manual: manualCount }));
    }
    showToast(parts.join(' · '), 'success');
  } catch (e) {
    s.applyError = (e.message || e);
    renderSyncModal();
  }
}

/* ---- Sync Modal ---- */
function openSyncModal() {
  State.syncMode = State.syncMode || 'send';
  State.syncChannel = State.syncChannel || 'code';
  if (!State.qrSendState) qrResetSendState();
  renderSyncModal();
  document.getElementById('modal-backdrop').style.display = 'flex';
}

function renderSyncModal() {
  const mode = State.syncMode || 'send';
  document.getElementById('modal-title').textContent = t('sync.title');

  const body = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');
  const channel = State.syncChannel || 'code';

  // Kanal-Auswahl (Code vs QR) — immer oben
  const channelPickerHTML = `
    <div class="sync-channel-picker">
      <button class="sync-channel-btn" data-action="sync-mode-code" ${channel === 'code' ? 'data-active="true"' : ''}>
        <div class="sync-channel-label">${escapeHTML(t('sync.mode_code'))}</div>
        <div class="sync-channel-hint">${escapeHTML(t('sync.mode_code_hint'))}</div>
      </button>
      <button class="sync-channel-btn" data-action="sync-mode-qr" ${channel === 'qr' ? 'data-active="true"' : ''}>
        <div class="sync-channel-label">${escapeHTML(t('sync.mode_qr'))}</div>
        <div class="sync-channel-hint">${escapeHTML(t('sync.mode_qr_hint'))}</div>
      </button>
    </div>
  `;

  // Send/Receive-Tabs (nur für Code-Kanal)
  const tabsHTML = `
    <div class="sync-tabs">
      <button class="sync-tab" data-action="sync-tab-send" ${mode === 'send' ? 'data-active="true"' : ''}>
        ${escapeHTML(t('sync.tab_send'))}
      </button>
      <button class="sync-tab" data-action="sync-tab-receive" ${mode === 'receive' ? 'data-active="true"' : ''}>
        ${escapeHTML(t('sync.tab_receive'))}
      </button>
    </div>
  `;

  if (channel === 'qr') {
    // QR-Kanal hat eigene Send/Receive-Tabs
    const qrTabsHTML = `
      <div class="sync-tabs">
        <button class="sync-tab" data-action="sync-tab-send" ${mode === 'send' ? 'data-active="true"' : ''}>
          ${escapeHTML(t('sync.tab_send'))}
        </button>
        <button class="sync-tab" data-action="sync-tab-receive" ${mode === 'receive' ? 'data-active="true"' : ''}>
          ${escapeHTML(t('sync.tab_receive'))}
        </button>
      </div>
    `;
    if (mode === 'send') {
      renderQrSendView(body, footer, channelPickerHTML + qrTabsHTML);
    } else {
      renderQrReceiveView(body, footer, channelPickerHTML + qrTabsHTML);
    }
    return;
  }

  if (mode === 'send') {
    const raw = generateSyncCode(State.config, State.runtime);
    const formatted = formatSyncCode(raw);
    const hash = computeConfigHash(State.config);
    const absentCount = Object.keys(State.runtime.unavailable || {}).length;

    body.innerHTML = `
      ${channelPickerHTML}
      ${tabsHTML}
      <div class="sync-explain">${escapeHTML(t('sync.explain_send'))}</div>
      <div class="sync-code-display" id="sync-code-display">${escapeHTML(formatted)}</div>
      <div class="sync-meta-row">
        <div class="sync-meta-item">
          <span class="sync-meta-label">${escapeHTML(t('sync.meta_fingerprint'))}</span>
          <span class="sync-meta-value"><code>${escapeHTML(hash)}</code></span>
        </div>
        <div class="sync-meta-item">
          <span class="sync-meta-label">${escapeHTML(t('sync.meta_persons'))}</span>
          <span class="sync-meta-value">${State.config.persons.length}</span>
        </div>
        <div class="sync-meta-item">
          <span class="sync-meta-label">${escapeHTML(t('sync.meta_absent'))}</span>
          <span class="sync-meta-value">${absentCount}</span>
        </div>
        <div class="sync-meta-item">
          <span class="sync-meta-label">${escapeHTML(t('sync.meta_chars'))}</span>
          <span class="sync-meta-value">${raw.length}</span>
        </div>
      </div>
    `;
    footer.innerHTML = `
      <button class="btn-secondary" data-action="modal-close">${escapeHTML(t('btn.close'))}</button>
      <button class="btn-primary" data-action="sync-copy">${escapeHTML(t('btn.copy'))}</button>
    `;
  } else {
    const currentHash = computeConfigHash(State.config);
    body.innerHTML = `
      ${channelPickerHTML}
      ${tabsHTML}
      <div class="sync-explain">${escapeHTML(t('sync.explain_receive'))}</div>
      <div class="form-field">
        <label class="form-label" for="sync-input">${escapeHTML(t('sync.code_label'))}</label>
        <input type="text"
               id="sync-input"
               class="form-input sync-input"
               placeholder="${escapeHTML(formatSyncCode('1' + currentHash + '0000AB'))}"
               autocomplete="off"
               spellcheck="false" />
      </div>
      <div class="sync-meta-row">
        <div class="sync-meta-item">
          <span class="sync-meta-label">${escapeHTML(t('sync.own_fingerprint'))}</span>
          <span class="sync-meta-value"><code>${escapeHTML(currentHash)}</code></span>
        </div>
        <div class="sync-meta-item" id="sync-input-meta" style="display: none;">
          <span class="sync-meta-label">${escapeHTML(t('sync.entered_fingerprint'))}</span>
          <span class="sync-meta-value" id="sync-input-hash"><code>—</code></span>
        </div>
      </div>
      <div id="sync-feedback" class="sync-feedback" role="status" aria-live="polite"></div>
    `;
    footer.innerHTML = `
      <button class="btn-secondary" data-action="modal-cancel">${escapeHTML(t('btn.cancel'))}</button>
      <button class="btn-primary" data-action="sync-apply">${escapeHTML(t('btn.apply'))}</button>
    `;
  }

  // Nicht-Click-spezifische Handler (input, focus) müssen direkt bleiben
  if (mode === 'receive' && channel === 'code') {
    const input = document.getElementById('sync-input');
    input.addEventListener('input', handleSyncInputChange);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSyncAction('apply');
      }
    });
    setTimeout(() => input.focus(), 50);
  }
}

/* =========================================================================
   QR-SEND VIEW — Render-Logik für QR-Kanal
   ----------------------------------------------------------------
   Zustände:
     1. noch nichts generiert → Scope-Picker + Generate-Button
     2. Fragmente erzeugt → QR-Display mit Navigation
   ========================================================================= */
function renderQrSendView(body, footer, headerHTML) {
  const s = State.qrSendState;
  const hasFragments = s.fragments && s.fragments.length > 0;

  if (!hasFragments) {
    // Scope-Picker-Phase
    const scopeOptions = [
      { v: 'c',  labelKey: 'qr.scope_config', hintKey: 'qr.scope_config_hint' },
      { v: 's',  labelKey: 'qr.scope_status', hintKey: 'qr.scope_status_hint' },
      { v: 'cs', labelKey: 'qr.scope_both',   hintKey: 'qr.scope_both_hint' },
    ];
    body.innerHTML = `
      ${headerHTML}
      <div class="sync-explain">${escapeHTML(t('qr.send_intro'))}</div>
      <div class="form-field" style="margin-top: 12px;">
        <label class="form-label">${escapeHTML(t('qr.scope_label'))}</label>
        <div class="qr-scope-group">
          ${scopeOptions.map(o => `
            <label class="qr-scope-row ${s.scope === o.v ? 'is-active' : ''}">
              <input type="radio" name="qr-scope"
                     data-action="qr-scope-select"
                     data-scope="${o.v}"
                     ${s.scope === o.v ? 'checked' : ''} />
              <div class="qr-scope-text">
                <div class="qr-scope-title">${escapeHTML(t(o.labelKey))}</div>
                <div class="qr-scope-hint">${escapeHTML(t(o.hintKey))}</div>
              </div>
            </label>
          `).join('')}
        </div>
      </div>
    `;
    footer.innerHTML = `
      <button class="btn-secondary" data-action="modal-close">${escapeHTML(t('btn.close'))}</button>
      <button class="btn-primary" data-action="qr-generate">${escapeHTML(t('qr.btn_generate'))}</button>
    `;
    return;
  }

  // Display-Phase
  const total = s.fragments.length;
  const idx = s.currentIndex;
  const current = s.fragments[idx];
  const qrSvg = renderQRCodeSVG(current, 360);
  const scopeLabel = {
    c:  t('qr.scope_config'),
    s:  t('qr.scope_status'),
    cs: t('qr.scope_both'),
  }[s.scope] || s.scope;

  const counterText = total > 1
    ? t('qr.fragment_counter', { current: idx + 1, total })
    : `QR 1 / 1`;
  const hintText = total > 1 ? t('qr.fragment_hint') : t('qr.single_hint');

  const navigationHTML = total > 1 ? `
    <div class="qr-navigation">
      <button class="btn-secondary" data-action="qr-fragment-prev">${escapeHTML(t('qr.prev'))}</button>
      <button class="btn-secondary ${s.autoCycle ? 'is-active' : ''}" data-action="qr-toggle-autocycle">
        ${s.autoCycle ? '⏸' : '▶'} ${escapeHTML(t('qr.auto_cycle'))}
      </button>
      <button class="btn-secondary" data-action="qr-fragment-next">${escapeHTML(t('qr.next'))}</button>
    </div>
  ` : '';

  body.innerHTML = `
    ${headerHTML}
    <div class="qr-display-wrap">
      <div class="qr-display">${qrSvg}</div>
      <div class="qr-counter">${escapeHTML(counterText)}</div>
      ${navigationHTML}
      <div class="qr-fragment-hint">${escapeHTML(hintText)}</div>
      <div class="sync-meta-row" style="margin-top: 12px;">
        <div class="sync-meta-item">
          <span class="sync-meta-label">${escapeHTML(t('qr.meta_scope'))}</span>
          <span class="sync-meta-value">${escapeHTML(scopeLabel)}</span>
        </div>
        <div class="sync-meta-item">
          <span class="sync-meta-label">${escapeHTML(t('qr.meta_transfer_id'))}</span>
          <span class="sync-meta-value"><code>${escapeHTML(s.transferId)}</code></span>
        </div>
        <div class="sync-meta-item">
          <span class="sync-meta-label">${escapeHTML(t('qr.meta_fragments'))}</span>
          <span class="sync-meta-value">${total}</span>
        </div>
        <div class="sync-meta-item">
          <span class="sync-meta-label">${escapeHTML(t('qr.meta_size'))}</span>
          <span class="sync-meta-value">${s.totalBytes} B</span>
        </div>
      </div>
    </div>
  `;
  footer.innerHTML = `
    <button class="btn-secondary" data-action="qr-back-to-options">${escapeHTML(t('qr.back_to_options'))}</button>
    <button class="btn-primary" data-action="modal-close">${escapeHTML(t('btn.close'))}</button>
  `;
}

/* =========================================================================
   QR-RECEIVE VIEW
   ========================================================================= */
function renderQrReceiveView(body, footer, headerHTML) {
  if (!State.qrReceiveState) qrResetReceiveState();
  const s = State.qrReceiveState;

  // Zustand 1: Payload zusammengesetzt → Preview mit Apply/Cancel
  if (s.completed && s.assembledPayload) {
    const p = s.assembledPayload;
    const parts = [];
    if (p.config) {
      const nLevels = p.config.levels ? p.config.levels.length : 0;
      const nRoles = p.config.levels
        ? p.config.levels.reduce((a, l) => a + (l.roles ? l.roles.length : 0), 0)
        : 0;
      const nPersons = p.config.persons ? p.config.persons.length : 0;
      parts.push(`
        <div class="qr-preview-section">
          <div class="qr-preview-heading">${escapeHTML(t('qr.preview_config_heading'))}</div>
          <div class="qr-preview-stats">
            <span>${nLevels} ${escapeHTML(t('qr.preview_levels'))}</span>
            <span>${nRoles} ${escapeHTML(t('qr.preview_roles'))}</span>
            <span>${nPersons} ${escapeHTML(t('qr.preview_persons'))}</span>
          </div>
          ${p.config.meta && p.config.meta.organizationName
            ? `<div class="qr-preview-meta">${escapeHTML(p.config.meta.organizationName)}</div>`
            : ''}
        </div>
      `);
    }
    if (p.runtime) {
      const absentCount = Object.keys(p.runtime.unavailable || {}).length;
      const manualCount = Object.keys(p.runtime.manualAssignments || {}).length;
      parts.push(`
        <div class="qr-preview-section">
          <div class="qr-preview-heading">${escapeHTML(t('qr.preview_status_heading'))}</div>
          <div class="qr-preview-stats">
            <span>${absentCount} ${escapeHTML(t('qr.preview_absent'))}</span>
            <span>${manualCount} ${escapeHTML(t('qr.preview_manual'))}</span>
          </div>
        </div>
      `);
    }

    const applyErrorHTML = s.applyError
      ? `<div class="sync-error">${escapeHTML(s.applyError)}</div>`
      : '';

    body.innerHTML = `
      ${headerHTML}
      <div class="qr-preview-wrap">
        <div class="qr-preview-title">${escapeHTML(t('qr.preview_title'))}</div>
        <div class="qr-preview-warn">${escapeHTML(t('qr.preview_warn'))}</div>
        ${parts.join('')}
        ${applyErrorHTML}
      </div>
    `;
    footer.innerHTML = `
      <button class="btn-secondary" data-action="qr-scan-reset">${escapeHTML(t('qr.btn_rescan'))}</button>
      <button class="btn-primary" data-action="qr-scan-apply">${escapeHTML(t('qr.btn_apply_import'))}</button>
    `;
    return;
  }

  // Zustand 2: Scanner aktiv oder Warten auf Start
  const supported = s.supported;
  const error = s.error;
  const active = s.active;
  const collectedCount = Object.keys(s.collectedFragments).length;
  const expectedTotal = s.expectedTotal;

  let mainHTML = '';
  if (supported === false) {
    // Nicht unterstützt (Firefox etc.)
    mainHTML = `
      <div class="qr-scanner-error">
        <div class="qr-scanner-error-title">${escapeHTML(t('qr.scanner_unsupported_title'))}</div>
        <div class="qr-scanner-error-body">${escapeHTML(error || t('qr.err_not_supported'))}</div>
        <div class="qr-scanner-error-hint">${escapeHTML(t('qr.scanner_unsupported_hint'))}</div>
      </div>
    `;
  } else if (error && !active) {
    mainHTML = `
      <div class="qr-scanner-error">
        <div class="qr-scanner-error-body">${escapeHTML(error)}</div>
      </div>
    `;
  } else if (!active) {
    mainHTML = `
      <div class="qr-scanner-idle">
        <div class="qr-scanner-icon">📷</div>
        <div class="qr-scanner-idle-text">${escapeHTML(t('qr.scanner_idle_hint'))}</div>
      </div>
    `;
  } else {
    // Scanner läuft
    const progressText = expectedTotal
      ? t('qr.scan_progress', { collected: collectedCount, total: expectedTotal })
      : t('qr.scan_waiting');
    mainHTML = `
      <div class="qr-scanner-active">
        <div class="qr-scanner-video-wrap">
          <video id="qr-scanner-video" muted autoplay playsinline></video>
          <div class="qr-scanner-reticle"></div>
        </div>
        <div class="qr-scanner-progress">
          ${escapeHTML(progressText)}
        </div>
        ${expectedTotal ? renderQrFragmentIndicators(collectedCount, expectedTotal, s.collectedFragments) : ''}
      </div>
    `;
  }

  body.innerHTML = `
    ${headerHTML}
    <div class="sync-explain">${escapeHTML(t('qr.receive_intro'))}</div>
    <div id="qr-receive-main">${mainHTML}</div>
  `;

  if (active) {
    footer.innerHTML = `
      <button class="btn-secondary" data-action="qr-scan-stop">${escapeHTML(t('qr.btn_stop_scan'))}</button>
      <button class="btn-secondary" data-action="qr-scan-reset">${escapeHTML(t('qr.btn_reset'))}</button>
    `;
  } else {
    footer.innerHTML = `
      <button class="btn-secondary" data-action="modal-close">${escapeHTML(t('btn.close'))}</button>
      <button class="btn-primary" data-action="qr-scan-start" ${supported === false ? 'disabled' : ''}>
        ${escapeHTML(t('qr.btn_start_scan'))}
      </button>
    `;
  }
}

// Kleiner Re-render nur für den Fortschritts-Bereich — wird während des Scannens
// periodisch aufgerufen, ohne das Video-Element im DOM zu ersetzen (sonst geht
// der Stream verloren)
function renderQrReceiveStatus() {
  const container = document.getElementById('qr-receive-main');
  if (!container) return;
  const s = State.qrReceiveState;
  if (!s || !s.active) return;
  const collectedCount = Object.keys(s.collectedFragments).length;
  const expectedTotal = s.expectedTotal;

  // Progress-Text updaten
  const progressEl = container.querySelector('.qr-scanner-progress');
  if (progressEl) {
    const progressText = expectedTotal
      ? t('qr.scan_progress', { collected: collectedCount, total: expectedTotal })
      : t('qr.scan_waiting');
    progressEl.textContent = progressText;
  }

  // Fragment-Indikatoren updaten
  const indicatorsWrap = container.querySelector('.qr-fragment-indicators');
  if (indicatorsWrap && expectedTotal) {
    indicatorsWrap.outerHTML = renderQrFragmentIndicators(collectedCount, expectedTotal, s.collectedFragments);
  } else if (expectedTotal) {
    // Noch nicht da — nachträglich einbauen
    const scannerActive = container.querySelector('.qr-scanner-active');
    if (scannerActive) {
      scannerActive.insertAdjacentHTML('beforeend', renderQrFragmentIndicators(collectedCount, expectedTotal, s.collectedFragments));
    }
  }
}

function renderQrFragmentIndicators(collected, total, fragmentsMap) {
  const dots = [];
  for (let i = 1; i <= total; i++) {
    const hasIt = !!fragmentsMap[i];
    dots.push(`<span class="qr-fragment-dot ${hasIt ? 'is-collected' : ''}" title="${i}"></span>`);
  }
  return `<div class="qr-fragment-indicators">${dots.join('')}</div>`;
}

function handleSyncInputChange() {
  const input = document.getElementById('sync-input');
  const val = input.value || '';
  const meta = document.getElementById('sync-input-meta');
  const hashEl = document.getElementById('sync-input-hash');
  const feedback = document.getElementById('sync-feedback');
  feedback.innerHTML = '';

  const clean = val.toUpperCase().replace(/[^0-9A-F]/g, '');
  if (clean.length >= 5) {
    const hash = clean.substr(1, 4);
    const currentHash = computeConfigHash(State.config);
    meta.style.display = 'flex';
    const matchClass = hash === currentHash ? 'sync-hash-match' : 'sync-hash-mismatch';
    hashEl.innerHTML = `<code class="${matchClass}">${escapeHTML(hash)}</code> ${hash === currentHash ? '✓' : '✗'}`;
  } else {
    meta.style.display = 'none';
  }
}

function handleSyncAction(action) {
  if (action === 'close') {
    closeModal();
    return;
  }
  if (action === 'copy') {
    const raw = generateSyncCode(State.config, State.runtime);
    const formatted = formatSyncCode(raw);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(formatted).then(
        () => showToast('Sync-Code in Zwischenablage kopiert', 'success'),
        () => showToast('Kopieren fehlgeschlagen — bitte manuell markieren', 'warning')
      );
    } else {
      // Fallback: Text selektieren
      const display = document.getElementById('sync-code-display');
      const range = document.createRange();
      range.selectNodeContents(display);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      showToast('Code markiert — mit Strg/Cmd+C kopieren', 'info');
    }
    return;
  }
  if (action === 'apply') {
    const input = document.getElementById('sync-input');
    const feedback = document.getElementById('sync-feedback');
    const val = (input.value || '').trim();
    if (!val) {
      feedback.innerHTML = '<div class="sync-error">Bitte Code eingeben.</div>';
      return;
    }
    try {
      const result = applySyncCode(val);
      closeModal();
      const parts = [];
      parts.push(`${result.totalAbsent} abwesend nach Sync`);
      if (result.becameAbsent > 0) parts.push(`${result.becameAbsent} neu abwesend`);
      if (result.becameAvailable > 0) parts.push(`${result.becameAvailable} wieder verfügbar`);
      if (result.manualsChanged) {
        parts.push(result.manualsCount > 0
          ? `${result.manualsCount} manuelle Zuordnung${result.manualsCount === 1 ? '' : 'en'}`
          : 'manuelle Zuordnungen zurückgesetzt');
      }
      showToast(parts.join(' · '), 'success');
    } catch (e) {
      feedback.innerHTML = `<div class="sync-error">${escapeHTML(e.message || String(e))}</div>`;
    }
  }
}

  if (!sel) return;
  sel.innerHTML = LANGUAGES.map(l =>
    `<option value="${l.code}" ${l.code === State.language ? 'selected' : ''}>${escapeHTML(l.short)} — ${escapeHTML(l.label)}</option>`

/* =========================================================================
   EDIT MODE
   ========================================================================= */
function toggleEditMode() {
  State.isEditMode = !State.isEditMode;

  // Header-Button-Label und Variante aktualisieren
  const editLabel = document.getElementById('btn-edit-label');
  const btnEdit = document.getElementById('btn-edit');
  if (editLabel) {
    editLabel.textContent = State.isEditMode ? t('header.edit_exit') : t('header.edit_enter');
  }
  if (btnEdit) {
    btnEdit.dataset.editActive = State.isEditMode ? 'true' : 'false';
  }

  // Falls im Personen-Detail: zurück zur Liste, damit Edit-Controls konsistent sind
  if (State.selectedPersonId) {
    State.selectedPersonId = null;
    State.activeTab = 'active';
    updateTabsUI();
  }

  render();
}

function logConfigEdit(detailKey, extras) {
  const parts = [];
  if (extras) {
    Object.keys(extras).forEach(k => parts.push(`${k}: ${extras[k]}`));
  }
  Storage.appendAudit({
    id: uid('a'),
    timestamp: new Date().toISOString(),
    type: 'config_edit',
    action: 'config_edit',
    detail: detailKey + (parts.length > 0 ? ' (' + parts.join(', ') + ')' : ''),
  });
}

function saveConfigAndRerender() {
  Storage.saveConfig(State.config);
  render();
}

/* ---- Level-CRUD ---- */
function moveLevel(idx, delta) {
  const target = idx + delta;
  if (target < 0 || target >= State.config.levels.length) return;
  const arr = State.config.levels;
  [arr[idx], arr[target]] = [arr[target], arr[idx]];
  logConfigEdit('Level moved', { from: idx + 1, to: target + 1 });
  saveConfigAndRerender();
}

function handleDeleteLevel(idx) {
  const lvl = State.config.levels[idx];
  if (!lvl) return;
  const msg = t('edit.confirm_delete_level', { name: lvl.name, roles: lvl.roles.length });
  if (!confirm(msg)) return;
  // Manuelle Zuordnungen für alle betroffenen Rollen entfernen
  if (State.runtime.manualAssignments) {
    const deletedRoleIds = lvl.roles.map(r => r.id);
    let changed = false;
    deletedRoleIds.forEach(rid => {
      if (rid in State.runtime.manualAssignments) {
        delete State.runtime.manualAssignments[rid];
        changed = true;
      }
    });
    if (changed) Storage.saveRuntime(State.runtime);
  }
  State.config.levels.splice(idx, 1);
  logConfigEdit('Level deleted', { name: lvl.name });
  saveConfigAndRerender();
  showToast(t('toast.edit_deleted'), 'success');
}

function openEditLevelModal(idx) {
  const isNew = idx === null || idx === undefined || Number.isNaN(idx);
  const level = isNew ? { name: '' } : State.config.levels[idx];
  if (!level) return;

  editLevelState.idx = isNew ? null : idx;

  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');

  title.textContent = isNew ? t('edit.new_level_title') : t('edit.edit_level_title');
  body.innerHTML = `

    </div>
    <div id="level-error" class="sync-error" style="display:none;"></div>
  `;
  footer.innerHTML = `
    <button class="btn-secondary" data-action="modal-cancel">${escapeHTML(t('btn.cancel'))}</button>
    <button class="btn-primary" data-action="edit-level-save">${escapeHTML(t('btn.save'))}</button>
  `;

  document.getElementById('modal-backdrop').style.display = 'flex';
  setTimeout(() => document.getElementById('level-name').focus(), 50);
}

/* ---- Role-CRUD ---- */
function findRoleIndex(roleId) {
  for (let li = 0; li < State.config.levels.length; li++) {
    const ri = State.config.levels[li].roles.findIndex(r => r.id === roleId);
    if (ri !== -1) return { levelIdx: li, roleIdx: ri };
  }
  return null;
}

function moveRole(levelIdx, roleIdx, delta) {
  const level = State.config.levels[levelIdx];
  if (!level) return;
  const target = roleIdx + delta;
  if (target < 0 || target >= level.roles.length) return;
  [level.roles[roleIdx], level.roles[target]] = [level.roles[target], level.roles[roleIdx]];
  logConfigEdit('Role moved', { level: level.name });
  saveConfigAndRerender();
}

function handleDeleteRole(roleId) {
  const loc = findRoleIndex(roleId);
  if (!loc) return;
  const role = State.config.levels[loc.levelIdx].roles[loc.roleIdx];
  if (!confirm(t('edit.confirm_delete_role', { name: role.name }))) return;
  State.config.levels[loc.levelIdx].roles.splice(loc.roleIdx, 1);
  // Manuelle Zuordnung für diese Rolle entfernen
  if (State.runtime.manualAssignments && State.runtime.manualAssignments[roleId]) {
    delete State.runtime.manualAssignments[roleId];
    Storage.saveRuntime(State.runtime);
  }
  logConfigEdit('Role deleted', { name: role.name });
  saveConfigAndRerender();
  showToast(t('toast.edit_deleted'), 'success');
}

function openEditRoleModalById(roleId) {
  const loc = findRoleIndex(roleId);
  if (!loc) return;
  openEditRoleModal(loc.levelIdx, loc.roleIdx);
}

function renderAssignmentsEditor() {

  const drafts = editRoleState.draftAssignments;
  if (drafts.length === 0) {
    box.innerHTML = `<div class="assignments-empty">${escapeHTML(t('edit.empty_assignments'))}</div>`;
    return;
  }
  box.innerHTML = drafts.map((a, idx) => {
    const p = findPerson(a.personId);
    const rankLbl = idx === 0 ? t('edit.rank_primary') : t('edit.rank_substitute', { n: idx });
    return `
      <div class="assignment-row" data-idx="${idx}">
        <span class="assignment-rank">${escapeHTML(rankLbl)}</span>
        <span class="assignment-name">${escapeHTML(p ? p.name : '?')}</span>
        <div class="assignment-controls">
          <button class="btn-edit-inline" data-action="role-assign-up" data-idx="${idx}" title="${escapeHTML(t('edit.tt_move_up'))}" ${idx === 0 ? 'disabled' : ''}>↑</button>
          <button class="btn-edit-inline" data-action="role-assign-down" data-idx="${idx}" title="${escapeHTML(t('edit.tt_move_down'))}" ${idx === drafts.length - 1 ? 'disabled' : ''}>↓</button>
          <button class="btn-edit-inline btn-edit-inline-danger" data-action="role-assign-remove" data-idx="${idx}" title="${escapeHTML(t('edit.tt_delete'))}">×</button>
        </div>

  }).join('');

}

function renderAssignmentPersonSelect() {
  const sel = document.getElementById('assignment-person-select');
  if (!sel) return;
  const used = new Set(editRoleState.draftAssignments.map(a => a.personId));
  const available = State.config.persons
    .filter(p => !used.has(p.id))
    .sort((a, b) => a.name.localeCompare(b.name, State.language || 'de'));
  if (available.length === 0) {
    sel.innerHTML = `<option value="">${escapeHTML(t('edit.no_persons_available'))}</option>`;
    sel.disabled = true;
  } else {
    sel.innerHTML = `<option value="">${escapeHTML(t('edit.select_person'))}</option>` +
      available.map(p => `<option value="${p.id}">${escapeHTML(p.name)}</option>`).join('');
    sel.disabled = false;
  }
}

/* ---- Person-CRUD ---- */
function handleDeletePerson(personId) {
  const p = findPerson(personId);
  if (!p) return;
  if (!confirm(t('edit.confirm_delete_person', { name: p.name }))) return;

  // Aus allen Rollen entfernen
  State.config.levels.forEach(level => {
    level.roles.forEach(role => {
      role.assignments = role.assignments
        .filter(a => a.personId !== personId)
        .map((a, i) => ({ personId: a.personId, rank: i }));
    });
  });
  // Aus Personen-Liste entfernen
  State.config.persons = State.config.persons.filter(x => x.id !== personId);
  // Aus unavailable entfernen falls vorhanden
  if (State.runtime.unavailable && State.runtime.unavailable[personId]) {
    delete State.runtime.unavailable[personId];
  }
  // Aus allen manualAssignments entfernen (Person, die manuell zugewiesen war, ist weg)
  if (State.runtime.manualAssignments) {
    Object.keys(State.runtime.manualAssignments).forEach(roleId => {
      if (State.runtime.manualAssignments[roleId] === personId) {
        delete State.runtime.manualAssignments[roleId];
      }
    });
  }
  Storage.saveRuntime(State.runtime);

  // Wenn die aktive Detailansicht diese Person war: zurücksetzen
  if (State.selectedPersonId === personId) {
    State.selectedPersonId = null;
  }

  logConfigEdit('Person deleted', { name: p.name });
  saveConfigAndRerender();
  showToast(t('toast.edit_deleted'), 'success');
}

function setManualAssignment(roleId, personId) {
  if (!State.runtime.manualAssignments) State.runtime.manualAssignments = {};
  State.runtime.manualAssignments[roleId] = personId;
  Storage.saveRuntime(State.runtime);

  const info = findRole(roleId);
  const person = findPerson(personId);
  const roleName = info ? info.role.name : roleId;
  const personName = person ? person.name : '?';

  Storage.appendAudit({
    id: uid('a'),
    timestamp: new Date().toISOString(),
    type: 'availability_change',
    action: 'manual_set',
    personId,
    detail: `${t('audit.manual_set')}: ${roleName}`,
  });
  render();
  showToast(t('toast.manual_set', { name: personName, role: roleName }), 'success');
}

function releaseManualAssignment(roleId) {
  if (!State.runtime.manualAssignments) return;
  if (!(roleId in State.runtime.manualAssignments)) return;
  delete State.runtime.manualAssignments[roleId];
  Storage.saveRuntime(State.runtime);

  const info = findRole(roleId);
  const roleName = info ? info.role.name : roleId;

  Storage.appendAudit({
    id: uid('a'),
    timestamp: new Date().toISOString(),
    type: 'availability_change',
    action: 'manual_released',
    detail: `${t('audit.manual_released')}: ${roleName}`,
  });
  render();
  showToast(t('toast.manual_released', { role: roleName }), 'info');
}

/* =========================================================================
   VIEW SIZE (S / M / L)
   ========================================================================= */
const VIEW_SIZES = ['s', 'm', 'l', 'xl'];

function applySize(size) {
  if (!VIEW_SIZES.includes(size)) size = 'm';
  document.documentElement.dataset.size = size;
  const icon = document.getElementById('size-icon');
  if (icon) icon.textContent = size.toUpperCase();
  const btn = document.getElementById('btn-size');
  if (btn) btn.title = t('header.size_tooltip');
}

function cycleSize() {
  const current = State.prefs.viewSize || 'm';
  const idx = VIEW_SIZES.indexOf(current);
  const next = VIEW_SIZES[(idx + 1) % VIEW_SIZES.length];
  State.prefs.viewSize = next;
  Storage.savePrefs(State.prefs);
  applySize(next);
  showToast(t('toast.size_changed', { size: t('size.' + next) }), 'info');
  // Wenn Cascade aktiv: Linien neu zeichnen nach Layout-Änderung
  if (State.prefs.showCascade) {
    requestAnimationFrame(() => renderCascadeLines());
  }
}

/* =========================================================================
   CASCADE-VISUALISIERUNG
   ----------------------------------------------------------------
   Zeigt als SVG-Pfade an, wo eine Person gerade in einer anderen Rolle
   aushilft, als ihrer eigenen Primärrolle. Quelle = Heimatrolle, Ziel =
   Rolle wo die Person aktuell aktiv ist.
   ========================================================================= */
function detectCascades() {
  const cascades = [];
  // Primär-Rolle pro Person aus der Config ableiten
  const primaryRoleByPerson = {};
  State.config.levels.forEach(level => {
    level.roles.forEach(role => {
      const primary = role.assignments.find(a => a.rank === 0);
      if (primary) primaryRoleByPerson[primary.personId] = role.id;
    });
  });

  Object.keys(State.occupancy).forEach(roleId => {
    const occ = State.occupancy[roleId];
    if (!occ || !occ.personId) return;
    const primaryRoleId = primaryRoleByPerson[occ.personId];
    if (!primaryRoleId) return;
    if (primaryRoleId === roleId) return; // Person ist in ihrer Heimrolle — kein Cascade

    const info = findRole(roleId);
    cascades.push({
      sourceRoleId: primaryRoleId,
      targetRoleId: roleId,
      critical: !!(info && info.role.critical),
      manual: !!occ.manual,
    });
  });
  return cascades;
}

function renderCascadeLines() {
  const chart = document.getElementById('org-chart');
  if (!chart) return;

  // Alte Overlay-SVG + Karten-Markierungen zurücksetzen
  const oldSvg = chart.querySelector('.cascade-overlay');
  if (oldSvg) oldSvg.remove();
  chart.querySelectorAll('[data-cascade-source]').forEach(el => el.removeAttribute('data-cascade-source'));
  chart.querySelectorAll('[data-cascade-target]').forEach(el => el.removeAttribute('data-cascade-target'));
  chart.removeAttribute('data-cascade');

  if (!State.prefs.showCascade) return;
  const cascades = detectCascades();
  if (cascades.length === 0) return;

  chart.dataset.cascade = 'true';

  const chartRect = chart.getBoundingClientRect();
  const scrollL = chart.scrollLeft;
  const scrollT = chart.scrollTop;

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.classList.add('cascade-overlay');
  svg.setAttribute('width', chart.scrollWidth);
  svg.setAttribute('height', chart.scrollHeight);

  // Pfeilspitzen-Marker
  const defs = document.createElementNS(svgNS, 'defs');
  defs.innerHTML = `
    <marker id="cascade-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 L 3 5 z" fill="#f59e0b"/>
    </marker>
    <marker id="cascade-arrow-crit" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 L 3 5 z" fill="#dc2626"/>
    </marker>
  `;
  svg.appendChild(defs);

  cascades.forEach(c => {
    const src = chart.querySelector(`.role-card[data-role-id="${c.sourceRoleId}"]`);
    const tgt = chart.querySelector(`.role-card[data-role-id="${c.targetRoleId}"]`);
    if (!src || !tgt) return;

    src.dataset.cascadeSource = 'true';
    tgt.dataset.cascadeTarget = 'true';

    const sr = src.getBoundingClientRect();
    const tr = tgt.getBoundingClientRect();

    // In chart-Koordinaten (inkl. Scroll-Offset) umrechnen
    const x1 = sr.left - chartRect.left + scrollL + sr.width / 2;
    const y1 = sr.top  - chartRect.top  + scrollT + sr.height / 2;
    const x2 = tr.left - chartRect.left + scrollL + tr.width / 2;
    const y2 = tr.top  - chartRect.top  + scrollT + tr.height / 2;

    const dx = x2 - x1;
    const dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 5) return;

    // Kontrollpunkt für Bezier: senkrecht zur direkten Verbindung versetzt
    const perpX = -dy / dist;
    const perpY = dx / dist;
    const arc = Math.min(dist * 0.25, 80);
    const cx = (x1 + x2) / 2 + perpX * arc;
    const cy = (y1 + y2) / 2 + perpY * arc;

    const d = `M ${x1.toFixed(1)},${y1.toFixed(1)} Q ${cx.toFixed(1)},${cy.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}`;

    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'cascade-path');
    if (c.critical) path.setAttribute('data-critical', 'true');
    path.setAttribute('marker-end', c.critical ? 'url(#cascade-arrow-crit)' : 'url(#cascade-arrow)');
    svg.appendChild(path);
  });

  chart.appendChild(svg);
}

function applyCascade() {
  const btn = document.getElementById('btn-cascade');
  const icon = document.getElementById('cascade-icon');
  if (btn) {
    btn.title = t('header.cascade_tooltip');
    btn.dataset.active = State.prefs.showCascade ? 'true' : 'false';
  }
  if (icon) icon.textContent = State.prefs.showCascade ? '⇢' : '⇢';
  // Linien entsprechend rendern/entfernen
  renderCascadeLines();
}

function toggleCascade() {
  State.prefs.showCascade = !State.prefs.showCascade;
  Storage.savePrefs(State.prefs);
  applyCascade();
  showToast(
    State.prefs.showCascade ? t('toast.cascade_on') : t('toast.cascade_off'),
    'info'
  );
}

   ----------------------------------------------------------------
   Eigenständiger State für die Phone-Ansicht (< 768px). Unabhängig von
   panelHidden auf Desktop, damit Wechsel zwischen Geräten nicht den
   Desktop-Zustand mitbringt und Mobile-User blind dasteht.
   mobileView: 'org' | 'panel'
   ========================================================================= */
function setMobileView(view) {
  if (view !== 'org' && view !== 'panel') return;
  State.mobileView = view;
  State.prefs.mobileView = view;
  Storage.savePrefs(State.prefs);
  applyMobileView();
  if (view === 'panel') {

function applyMobileView() {

}

function updateMobileNavUI() {
  const view = State.mobileView || 'org';
  const tab = State.activeTab || 'active';

    ? 'mobile-nav-org'
    : 'mobile-nav-' + tab;

/* =========================================================================

const EXPORT_FORMAT_VERSION = 1;

// handleDataAction ist ab jetzt obsolet (Dispatcher macht das)

function exportConfig(includeRuntime) {
  const payload = {
    format: 'cram-export',
    formatVersion: EXPORT_FORMAT_VERSION,
    appVersion: APP_VERSION,
    exportedAt: new Date().toISOString(),
    config: State.config,
  };
  if (includeRuntime) {
    payload.runtime = State.runtime;
  }
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const ts = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
  const filename = `cram-export-${ts}.json`;

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);

  Storage.appendAudit({
    id: uid('a'),
    timestamp: new Date().toISOString(),
    type: 'config_edit',
    action: 'config_edit',
    detail: t('audit.config_exported'),
  });
  showToast(t('toast.export_done'), 'success');
  closeModal();
}

function validateImportPayload(data) {
  if (!data || typeof data !== 'object') throw new Error('root not object');
  if (data.format !== 'cram-export') throw new Error('format ≠ cram-export');
  if (typeof data.formatVersion !== 'number') throw new Error('formatVersion missing');
  if (data.formatVersion > EXPORT_FORMAT_VERSION) throw new Error('formatVersion > ' + EXPORT_FORMAT_VERSION);
  if (!data.config) throw new Error('config missing');
  if (!Array.isArray(data.config.levels)) throw new Error('config.levels must be array');
  if (!Array.isArray(data.config.persons)) throw new Error('config.persons must be array');
  // Levels strukturell prüfen
  data.config.levels.forEach((lvl, i) => {
    if (!lvl.id || !lvl.name || !Array.isArray(lvl.roles)) {
      throw new Error(`levels[${i}] incomplete`);
    }
    lvl.roles.forEach((r, j) => {
      if (!r.id || !r.name || !Array.isArray(r.assignments)) {
        throw new Error(`levels[${i}].roles[${j}] incomplete`);
      }
    });
  });
  // Personen
  data.config.persons.forEach((p, i) => {
    if (!p.id || !p.name) throw new Error(`persons[${i}] incomplete`);
  });
  return true;
}

function handleImportFileChange(e) {
  const file = e.target.files && e.target.files[0];
  const feedback = document.getElementById('import-feedback');
  if (!file) {
    if (feedback) feedback.innerHTML = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    const fb = document.getElementById('import-feedback');
    let parsed;
    try {
      parsed = JSON.parse(ev.target.result);
    } catch (err) {
      if (fb) fb.innerHTML = `<div class="sync-error">${escapeHTML(t('data.err_invalid_json'))}</div>`;
      dataModalState.importData = null;
      dataModalState.importFileName = null;
      updateImportPreview();
      return;
    }
    try {
      validateImportPayload(parsed);
    } catch (err) {
      if (fb) fb.innerHTML = `<div class="sync-error">${escapeHTML(t('data.err_invalid_format', { reason: err.message }))}</div>`;
      dataModalState.importData = null;
      dataModalState.importFileName = null;
      updateImportPreview();
      return;
    }
    dataModalState.importData = parsed;
    dataModalState.importFileName = file.name;
    if (fb) fb.innerHTML = '';
    updateImportPreview();
  };
  reader.readAsText(file);
}

// Aktualisiert nur die Preview-Sektion unterhalb des File-Inputs,

  const persons = parsed.config.persons ? parsed.config.persons.length : 0;
  const expTime = parsed.exportedAt ? formatDateTime(parsed.exportedAt) : '—';

  preview.className = 'import-preview';

function applyImport() {
  const parsed = dataModalState.importData;
  if (!parsed) {
    const feedback = document.getElementById('import-feedback');
    feedback.innerHTML = `<div class="sync-error">${escapeHTML(t('data.err_no_file'))}</div>`;
    return;
  }
  if (!confirm(t('data.confirm_import'))) return;

  // Runtime-Option

  const overwriteRuntime = overwriteRuntimeEl ? overwriteRuntimeEl.checked : false;

  State.config = parsed.config;
  Storage.saveConfig(State.config);

  if (overwriteRuntime && parsed.runtime) {
    State.runtime = {
      unavailable: parsed.runtime.unavailable || {},
      manualAssignments: parsed.runtime.manualAssignments || {},

    State.runtime = { unavailable: {}, manualAssignments: {} };
