<style>
/* =========================================================================
   DESIGN TOKENS
   ========================================================================= */
:root {
  /* Dark theme (default for crisis rooms) */
  --bg-base: #0a0e14;
  --bg-surface: #141921;
  --bg-elevated: #1c2330;
  --bg-hover: #242d3e;
  --border-subtle: #242d3e;
  --border-strong: #3a4558;

  --text-primary: #e6edf5;
  --text-secondary: #8a95a8;
  --text-dim: #5a6478;

  /* Status colors - calibrated for SOC readability */
  --status-ok: #52a373;
  --status-ok-bg: rgba(82, 163, 115, 0.08);
  --status-ok-border: rgba(82, 163, 115, 0.35);

  --status-warn: #f59e0b;
  --status-warn-bg: rgba(245, 158, 11, 0.08);
  --status-warn-border: rgba(245, 158, 11, 0.35);

  --status-warn-deep: #d97706;
  --status-warn-deep-bg: rgba(217, 119, 6, 0.08);
  --status-warn-deep-border: rgba(217, 119, 6, 0.35);

  --status-critical: #dc2626;
  --status-critical-bg: rgba(220, 38, 38, 0.1);
  --status-critical-border: rgba(220, 38, 38, 0.45);

  --accent: #4a90e2;
  --accent-bg: rgba(74, 144, 226, 0.1);

  /* Typography */
  --font-sans: 'IBM Plex Sans', -apple-system, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'Cascadia Mono', 'SF Mono', Consolas, monospace;

  /* Shapes */
  --radius-sm: 2px;
  --radius-md: 4px;
  --shadow-panel: 0 4px 20px rgba(0, 0, 0, 0.4);

  /* Spacing scale */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;

  /* View-Size-Variablen — M ist Default. Werden per data-size="s|l|xl" überschrieben. */
  --card-pad-v: 14px;
  --card-pad-h: 16px;
  --card-name-font: 11px;
  --card-occupant-font: 15px;
  --card-meta-font: 10px;
  --card-chain-font: 11px;
  --card-icon-font: 13px;
  --card-critical-icon: 18px;
  --card-button-size: 26px;
  --card-min-width: 220px;
  --card-max-width: 380px;
  --level-header-font: 11px;
  --level-index-font: 10px;
  --level-meta-font: 10px;

  /* Panel-Skalierung — M ist Default */
  --panel-width: 360px;
  --panel-tab-font: 11px;
  --panel-heading-font: 11px;
  --panel-text-font: 13px;
  --panel-small-font: 10px;
  --panel-name-font: 14px;
  --panel-summary-value-font: 22px;
  --panel-detail-name-font: 22px;
  --panel-pad: 20px;
}

[data-size="s"] {
  --card-pad-v: 10px;
  --card-pad-h: 12px;
  --card-name-font: 10px;
  --card-occupant-font: 13px;
  --card-meta-font: 9px;
  --card-chain-font: 10px;
  --card-icon-font: 11px;
  --card-critical-icon: 14px;
  --card-button-size: 22px;
  --card-min-width: 200px;
  --card-max-width: 320px;
  --level-header-font: 10px;
  --level-index-font: 9px;
  --level-meta-font: 9px;

  --panel-width: 320px;
  --panel-tab-font: 10px;
  --panel-heading-font: 10px;
  --panel-text-font: 12px;
  --panel-small-font: 9px;
  --panel-name-font: 13px;
  --panel-summary-value-font: 18px;
  --panel-detail-name-font: 18px;
  --panel-pad: 16px;
}

[data-size="l"] {
  --card-pad-v: 18px;
  --card-pad-h: 20px;
  --card-name-font: 13px;
  --card-occupant-font: 19px;
  --card-meta-font: 11px;
  --card-chain-font: 12px;
  --card-icon-font: 16px;
  --card-critical-icon: 24px;
  --card-button-size: 32px;
  --card-min-width: 280px;
  --card-max-width: 460px;
  --level-header-font: 14px;
  --level-index-font: 12px;
  --level-meta-font: 12px;

  --panel-width: 420px;
  --panel-tab-font: 13px;
  --panel-heading-font: 13px;
  --panel-text-font: 15px;
  --panel-small-font: 12px;
  --panel-name-font: 16px;
  --panel-summary-value-font: 26px;
  --panel-detail-name-font: 26px;
  --panel-pad: 24px;
}

[data-size="xl"] {
  --card-pad-v: 24px;
  --card-pad-h: 28px;
  --card-name-font: 15px;
  --card-occupant-font: 26px;
  --card-meta-font: 13px;
  --card-chain-font: 14px;
  --card-icon-font: 20px;
  --card-critical-icon: 32px;
  --card-button-size: 40px;
  --card-min-width: 340px;
  --card-max-width: 560px;
  --level-header-font: 17px;
  --level-index-font: 14px;
  --level-meta-font: 13px;

  --panel-width: 480px;
  --panel-tab-font: 15px;
  --panel-heading-font: 15px;
  --panel-text-font: 17px;
  --panel-small-font: 13px;
  --panel-name-font: 18px;
  --panel-summary-value-font: 32px;
  --panel-detail-name-font: 32px;
  --panel-pad: 28px;
}

/* Voll-Breite-Modus: rechtes Panel komplett aus, Org-Chart nimmt gesamte Breite */
[data-panel="hidden"] .app-main {
  grid-template-columns: 1fr !important;
}
[data-panel="hidden"] .side-panel {
  display: none;
}

[data-theme="light"] {
  --bg-base: #f5f6f8;
  --bg-surface: #ffffff;
  --bg-elevated: #ffffff;
  --bg-hover: #eef0f4;
  --border-subtle: #e4e7ec;
  --border-strong: #c4cad3;

  --text-primary: #111418;
  --text-secondary: #4a5264;
  --text-dim: #7a8394;

  --status-ok-bg: rgba(82, 163, 115, 0.12);
  --status-warn-bg: rgba(245, 158, 11, 0.12);
  --status-warn-deep-bg: rgba(217, 119, 6, 0.12);
  --status-critical-bg: rgba(220, 38, 38, 0.12);
  --accent-bg: rgba(74, 144, 226, 0.12);

  --shadow-panel: 0 4px 20px rgba(0, 0, 0, 0.1);
}

/* =========================================================================
   RESET & BASE
   ========================================================================= */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-base);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button {
  font-family: inherit;
  font-size: inherit;
  border: none;
  cursor: pointer;
  background: none;
  color: inherit;
}

button:focus-visible,
[tabindex]:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* =========================================================================
   APP SHELL
   ========================================================================= */
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

/* ---- Header ---- */
.app-header {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: var(--space-5);
  padding: var(--space-2) var(--space-5);
  padding-top: max(var(--space-2), env(safe-area-inset-top));
  min-height: 56px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  z-index: 10;
}

.brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.02em;
  color: var(--text-primary);
}

.brand-mark {
  width: 8px;
  height: 8px;
  background: var(--status-ok);
  border-radius: 1px;
  box-shadow: 0 0 8px var(--status-ok);
  animation: pulse-mark 2.5s ease-in-out infinite;
}

@keyframes pulse-mark {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.brand-name {
  font-size: 12px;
  color: var(--text-secondary);
}

.brand-divider {
  color: var(--text-dim);
  margin: 0 4px;
}

/* ---- Status banner ---- */
.status-banner {
  display: flex;
  gap: var(--space-3);
  justify-content: center;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.02em;
}
.status-metrics {
  display: flex;
  align-items: center;
  gap: var(--space-5);
}

/* ---- Sync-Indikator im Header (V1.2) ----
   System-Status (Sync) links der Stab-Status-Pills, optisch durch
   einen vertikalen Trenner abgesetzt. Vier sichtbare Zustände:
   synced / syncing / out-of-sync / error. 'disabled' ist hidden. */
.sync-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.02em;
  color: var(--text-secondary);
  cursor: default;
  user-select: none;
}
.sync-indicator[hidden] { display: none; }
.sync-indicator-icon {
  display: inline-block;
  font-weight: 700;
  font-size: 13px;
  width: 14px;
  text-align: center;
  line-height: 1;
}
.sync-indicator-label {
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 0.05em;
}
.sync-indicator[data-state="synced"]      { color: var(--status-ok); border-color: var(--status-ok-border); }
.sync-indicator[data-state="syncing"]     { color: var(--status-warn); border-color: var(--status-warn-border); }
.sync-indicator[data-state="syncing"] .sync-indicator-icon { animation: spin 1.2s linear infinite; }
.sync-indicator[data-state="out-of-sync"] { color: var(--status-warn); border-color: var(--status-warn-border); }
.sync-indicator[data-state="config-drift"] { color: var(--status-critical); border-color: var(--status-critical-border); cursor: pointer; }
.sync-indicator[data-state="config-drift"]:hover { opacity: 0.85; }
.sync-indicator[data-state="error"]       { color: var(--status-critical); border-color: var(--status-critical-border); }
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.sync-indicator + .status-metrics {
  border-left: 1px solid var(--border-subtle);
  padding-left: var(--space-5);
}

.status-metric {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: 4px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}

.status-metric[data-tone="ok"] { border-color: var(--status-ok-border); }
.status-metric[data-tone="warn"] { border-color: var(--status-warn-border); }
.status-metric[data-tone="critical"] {
  border-color: var(--status-critical-border);
  background: var(--status-critical-bg);
  animation: pulse-critical 2s ease-in-out infinite;
}

@keyframes pulse-critical {
  0%, 100% { box-shadow: 0 0 0 0 var(--status-critical-border); }
  50% { box-shadow: 0 0 0 4px transparent; }
}

.status-label {
  color: var(--text-secondary);
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 0.08em;
}

.status-value {
  color: var(--text-primary);
  font-weight: 600;
}

.status-metric[data-tone="ok"] .status-value { color: var(--status-ok); }
.status-metric[data-tone="warn"] .status-value { color: var(--status-warn); }
.status-metric[data-tone="critical"] .status-value { color: var(--status-critical); }

/* ---- Header actions ---- */
.header-actions {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  justify-content: flex-end;
}

/* Status-Banner darf bei eng-werdendem Raum schrumpfen */
.status-banner {
  min-width: 0;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.02em;
  color: var(--text-primary);
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  transition: all 0.12s ease;
  cursor: pointer;
}

.btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--accent);
}

.btn[data-active="true"] {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}

/* Icon innerhalb eines Headers-Buttons — kontrastreich und gut lesbar */
.btn-icon {
  font-size: 15px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
}

.btn-label {
  font-size: 12px;
  letter-spacing: 0.03em;
}

/* Edit-Button mit Punkt (legacy — wird nicht mehr genutzt, nur falls irgendwo) */
.btn-dot {
  width: 6px;
  height: 6px;
  background: currentColor;
  border-radius: 50%;
  opacity: 0.7;
}

#btn-edit[data-edit-active="true"] {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}
#btn-edit[data-edit-active="true"] .btn-dot {
  background: var(--accent);
  opacity: 1;
  box-shadow: 0 0 6px var(--accent);
}

.btn-lang {
  display: inline-flex;
  align-items: center;
  padding: 8px 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.02em;
  color: var(--text-secondary);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%),
                    linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
  background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  padding-right: 24px;
}
.btn-lang:hover {
  background-color: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-strong);
}
.btn-lang option {
  background: var(--bg-elevated);
  color: var(--text-primary);
}

/* =========================================================================
   EDIT MODE
   ========================================================================= */
.edit-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  margin-bottom: 16px;
  background: var(--accent-bg);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--accent);
  letter-spacing: 0.02em;
}
.edit-banner-text { flex: 1; }
.edit-banner-exit {
  font-size: 11px;
  padding: 4px 10px;
}

.level-edit-controls,
.role-edit-controls,
.person-list-edit-controls {
  display: inline-flex;
  gap: 4px;
  margin-left: auto;
}
.role-edit-controls {
  position: absolute;
  top: 8px;
  right: 8px;
  margin-left: 0;
}
.person-list-edit-controls {
  position: absolute;
  top: 8px;
  right: 8px;
}
.person-list-item { position: relative; }
.role-card { position: relative; }

.btn-edit-inline {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 24px;
  padding: 0 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.12s ease;
}
.btn-edit-inline:hover:not(:disabled) {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-strong);
}
.btn-edit-inline:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.btn-edit-inline-danger:hover:not(:disabled) {
  color: var(--status-critical);
  border-color: var(--status-critical);
}
.btn-edit-inline-add {
  padding: 0 10px;
  color: var(--accent);
  border-color: var(--accent);
  background: transparent;
}
.btn-edit-inline-add:hover:not(:disabled) {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}

.btn-edit-prominent {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  margin: 12px 0;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--accent);
  background: transparent;
  border: 1px dashed var(--accent);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.12s ease;
  width: 100%;
}
.btn-edit-prominent:hover {
  background: var(--accent-bg);
  border-style: solid;
}

.add-level-row {
  margin-top: 16px;
}

/* Assignment-Editor im Role-Modal */
.assignments-editor {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin: 8px 0;
  padding: 4px;
  background: var(--bg-subtle);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  min-height: 40px;
}
.assignments-empty {
  padding: 10px;
  text-align: center;
  color: var(--text-dim);
  font-style: italic;
  font-size: 12px;
}
.assignment-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  background: var(--bg-elevated);
  border-radius: 3px;
  font-size: 12px;
}
.assignment-rank {
  min-width: 48px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.assignment-name {
  flex: 1;
  color: var(--text-primary);
}
.assignment-controls {
  display: inline-flex;
  gap: 4px;
}
.assignment-add-row {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.assignment-add-row .form-select {
  flex: 1;
}

/* Checkbox-Row */
.form-field-check { margin: 12px 0; }

/* ---- Print-Modal Variant-Radio-Gruppe ---- */
.print-variant-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 6px;
}
.print-variant-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s ease, border-color 0.12s ease;
}
.print-variant-row:hover {
  background: var(--bg-hover);
  border-color: var(--border-default);
}
.print-variant-row input[type="radio"] {
  margin-top: 2px;
  flex-shrink: 0;
}
.print-variant-text {
  flex: 1;
  min-width: 0;
}
.print-variant-title {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 13px;
  margin-bottom: 2px;
}
.print-variant-hint {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.4;
}
.form-check-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  cursor: pointer;
}
.form-check-row input[type="checkbox"] {
  width: 16px;
  height: 16px;
  cursor: pointer;
}
.form-hint {
  margin-top: 4px;
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
}

/* =========================================================================
   MAIN LAYOUT
   ========================================================================= */
.app-main {
  display: grid;
  grid-template-columns: 1fr var(--panel-width);
  overflow: hidden;
}

/* ---- Org chart ---- */
.org-chart {
  position: relative;
  overflow: auto;
  padding: var(--space-5);
  background:
    radial-gradient(circle at 20% 0%, rgba(74, 144, 226, 0.04), transparent 50%),
    var(--bg-base);
}

/* =========================================================================
   CASCADE-OVERLAY (animierte Vertretungslinien)
   ========================================================================= */
.cascade-overlay {
  position: absolute;
  top: 0;
  left: 0;
  /* width/height bewusst NICHT in CSS — sie kommen aus den SVG-Attributen,
     die in renderCascadeLines() auf chart.scrollWidth/scrollHeight gesetzt
     werden. CSS-Werte (insb. height:100%) referenzieren den Containing-Block
     (Padding-Box des relativ-positionierten Parents) und schneiden dadurch
     bei scrollbarem Inhalt die Pfade auf den initial sichtbaren Bereich. */
  pointer-events: none;
  z-index: 5;
}

.cascade-path {
  fill: none;
  stroke: #f59e0b;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-dasharray: 8 5;
  opacity: 0.85;
  animation: cascade-flow 1.2s linear infinite;
}

.cascade-path[data-critical="true"] {
  stroke: var(--status-critical);
  stroke-width: 3;
  animation: cascade-flow-critical 0.9s linear infinite;
}

@keyframes cascade-flow {
  to { stroke-dashoffset: -13; }
}
@keyframes cascade-flow-critical {
  0%, 100% { stroke-dashoffset: 0; filter: drop-shadow(0 0 3px rgba(220, 38, 38, 0.4)); }
  50% { stroke-dashoffset: -13; filter: drop-shadow(0 0 8px rgba(220, 38, 38, 0.7)); }
}

/* Wenn Cascade aktiv ist, werden nicht-betroffene Karten leicht gedimmt */
.org-chart[data-cascade="true"] .role-card:not([data-cascade-source]):not([data-cascade-target]) {
  opacity: 0.5;
}

.role-card[data-cascade-source] {
  outline: 2px solid #f59e0b;
  outline-offset: 2px;
}
.role-card[data-cascade-target] {
  outline: 2px solid #f59e0b;
  outline-offset: 2px;
  box-shadow: 0 0 24px rgba(245, 158, 11, 0.3);
}
.role-card[data-cascade-source][data-critical="true"],
.role-card[data-cascade-target][data-critical="true"] {
  outline-color: var(--status-critical);
}

.level {
  margin-bottom: var(--space-5);
}

.level-header {
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: 1px dashed var(--border-subtle);
}

.level-index {
  font-family: var(--font-mono);
  font-size: var(--level-index-font, 11px);
  color: var(--text-dim);
  letter-spacing: 0.1em;
}

.level-name {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: var(--level-header-font, 15px);
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.level-meta {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: var(--level-meta-font, 11px);
  color: var(--text-dim);
}

.roles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(var(--card-min-width), var(--card-max-width)));
  gap: var(--space-3);
}

/* ---- Role card ---- */
.role-card {
  position: relative;
  display: flex;
  flex-direction: column;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--text-dim);
  border-radius: var(--radius-md);
  padding: var(--card-pad-v) var(--card-pad-h);
  transition: transform 0.12s ease, background 0.12s ease, border-color 0.2s ease;
  cursor: pointer;
}

.role-card:hover {
  background: var(--bg-elevated);
  transform: translateY(-1px);
}

.role-card[data-state="primary"] {
  border-left-color: var(--status-ok);
}

.role-card[data-state="substitute"] {
  border-left-color: var(--status-warn);
}

.role-card[data-state="substitute-deep"] {
  border-left-color: var(--status-warn-deep);
}

.role-card[data-state="unoccupied"] {
  border-left-color: var(--status-critical);
  background: var(--status-critical-bg);
}

.role-card[data-state="unoccupied"][data-critical="true"] {
  animation: pulse-critical-card 2s ease-in-out infinite;
}

.role-critical-icon {
  display: inline-block;
  margin-right: 6px;
  color: var(--status-critical);
  font-size: var(--card-critical-icon, 18px);
  line-height: 1;
  vertical-align: -3px;
  filter: drop-shadow(0 0 4px rgba(220, 38, 38, 0.35));
}

@keyframes pulse-critical-card {
  0%, 100% { box-shadow: inset 2px 0 0 var(--status-critical), 0 0 0 0 rgba(220, 38, 38, 0.3); }
  50% { box-shadow: inset 2px 0 0 var(--status-critical), 0 0 0 4px rgba(220, 38, 38, 0); }
}

.role-name {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: var(--card-name-font, 11px);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: var(--space-3);
  padding-right: 40px; /* Platz für Edit-Controls / Manuell-Button oben rechts */
}

.role-occupant {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: var(--space-3);
}

.occupant-name {
  font-size: var(--card-occupant-font, 15px);
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
}

.occupant-unoccupied {
  font-family: var(--font-mono);
  font-size: var(--card-occupant-font, 15px);
  font-weight: 600;
  color: var(--status-critical);
  letter-spacing: 0.05em;
}

.occupant-meta {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-family: var(--font-mono);
  font-size: var(--card-meta-font, 10px);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.depth-badge {
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  letter-spacing: 0.05em;
}

.depth-badge[data-rank="0"] {
  background: var(--status-ok-bg);
  color: var(--status-ok);
}

.depth-badge[data-rank="1"],
.depth-badge[data-rank="2"] {
  background: var(--status-warn-bg);
  color: var(--status-warn);
}

.depth-badge[data-rank="3"],
.depth-badge[data-rank="4"],
.depth-badge[data-rank="5"] {
  background: var(--status-warn-deep-bg);
  color: var(--status-warn-deep);
}

.depth-badge[data-rank="unoccupied"] {
  background: var(--status-critical-bg);
  color: var(--status-critical);
}

.depth-badge[data-rank="manual"] {
  background: rgba(138, 92, 246, 0.18);
  color: #b389ff;
  border: 1px solid rgba(138, 92, 246, 0.5);
  font-weight: 700;
}

.depth-badge[data-rank="manual-absent"] {
  background: rgba(138, 92, 246, 0.08);
  color: #a186d6;
  border: 1px dashed rgba(138, 92, 246, 0.4);
}

/* Manueller Zuordnungs-Modus: Karte bekommt einen lila Rand und ein 🔒 oben links */
.role-card[data-manual="true"] {
  border-color: #8a5cf6;
  box-shadow: 0 0 0 1px rgba(138, 92, 246, 0.3), 0 0 12px rgba(138, 92, 246, 0.15);
}
.role-card[data-manual="true"]::before {
  content: "🔒";
  position: absolute;
  top: -8px;
  left: 10px;
  background: var(--bg-base);
  padding: 0 4px;
  font-size: 12px;
  z-index: 1;
}

.role-card[data-state="manual-absent"] {
  border-style: dashed;
  border-color: #8a5cf6;
  background: linear-gradient(0deg, rgba(138, 92, 246, 0.05), transparent);
}
.role-card[data-state="manual-absent"] .occupant-name {
  opacity: 0.55;
  text-decoration: line-through;
  text-decoration-color: rgba(138, 92, 246, 0.6);
}

.occupant-manual-absent {
  font-style: italic;
}

.manual-absent-hint {
  margin-left: 6px;
  font-size: 10px;
  color: var(--text-dim);
  font-style: italic;
}

/* Lock-Button auf der Rollenkarte (oben rechts, nur außerhalb Edit-Modus) */
.btn-manual-assign {
  position: absolute;
  top: 8px;
  right: 8px;
  width: var(--card-button-size, 26px);
  height: var(--card-button-size, 26px);
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  font-size: calc(var(--card-button-size, 26px) * 0.5);
  line-height: 1;
  cursor: pointer;
  opacity: 0.35;
  transition: all 0.12s ease;
}
.role-card:hover .btn-manual-assign,
.role-card:focus-within .btn-manual-assign,
.btn-manual-assign:focus {
  opacity: 1;
}
.btn-manual-assign:hover {
  background: rgba(138, 92, 246, 0.2);
  border-color: #8a5cf6;
  transform: scale(1.05);
}
.role-card[data-manual="true"] .btn-manual-assign {
  opacity: 1;
  background: rgba(138, 92, 246, 0.25);
  border-color: #8a5cf6;
  color: #b389ff;
}

.originally-assigned {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

.originally-assigned strike {
  text-decoration: line-through;
  text-decoration-color: var(--status-critical);
  text-decoration-thickness: 1px;
}

.role-chain {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
  padding-top: var(--space-2);
  border-top: 1px dashed var(--border-subtle);
  font-family: var(--font-mono);
  font-size: var(--card-chain-font, 10px);
  color: var(--text-dim);
  letter-spacing: 0.02em;
}

.chain-label {
  text-transform: uppercase;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  font-size: calc(var(--card-chain-font, 10px) - 1px);
  margin-right: 4px;
}

.chain-slot {
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: background 0.1s ease, border-color 0.1s ease;
}

.chain-slot:hover {
  background: var(--bg-hover);
  border-color: var(--border-strong);
  color: var(--text-primary);
}

.chain-slot:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.chain-slot[data-active="true"] {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}

.chain-slot[data-unavailable="true"] {
  opacity: 0.55;
  text-decoration: line-through;
  text-decoration-color: var(--status-critical);
  background: var(--status-critical-bg);
  border-color: var(--status-critical-border);
  color: var(--text-secondary);
}

.chain-slot[data-unavailable="true"]:hover {
  opacity: 0.85;
}

.chain-arrow { color: var(--text-dim); }

/* =========================================================================
   SIDE PANEL
   ========================================================================= */
.side-panel {
  display: flex;
  flex-direction: column;
  background: var(--bg-surface);
  border-left: 1px solid var(--border-subtle);
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border-subtle);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--border-subtle);
}

.panel-tab {
  flex: 1;
  padding: var(--space-3);
  font-family: var(--font-mono);
  font-size: var(--panel-tab-font);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  transition: color 0.12s ease, border-color 0.12s ease;
}

.panel-tab:hover { color: var(--text-secondary); }

.panel-tab[data-active="true"] {
  color: var(--text-primary);
  border-bottom-color: var(--accent);
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: var(--panel-pad);
  font-size: var(--panel-text-font);
}

/* ---- Active-list view ---- */
.active-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

/* ---- Absent section (at top of active list) ---- */
.absent-section {
  margin-bottom: var(--space-4);
}

.absent-header {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--status-warn-border);
}

.absent-header-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--status-warn);
  font-weight: 600;
}

.absent-count {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--status-warn);
  background: var(--status-warn-bg);
  border: 1px solid var(--status-warn-border);
  padding: 1px 6px;
  border-radius: var(--radius-sm);
}

.absent-items {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.absent-item {
  padding: var(--space-2) var(--space-3);
  background: var(--status-warn-bg);
  border: 1px solid var(--status-warn-border);
  border-left: 3px solid var(--status-warn);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s ease;
}

.absent-item:hover {
  background: rgba(245, 158, 11, 0.15);
}

.absent-name-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: 3px;
}

.absent-dot {
  width: 6px;
  height: 6px;
  background: var(--status-warn);
  border-radius: 50%;
  flex-shrink: 0;
}

.absent-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.absent-meta {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.03em;
  color: var(--text-secondary);
  margin-left: 14px;
}

.absent-category-chip {
  padding: 1px 5px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 9px;
}

.absent-since {
  color: var(--text-dim);
}

.absent-note {
  margin-top: 4px;
  margin-left: 14px;
  font-size: 11px;
  color: var(--text-secondary);
  font-style: italic;
}

.active-divider {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}

.active-divider::before,
.active-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-subtle);
}

.active-divider-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.active-item {
  padding: var(--space-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--text-dim);
  border-radius: var(--radius-md);
  transition: background 0.12s ease;
  cursor: pointer;
}

.active-item:hover { background: var(--bg-hover); }

.active-item[data-state="primary"] { border-left-color: var(--status-ok); }
.active-item[data-state="substitute"] { border-left-color: var(--status-warn); }
.active-item[data-state="substitute-deep"] { border-left-color: var(--status-warn-deep); }
.active-item[data-state="unoccupied"] { border-left-color: var(--status-critical); }

.active-role {
  font-family: var(--font-mono);
  font-size: var(--panel-heading-font);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 2px;
}

.active-person {
  font-weight: 600;
  font-size: var(--panel-name-font);
  color: var(--text-primary);
}

.active-contact {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: var(--space-2);
  font-family: var(--font-mono);
  font-size: var(--panel-text-font);
  color: var(--text-secondary);
}

.active-contact a {
  color: var(--text-secondary);
  text-decoration: none;
}

.active-contact a:hover { color: var(--accent); }

.active-contact-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.active-contact-icon {
  color: var(--text-dim);
  font-size: var(--panel-small-font);
}

.active-meta {
  display: flex;
  gap: var(--space-2);
  margin-top: var(--space-2);
  font-family: var(--font-mono);
  font-size: var(--panel-small-font);
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

/* ---- Person detail view ---- */
.person-detail {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

.detail-header {
  padding-bottom: var(--space-3);
  border-bottom: 1px solid var(--border-subtle);
}

.detail-name {
  font-size: var(--panel-detail-name-font);
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  margin-bottom: var(--space-2);
}

.detail-status {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 3px 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.detail-status[data-status="available"] {
  border-color: var(--status-ok-border);
  color: var(--status-ok);
}

.detail-status[data-status="unavailable"] {
  border-color: var(--status-critical-border);
  color: var(--status-critical);
  background: var(--status-critical-bg);
}

.detail-status-dot {
  width: 6px;
  height: 6px;
  background: currentColor;
  border-radius: 50%;
}

.detail-section {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.detail-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.detail-contact a {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) 0;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  text-decoration: none;
  transition: color 0.12s ease;
}

.detail-contact a:hover { color: var(--accent); }

.detail-roles {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.detail-role-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}

.detail-role-name {
  font-size: 13px;
  color: var(--text-primary);
}

.detail-role-rank {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
}

.detail-absence {
  padding: var(--space-3);
  background: var(--status-critical-bg);
  border: 1px solid var(--status-critical-border);
  border-radius: var(--radius-sm);
}

.absence-category {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--status-critical);
  margin-bottom: var(--space-2);
}

.absence-note {
  font-size: 13px;
  color: var(--text-primary);
  margin-bottom: var(--space-2);
  font-style: italic;
}

.absence-since {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.02em;
}

.detail-actions {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  margin-top: var(--space-2);
}

.btn-action {
  padding: var(--space-3);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-primary);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  transition: all 0.12s ease;
}

.btn-action:hover {
  background: var(--bg-hover);
  border-color: var(--border-strong);
}

.btn-action[data-variant="critical"] {
  background: var(--status-critical-bg);
  color: var(--status-critical);
  border-color: var(--status-critical-border);
}

.btn-action[data-variant="critical"]:hover {
  background: rgba(220, 38, 38, 0.2);
}

.btn-action[data-variant="primary"] {
  background: var(--status-ok-bg);
  color: var(--status-ok);
  border-color: var(--status-ok-border);
}

.btn-action[data-variant="primary"]:hover {
  background: rgba(82, 163, 115, 0.2);
}

/* ---- Audit log panel ---- */
.audit-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.audit-entry {
  padding: var(--space-2) var(--space-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-left: 2px solid var(--text-dim);
  border-radius: var(--radius-sm);
  font-size: 12px;
}

.audit-entry[data-type="availability_change"][data-action="marked_unavailable"] {
  border-left-color: var(--status-warn);
}

.audit-entry[data-type="availability_change"][data-action="marked_available"] {
  border-left-color: var(--status-ok);
}

.audit-timestamp {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.02em;
}

.audit-person {
  font-weight: 600;
  color: var(--text-primary);
}

.audit-detail {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.audit-category {
  display: inline-block;
  padding: 1px 5px;
  background: var(--bg-hover);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-secondary);
  letter-spacing: 0.03em;
  margin-right: var(--space-2);
}

.audit-empty {
  padding: var(--space-5);
  text-align: center;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
}

/* =========================================================================
   MODAL
   ========================================================================= */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10, 14, 20, 0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fade-in 0.15s ease;
}

@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  width: min(480px, 90vw);
  background: var(--bg-surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-panel);
  animation: slide-up 0.2s ease;
}

@keyframes slide-up {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border-subtle);
}

.modal-title {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.modal-close {
  color: var(--text-dim);
  font-size: 18px;
  padding: 4px 8px;
}

.modal-close:hover { color: var(--text-primary); }

.modal-body {
  padding: var(--space-5);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-5);
  border-top: 1px solid var(--border-subtle);
}

.form-field {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.form-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.form-input,
.form-select,
.form-textarea {
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--text-primary);
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  transition: border-color 0.12s ease;
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.form-textarea {
  min-height: 80px;
  resize: vertical;
  font-family: var(--font-sans);
}

.form-person-info {
  padding: var(--space-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-size: 13px;
}

.form-person-info-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.form-person-info-name {
  font-weight: 600;
  color: var(--text-primary);
}

.btn-primary {
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-primary);
  background: var(--accent);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  transition: opacity 0.12s ease;
}

.btn-primary:hover { opacity: 0.9; }

.btn-secondary {
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}

.btn-secondary:hover {
  color: var(--text-primary);
  background: var(--bg-hover);
}

/* =========================================================================
   TOAST
   ========================================================================= */
.toast {
  position: fixed;
  bottom: var(--space-5);
  right: var(--space-5);
  padding: var(--space-3) var(--space-4);
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-panel);
  font-size: 13px;
  z-index: 200;
  animation: toast-in 0.2s ease, toast-out 0.3s ease 2.7s forwards;
  max-width: 360px;
}

.toast[data-tone="success"] { border-left-color: var(--status-ok); }
.toast[data-tone="warning"] { border-left-color: var(--status-warn); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes toast-out {
  to { opacity: 0; transform: translateY(10px); }
}

/* =========================================================================
   SCROLLBARS
   ========================================================================= */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb {
  background: var(--border-subtle);
  border: 2px solid var(--bg-base);
  border-radius: 5px;
}
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* =========================================================================
   KEYBOARD HINTS
   ========================================================================= */
.kbd {
  display: inline-block;
  padding: 1px 5px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-secondary);
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}

/* =========================================================================
   PERSONS TAB
   ========================================================================= */
.persons-summary {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}

.persons-summary-metric {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: var(--space-2);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
}

.persons-summary-metric[data-tone="ok"] {
  border-color: var(--status-ok-border);
}

.persons-summary-metric[data-tone="warn"] {
  border-color: var(--status-warn-border);
  background: var(--status-warn-bg);
}

.persons-summary-label {
  font-size: var(--panel-small-font);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.persons-summary-value {
  font-size: var(--panel-summary-value-font);
  font-weight: 700;
  color: var(--text-primary);
}

.persons-summary-metric[data-tone="ok"] .persons-summary-value { color: var(--status-ok); }
.persons-summary-metric[data-tone="warn"] .persons-summary-value { color: var(--status-warn); }

.persons-filter {
  margin-bottom: var(--space-3);
}

.persons-filter .form-input {
  width: 100%;
  padding: 8px 12px;
  font-size: var(--panel-text-font);
}

.persons-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.person-list-item {
  padding: var(--space-2) var(--space-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--status-ok);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s ease;
}

.person-list-item:hover {
  background: var(--bg-hover);
}

.person-list-item[data-status="unavailable"] {
  border-left-color: var(--status-warn);
  background: var(--status-warn-bg);
}

.person-list-item[data-status="unavailable"]:hover {
  background: rgba(245, 158, 11, 0.15);
}

.person-list-head {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: 2px;
}

.person-list-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--status-ok);
  flex-shrink: 0;
}

.person-list-item[data-status="unavailable"] .person-list-dot {
  background: var(--status-warn);
}

.person-list-name {
  font-size: var(--panel-text-font);
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
}

.person-list-status-label {
  font-family: var(--font-mono);
  font-size: var(--panel-small-font);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--status-ok);
}

.person-list-item[data-status="unavailable"] .person-list-status-label {
  color: var(--status-warn);
}

.person-list-meta {
  font-family: var(--font-mono);
  font-size: var(--panel-small-font);
  letter-spacing: 0.03em;
  color: var(--text-secondary);
  margin-left: 14px;
}

.person-list-absence-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-top: 4px;
  margin-left: 14px;
}

.person-list-absence-since {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
}

.persons-empty {
  padding: var(--space-5);
  text-align: center;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
}

/* =========================================================================
   SYNC MODAL
   ========================================================================= */
.sync-tabs {
  display: flex;
  gap: 2px;
  padding: 2px;
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}

/* ---- Sync-Kanal-Picker (Code vs QR vs Online) ---- */
.sync-channel-picker {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
@media (max-width: 600px) {
  .sync-channel-picker { grid-template-columns: 1fr; }
}
.sync-channel-btn {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  text-align: left;
  cursor: pointer;
  transition: all 0.12s ease;
  color: var(--text-secondary);
}
.sync-channel-btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-default);
}
.sync-channel-btn[data-active="true"] {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--text-primary);
}
.sync-channel-label {
  font-size: 13px;
  font-weight: 600;
}
.sync-channel-hint {
  font-size: 11px;
  line-height: 1.4;
  color: var(--text-secondary);
}

/* ---- QR-Scope-Picker ---- */
.qr-scope-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 6px;
}
.qr-scope-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s ease, border-color 0.12s ease;
}
.qr-scope-row:hover {
  background: var(--bg-hover);
  border-color: var(--border-default);
}
.qr-scope-row.is-active {
  background: var(--accent-bg);
  border-color: var(--accent);
}
.qr-scope-row input[type="radio"] {
  margin-top: 2px;
  flex-shrink: 0;
}
.qr-scope-text { flex: 1; min-width: 0; }
.qr-scope-title { font-weight: 600; color: var(--text-primary); font-size: 13px; margin-bottom: 2px; }
.qr-scope-hint { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }

/* ---- QR-Display ---- */
.qr-display-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
}
.qr-display {
  width: 100%;
  max-width: 360px;
  background: #fff;
  padding: 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.qr-display svg {
  display: block;
  width: 100%;
  height: auto;
}
.qr-counter {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.05em;
}
.qr-navigation {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
}
.qr-navigation .btn-secondary.is-active {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: var(--accent);
}
.qr-fragment-hint {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: center;
  max-width: 420px;
  line-height: 1.5;
}

/* ---- QR-Scanner ---- */
.qr-scanner-idle,
.qr-scanner-error,
.qr-scanner-active {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 20px;
  min-height: 200px;
  justify-content: center;
}
.qr-scanner-icon {
  font-size: 48px;
  opacity: 0.5;
}
.qr-scanner-idle-text {
  color: var(--text-secondary);
  font-size: 13px;
  text-align: center;
}
.qr-scanner-error {
  border: 1px solid var(--status-warn-border);
  background: var(--status-warn-bg);
  border-radius: var(--radius-sm);
  padding: 16px;
}
.qr-scanner-error-title {
  font-weight: 600;
  color: var(--status-warn);
  font-size: 14px;
}
.qr-scanner-error-body,
.qr-scanner-error-hint {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.5;
}
.qr-scanner-video-wrap {
  position: relative;
  width: 100%;
  max-width: 360px;
  aspect-ratio: 4 / 3;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: #000;
  border: 1px solid var(--border-default);
}
.qr-scanner-video-wrap video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.qr-scanner-reticle {
  position: absolute;
  inset: 20%;
  border: 2px solid rgba(255, 255, 255, 0.7);
  border-radius: 8px;
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.25);
}
.qr-scanner-progress {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}
.qr-fragment-indicators {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 360px;
}
.qr-fragment-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--bg-elevated);
  border: 1px solid var(--border-default);
}
.qr-fragment-dot.is-collected {
  background: var(--status-ok);
  border-color: var(--status-ok);
}

/* ---- QR Preview (nach Empfang) ---- */
.qr-preview-wrap {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 12px 0;
}

/* ---- Settings-About Block ---- */
.settings-about {
  margin-top: 20px;
  padding-top: 12px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.settings-about-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  font-size: 11px;
  color: var(--text-secondary);
}
.settings-about-label {
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 10px;
}
.settings-about-value {
  font-family: var(--font-mono);
}
.settings-about-value a {
  color: var(--accent);
  text-decoration: none;
}
.settings-about-value a:hover {
  text-decoration: underline;
}

/* ---- Settings-Tabs (V1.2) ---- */
.settings-tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 12px;
}
.settings-tab {
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: inherit;
  transition: color 0.15s, border-color 0.15s;
}
.settings-tab:hover { color: var(--text-primary); }
.settings-tab[data-active="true"] {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ---- Sync-Sources Liste (V1.2) ---- */
.sync-no-sources {
  padding: 16px;
  border: 1px dashed var(--border-subtle);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 13px;
  text-align: center;
}
.sync-source-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sync-source-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}
.sync-source-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sync-source-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}
.sync-source-meta {
  font-size: 11px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sync-source-type-badge {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 6px;
  border-radius: 2px;
  background: var(--bg-base);
  color: var(--text-secondary);
}
.sync-source-actions {
  display: flex;
  gap: 6px;
}
.sync-source-actions button {
  padding: 4px 8px;
  font-size: 12px;
  border: 1px solid var(--border-subtle);
  background: transparent;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit;
}
.sync-source-actions button:hover { color: var(--text-primary); border-color: var(--text-secondary); }
.sync-source-actions button.danger:hover { color: var(--status-err); border-color: var(--status-err); }

/* Mobile: Source-Row vertikal stapeln, Actions dürfen wrappen.
   Sonst ragen Badge+Info+drei Action-Buttons über den Viewport hinaus
   (~470 px > iPhone-SE-Breite 375 px). */
@media (max-width: 600px) {
  .sync-source-row {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }
  .sync-source-type-badge {
    align-self: flex-start;
  }
  .sync-source-actions {
    flex-wrap: wrap;
    justify-content: flex-end;
  }
}

/* Form für Add/Edit HTTP-Source */
.sync-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
}
.sync-form-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.sync-form-row .form-field { flex: 1; }
.sync-form-buttons {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 4px;
}
.sync-form-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 4px 0;
}
.sync-add-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.sync-add-buttons button[disabled] {
  opacity: 0.5;
  cursor: not-allowed;
}
.sync-fs-dir-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
}
.sync-fs-dir-display {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  padding: 4px 8px;
  background: var(--bg-base);
  border: 1px solid var(--border-subtle);
  border-radius: 2px;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ---- Bundle Share/Import (V1.2 Phase 3.3) ---- */
.bundle-warning {
  padding: 10px 12px;
  background: var(--status-critical-bg, rgba(255,0,0,0.05));
  border-left: 3px solid var(--status-critical);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--text-primary);
}
.bundle-warning strong { display: block; margin-bottom: 4px; font-size: 13px; }
.bundle-text {
  font-family: var(--font-mono);
  font-size: 11px;
  resize: vertical;
}
.bundle-share-actions,
.bundle-import-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.bundle-import-err {
  margin-top: 8px;
  padding: 8px 12px;
  background: var(--status-critical-bg, rgba(255,0,0,0.05));
  border-left: 3px solid var(--status-critical);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--text-primary);
  font-family: var(--font-mono);
}
.bundle-preview {
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-size: 12px;
}
.bundle-preview-row { margin-bottom: 4px; }
.bundle-preview-row strong { color: var(--text-secondary); margin-right: 4px; }
.bundle-preview-row code { font-size: 11px; }
.bundle-preview-hint {
  margin-top: 4px;
  color: var(--text-secondary);
  font-size: 11px;
  font-style: italic;
}
.bundle-preview-fp {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.bundle-fp-tag {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 6px;
  border-radius: 2px;
  background: var(--bg-base);
}
.bundle-preview-fp[data-match="true"] .bundle-fp-tag {
  color: var(--status-ok);
  border: 1px solid var(--status-ok-border);
}
.bundle-preview-fp[data-match="false"] .bundle-fp-tag {
  color: var(--status-critical);
  border: 1px solid var(--status-critical-border);
}
.bundle-fp-warn {
  margin-top: 8px;
  color: var(--status-critical);
  font-size: 11px;
  font-weight: 600;
}

/* ---- Browser-Support-Banner (V1.2 Phase 3.4) ---- */
.browser-support-banner {
  margin-top: 12px;
  padding: 10px 12px;
  border-left: 3px solid var(--status-warn);
  background: var(--status-warn-bg, rgba(255,180,0,0.05));
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--text-primary);
}
.browser-support-banner strong {
  display: block;
  margin-bottom: 4px;
  font-size: 13px;
}
.browser-banner-lead { color: var(--text-secondary); }
.browser-banner-list {
  margin: 6px 0 4px 0;
  padding-left: 18px;
}
.browser-banner-list li { margin-bottom: 2px; }
.browser-banner-foot {
  margin-top: 4px;
  color: var(--text-secondary);
  font-size: 11px;
}

/* ---- V2.0 step 1: Sync-Migration-Banner (V1.3 -> V2.0 informational) ----
   Uses --accent (neutral info blue) instead of --status-warn so the banner
   doesn't visually compete with the Firefox browser-support banner above it,
   which keeps yellow for a real limitation. */
.sync-migration-banner {
  margin-bottom: 12px;
  padding: 10px 12px;
  border-left: 3px solid var(--accent);
  background: var(--accent-bg);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--text-primary);
}
.sync-migration-banner strong {
  display: block;
  margin-bottom: 4px;
  font-size: 13px;
}
.sync-migration-banner-body {
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.sync-migration-banner-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.sync-migration-banner-actions button {
  font-size: 11px;
  padding: 4px 10px;
}
/* Ghost variant for the dismiss action: visually weaker than btn-secondary
   so the CTA reads as the primary action and "Got it" reads as "do nothing". */
.sync-migration-banner-actions .btn-ghost {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border-radius: var(--radius-sm);
}
.sync-migration-banner-actions .btn-ghost:hover {
  color: var(--text-primary);
}
/* Migration-Banner-Buttons: 44pt-Mindesthöhe auf Mobile (Apple HIG) */
@media (max-width: 600px) {
  .sync-migration-banner-actions button,
  .sync-migration-banner-actions .btn-ghost {
    min-height: 44px;
    padding: 10px 14px;
    font-size: 12px;
  }
}

/* ---- Sync-Modal Online-Tab (V1.2 → V1.3 Karten-Layout) ---- */
.sync-online-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
}
.sync-online-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sync-online-card-head {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sync-online-card-meta {
  font-size: 11px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sync-card-loading {
  font-size: 12px;
  color: var(--text-secondary);
  font-style: italic;
}
.sync-card-status {
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  border-left: 3px solid transparent;
}
.sync-card-status strong { display: block; margin-bottom: 2px; font-size: 13px; }
.sync-card-status.status-ok     { border-left-color: var(--status-ok); background: var(--status-ok-bg, rgba(0,200,0,0.04)); color: var(--text-primary); }
.sync-card-status.status-warn   { border-left-color: var(--status-warn); background: var(--status-warn-bg, rgba(255,180,0,0.04)); color: var(--text-primary); }
.sync-card-status.status-error  { border-left-color: var(--status-critical); background: var(--status-critical-bg, rgba(255,0,0,0.04)); color: var(--text-primary); }
.sync-card-status .sync-card-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; font-family: var(--font-mono); }
.sync-card-stats {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 11px;
  color: var(--text-secondary);
  padding: 4px 0;
}
.sync-card-stats-row { display: flex; gap: 10px; }
.sync-card-stats-label { min-width: 70px; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; }
.sync-card-stats-value { font-family: var(--font-mono); }
.sync-card-drift-hint {
  font-size: 11px;
  color: var(--text-secondary);
  font-style: italic;
  padding: 4px 0;
}
.sync-online-card[data-focused="true"] {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}

/* Data-Modal Online-Tab (V1.3): zwei vertikale Buttons mit
   begleitender Mini-Erklärung. */
.data-online-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.data-online-action-hint {
  font-size: 11px;
  color: var(--text-secondary);
  font-style: italic;
  padding: 4px 0 0 0;
}
.sync-online-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}
@media (max-width: 600px) {
  .sync-online-row { flex-direction: column; align-items: stretch; }
}
.sync-online-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sync-online-row-head {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sync-online-last {
  font-size: 11px;
  color: var(--text-secondary);
}
.sync-online-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.sync-online-actions button {
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  border-radius: var(--radius-sm);
}
.sync-online-error {
  margin: 8px 0;
  padding: 8px 12px;
  border-left: 3px solid var(--status-err);
  background: var(--status-err-bg, rgba(255,0,0,0.05));
  color: var(--text-primary);
  font-size: 12px;
  border-radius: var(--radius-sm);
}

.qr-preview-title {
  font-weight: 600;
  font-size: 15px;
  color: var(--text-primary);
}
.qr-preview-warn {
  font-size: 12px;
  color: var(--status-warn);
  padding: 8px 12px;
  background: var(--status-warn-bg);
  border-left: 3px solid var(--status-warn);
  border-radius: 2px;
}
.qr-preview-section {
  padding: 10px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}
.qr-preview-heading {
  font-weight: 600;
  font-size: 13px;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.qr-preview-stats {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
}
.qr-preview-meta {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-style: italic;
}

.sync-tab {
  flex: 1;
  padding: 8px;
  background: none;
  border: none;
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-secondary);
  transition: all 0.12s ease;
}

.sync-tab:hover {
  color: var(--text-primary);
  background: var(--bg-hover);
}

.sync-tab[data-active="true"] {
  color: var(--text-primary);
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
}

.sync-explain {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
  padding: var(--space-2) 0;
}

.sync-code-display {
  padding: var(--space-4);
  background: var(--bg-base);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-align: center;
  color: var(--accent);
  word-break: break-all;
  user-select: all;
  cursor: text;
}

.sync-meta-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: var(--space-2);
}

.sync-meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: var(--space-2) var(--space-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
}

.sync-meta-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.sync-meta-value {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.sync-meta-value code {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  background: none;
  padding: 0;
}

.sync-hash-match { color: var(--status-ok); }
.sync-hash-mismatch { color: var(--status-critical); }

.sync-input {
  font-family: var(--font-mono) !important;
  font-size: 16px !important;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.sync-feedback { min-height: 20px; }

.sync-error {
  padding: var(--space-3);
  background: var(--status-critical-bg);
  border: 1px solid var(--status-critical-border);
  border-radius: var(--radius-sm);
  color: var(--status-critical);
  font-size: 12px;
  line-height: 1.4;
}

/* =========================================================================
   RESPONSIVE
   ----------------------------------------------------------------
   Strategie:
     > 1024px : Desktop — 2-Spalten-Layout, ◨ toggelt Panel
     768-1024 : Tablet — 2-Spalten, kompakter
     < 768px  : Phone — 1 sichtbare View zur Zeit, Bottom-Nav wechselt
                zwischen Organigramm und den drei Panel-Tabs
   ========================================================================= */

/* Bottom-Nav ist auf Desktop/Tablet unsichtbar */
.mobile-nav { display: none; }

/* ---- Tablet / schmaler Desktop (≤ 1200px) ---- */
@media (max-width: 1200px) {
  :root {
    --panel-width: 300px;
  }
  [data-size="l"], [data-size="xl"] {
    --panel-width: 340px;
  }
  .brand-divider, .brand-name { display: none; }
  .status-metric { padding: 3px 8px; font-size: 11px; }
  .status-banner { gap: var(--space-2); }
  .header-actions { gap: 4px; }
  .btn { padding: 6px 10px; }

  /* Labels auf schmalem Desktop/Tablet weg, nur Icons */
  .btn-label { display: none; }
}

/* ---- Phone (< 768px) ---- */
@media (max-width: 767px) {
  /* App-Struktur: Header, Main, Bottom-Nav (fix) */
  html, body {
    height: 100%;
    overflow: hidden;
  }
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh; /* dynamic viewport — korrekt unter iOS */
  }
  /* Header: Grid aufgeben, Flex-Row. Brand links, Buttons rechts,
     Status-Banner in voller Breite darunter. Kein Kampf um die Mittelspalte. */
  .app-header {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    flex: 0 0 auto;
    padding: var(--space-2) var(--space-3);
    padding-top: max(var(--space-2), env(safe-area-inset-top));
    gap: var(--space-2);
    min-height: 0;
    height: auto;
  }
  .brand {
    flex: 0 1 auto;
    min-width: 0;
  }
  .app-main {
    flex: 1 1 auto;
    min-height: 0;
    grid-template-columns: 1fr !important;
    overflow: hidden;
  }

  /* --- Mobile-View-Switch: exakt EINE Ansicht sichtbar --- */
  [data-mobile-view="org"] .org-chart { display: block; }
  [data-mobile-view="org"] .side-panel { display: none; }
  [data-mobile-view="panel"] .org-chart { display: none; }
  [data-mobile-view="panel"] .side-panel { display: flex; width: 100%; }

  /* Panel nimmt volle Breite und Höhe, scrollt intern */
  .side-panel {
    width: 100%;
    max-width: 100%;
  }
  .panel-content {
    padding: var(--space-3);
  }

  /* Die panel-tabs im Panel verstecken — Mobile-Nav übernimmt */
  .panel-tabs { display: none; }

  /* Header kompakt — Brand-Name und Divider weg */
  .brand { font-size: 14px; }
  .brand-divider, .brand-name { display: none; }

  /* Status-Banner in eigene Zeile unter Brand + Actions */
  .status-banner {
    order: 3;
    flex: 1 0 100%;
    justify-content: flex-start;
    gap: var(--space-2);
    flex-wrap: wrap;
    padding-top: 4px;
    border-top: 1px solid var(--border-subtle);
  }
  .status-metric { padding: 2px 6px; font-size: 10px; }

  /* Header-Actions als Flex-Row. Buttons halten Touch-Target 44x44 (HIG),
     daher Wrap erlaubt — falls 44px-Buttons nicht in eine Zeile passen,
     darf die Action-Reihe umbrechen statt geclippt zu werden. */
  .header-actions {
    flex: 1 1 auto;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 4px;
    min-width: 0;
  }

  /* Panel-Toggle-Button auf Mobile verstecken (Bottom-Nav übernimmt Navigation) */
  #btn-panel { display: none; }
  /* Auf Mobile: alle Labels weg, nur Icons.
     Touch-Target: 44x44 (Apple HIG / WCAG 2.5.5). */
  .btn {
    padding: 6px 8px;
    min-width: 44px;
    min-height: 44px;
    flex-shrink: 1;
  }
  .btn-label { display: none; }
  .btn-icon { font-size: 16px; }
  .btn-lang { min-width: 44px; max-width: 54px; font-size: 11px; padding: 6px 4px; }

  /* Org-Chart — kompakter */
  .org-chart {
    padding: var(--space-3);
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }
  .roles-grid {
    grid-template-columns: 1fr !important;
    gap: var(--space-2);
  }
  .role-card {
    min-width: 0 !important;
    width: 100%;
  }
  .level-header {
    flex-wrap: wrap;
    gap: 4px;
  }
  .edit-banner {
    padding: var(--space-2) var(--space-3);
    flex-wrap: wrap;
  }

  /* Touch-Targets */
  .btn-edit-inline {
    min-width: 36px;
    min-height: 36px;
    padding: 6px 10px;
    font-size: 13px;
  }
  .btn-manual-assign {
    min-width: 36px;
    min-height: 36px;
    font-size: 18px;
  }

  /* Listen in Panel: größere Klickflächen */
  .person-list-item { padding: var(--space-3); }
  .absent-item, .active-item {
    padding: var(--space-3);
    min-height: 44px;
  }
  .btn-action {
    min-height: 48px;
    padding: var(--space-3) var(--space-4);
    font-size: 14px;
  }

  /* Modal füllt Viewport */
  .modal-backdrop {
    align-items: flex-start;
  }
  .modal {
    width: 100%;
    max-width: 100%;
    margin: 0;
    border-radius: 0;
    height: 100vh;
    height: 100dvh;
    max-height: 100vh;
    max-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  .modal-body {
    padding: var(--space-3);
    flex: 1 1 auto;
    overflow-y: auto;
  }
  .modal-footer {
    padding: var(--space-3);
    flex-wrap: wrap;
    gap: var(--space-2);
  }
  .modal-footer button {
    flex: 1;
    min-height: 44px;
    padding: var(--space-3);
  }

  /* Sync-Code gut lesbar auf schmalem Screen */
  .sync-code-display {
    font-size: 14px;
    padding: var(--space-3);
    word-break: break-all;
  }

  /* Assignment-Editor kompakt */
  .assignment-row { flex-wrap: wrap; gap: 4px; }
  .assignment-controls { gap: 2px; }

  /* Form-Inputs: iOS-Auto-Zoom verhindern */
  .form-input,
  .form-select,
  .form-textarea {
    font-size: 16px;
  }

  /* --- BOTTOM-NAV (immer sichtbar, fest unten) --- */
  .mobile-nav {
    display: flex;
    flex: 0 0 auto;
    justify-content: stretch;
    border-top: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    padding-bottom: env(safe-area-inset-bottom, 0);
    z-index: 10;
  }
  .mobile-nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-height: 56px;
    padding: 6px 4px;
    background: transparent;
    border: none;
    border-top: 2px solid transparent;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.12s ease, border-color 0.12s ease;
  }
  .mobile-nav-btn:active {
    background: var(--bg-hover);
  }
  .mobile-nav-btn[data-active="true"] {
    color: var(--accent);
    border-top-color: var(--accent);
  }
  .mobile-nav-icon {
    font-size: 18px;
    line-height: 1;
  }
  .mobile-nav-label {
    font-size: 10px;
    letter-spacing: 0.03em;
  }
}

/* ---- Sehr schmal (< 500px) — typische Phones ---- */
@media (max-width: 499px) {
  .app-header { padding: 6px var(--space-2); padding-top: max(6px, env(safe-area-inset-top)); gap: 4px; }
  .brand { font-size: 12px; }
  .btn { padding: 6px 6px; min-width: 44px; min-height: 44px; font-size: 11px; }
  .btn-lang { min-width: 42px; max-width: 50px; }
  /* Brand-Mark (grüner Punkt) kleiner */
  .brand-mark { width: 6px; height: 6px; }
}

/* ---- Sehr schmal (< 380px) — Galaxy-Fold etc. ---- */
@media (max-width: 379px) {
  .app-header { padding: 4px 6px; padding-top: max(4px, env(safe-area-inset-top)); }
  .brand { font-size: 11px; }
  .btn { padding: 5px 5px; min-width: 44px; min-height: 44px; font-size: 10px; }
  .btn-lang { min-width: 38px; max-width: 44px; font-size: 10px; }
  .modal-footer button { font-size: 13px; padding: var(--space-2); }
  .mobile-nav-label { font-size: 9px; }
  .mobile-nav-icon { font-size: 16px; }
}

/* =========================================================================
   PRINT LAYOUT
   ----------------------------------------------------------------
   Ziel: Papiergerecht, unabhängig vom Bildschirm-Layout. Das bestehende
   UI (Header, Mobile-Nav, Modals, Panel) wird im Druck komplett
   ausgeblendet. Angezeigt wird nur der Inhalt im #print-container.

   Größen: --print-scale wird vor dem Druck per JS gesetzt (A4=1.0,
   A3=1.35 etc.) sodass Schriften und Abstände mitskalieren. Kein
   Browser-"Shrink to fit" gefragt.
   ========================================================================= */

/* Print-Container ist auf dem Bildschirm immer unsichtbar */
#print-container {
  display: none;
}

@media print {
  /* UI komplett aus */
  .app, .modal-backdrop, .mobile-nav, .toast {
    display: none !important;
  }

  /* Browser-Hintergrund weg */
  html, body {
    background: #fff !important;
    color: #000 !important;
    height: auto !important;
    overflow: visible !important;
  }

  /* Druck-Container einblenden.
     Margin-Strategie (zweistufig, robust):
       1. @page { margin: 18mm } im print-page-size-style — gibt
          der Browser in der Regel jedem Seitenumbruch als Rand
       2. padding: 5mm hier — kleiner Puffer, falls der User im
          Druckdialog "Ränder: Keine" oder "Minimum" wählt, damit
          der Text nicht komplett bündig am Blattrand klebt. */
  #print-container {
    display: block !important;
    color: #000;
    background: #fff;
    font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    font-size: calc(10pt * var(--print-scale, 1));
    line-height: 1.35;
    padding: 5mm;
    box-sizing: border-box;
  }

  /* @page-Regel wird komplett per JS via <style id="print-page-size">
     gesetzt (Size, Margin, Page-Numbering in EINEM Block, konfliktfrei). */

  /* Grundlegende Typografie */
  .p-h1 { font-size: calc(18pt * var(--print-scale, 1)); font-weight: 700; margin: 0 0 6pt 0; }
  .p-h2 { font-size: calc(14pt * var(--print-scale, 1)); font-weight: 700; margin: 10pt 0 4pt 0; border-bottom: 1pt solid #000; padding-bottom: 2pt; }
  .p-h3 { font-size: calc(11pt * var(--print-scale, 1)); font-weight: 700; margin: 6pt 0 3pt 0; }
  .p-text { font-size: calc(10pt * var(--print-scale, 1)); }
  .p-small { font-size: calc(8pt * var(--print-scale, 1)); color: #444; }

  /* ---- Seitenkopf — auf jeder Seite oben ---- */
  .p-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10pt;
    border-bottom: 2pt solid #000;
    padding-bottom: 4pt;
    margin-bottom: 8pt;
  }
  .p-header-main { flex: 1; }
  .p-header-meta {
    text-align: right;
    font-size: calc(8pt * var(--print-scale, 1));
    color: #333;
  }
  .p-header-meta div { margin-bottom: 2pt; }

  /* ---- Footer auf jeder Seite ---- */
  .p-footer {
    position: running(pageFooter);
    font-size: calc(8pt * var(--print-scale, 1));
    color: #666;
    text-align: center;
    border-top: 0.5pt solid #999;
    padding-top: 3pt;
  }

  /* ============================================================
     VARIANTE 1 — ÜBERSICHT (1 Seite, groß lesbar)
     ============================================================ */
  .p-overview .p-levels-grid {
    display: grid;
    gap: 6pt;
    grid-template-columns: repeat(var(--p-cols, 3), 1fr);
    align-items: stretch;
  }
  .p-overview .p-level-block {
    break-inside: avoid;
    border: 1pt solid #000;
    border-radius: 4pt;
    padding: 5pt 6pt;
    background: #f7f7f7;
    display: flex;
    flex-direction: column;
    gap: 3pt;
  }
  .p-overview .p-level-name {
    font-size: calc(9pt * var(--print-scale, 1));
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 0.5pt solid #000;
    padding-bottom: 2pt;
    margin-bottom: 2pt;
  }
  .p-overview .p-role-card {
    break-inside: avoid;
    background: #fff;
    border: 0.5pt solid #bbb;
    border-left: 2.5pt solid #000;
    border-radius: 2pt;
    padding: 4pt 5pt;
    display: flex;
    flex-direction: column;
    gap: 1pt;
  }
  .p-overview .p-role-card[data-critical="true"] {
    border-left-color: #c00;
    background: #fff5f5;
  }
  .p-overview .p-role-name {
    font-size: calc(9pt * var(--print-scale, 1));
    font-weight: 600;
    color: #333;
  }
  .p-overview .p-role-person {
    font-size: calc(12pt * var(--print-scale, 1));
    font-weight: 700;
    color: #000;
  }
  .p-overview .p-role-person[data-unoccupied="true"] {
    color: #c00;
    font-style: italic;
  }
  .p-overview .p-role-phone {
