    font-family: 'IBM Plex Mono', monospace;
    font-size: calc(11pt * var(--print-scale, 1));
    color: #000;
  }
  .p-overview .p-role-sub-hint {
    font-size: calc(7.5pt * var(--print-scale, 1));
    color: #666;
    font-style: italic;
  }
  .p-overview .p-critical-badge {
    display: inline-block;
    background: #c00;
    color: #fff;
    font-size: calc(6.5pt * var(--print-scale, 1));
    font-weight: 700;
    padding: 1pt 4pt;
    border-radius: 2pt;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ============================================================
     VARIANTE 2 — ROLLEN-DETAIL (mehrseitig)
     ============================================================ */
  .p-detail .p-level-section {
    break-inside: avoid-page;
    margin-bottom: 8pt;
  }
  .p-detail .p-level-section .p-h2 {
    break-after: avoid;
  }
  .p-detail .p-detail-role {
    break-inside: avoid;
    border: 0.5pt solid #999;
    padding: 5pt 6pt;
    margin-bottom: 4pt;
    background: #fafafa;
  }
  .p-detail .p-detail-role[data-critical="true"] {
    border-left: 2.5pt solid #c00;
    background: #fff5f5;
  }
  .p-detail .p-detail-role-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 6pt;
    margin-bottom: 3pt;
  }
  .p-detail .p-detail-role-name {
    font-size: calc(11pt * var(--print-scale, 1));
    font-weight: 700;
  }
  .p-detail .p-detail-manual-note {
    font-size: calc(9pt * var(--print-scale, 1));
    padding: 3pt 5pt;
    background: #fff3c0;
    border-left: 2pt solid #c90;
    margin-bottom: 4pt;
  }
  .p-detail .p-no-chain {
    font-size: calc(9pt * var(--print-scale, 1));
    color: #666;
    padding: 3pt 0;
  }
  .p-detail .p-chain-list {
    margin: 2pt 0 0 0;
    padding: 0;
    list-style: none;
  }
  .p-detail .p-chain-item {
    display: flex;
    gap: 8pt;
    padding: 2pt 0;
    border-top: 0.25pt dotted #bbb;
    font-size: calc(9pt * var(--print-scale, 1));
  }
  .p-detail .p-chain-rank {
    flex: 0 0 auto;
    width: 50pt;
    font-size: calc(8pt * var(--print-scale, 1));
    color: #666;
    text-transform: uppercase;
  }
  .p-detail .p-chain-name { flex: 1; }
  .p-detail .p-chain-contact {
    flex: 0 0 auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: calc(8.5pt * var(--print-scale, 1));
    color: #333;
  }
  .p-detail .p-chain-item[data-absent="true"] .p-chain-name {
    text-decoration: line-through;
    color: #888;
  }
  .p-detail .p-chain-item[data-active="true"] {
    background: #fff3c0;
    font-weight: 600;
  }
  .p-detail .p-absent-tag {
    display: inline-block;
    background: #ddd;
    color: #555;
    padding: 0 3pt;
    font-size: calc(7pt * var(--print-scale, 1));
    margin-left: 4pt;
    border-radius: 1pt;
  }

  /* ============================================================
     VARIANTE 3 — PERSONEN-LISTE
     ============================================================ */
  .p-persons .p-person-section {
    margin-bottom: 10pt;
    break-inside: auto;
  }
  .p-persons .p-person-row {
    break-inside: avoid;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4pt 10pt;
    padding: 3pt 0;
    border-bottom: 0.25pt solid #ccc;
  }
  .p-persons .p-person-row[data-absent="true"] {
    background: #fcecec;
    padding-left: 3pt;
  }
  .p-persons .p-person-main {
    display: flex;
    flex-direction: column;
    gap: 1pt;
  }
  .p-persons .p-person-name {
    font-weight: 700;
    font-size: calc(10pt * var(--print-scale, 1));
  }
  .p-persons .p-person-name[data-absent="true"]::after {
    content: " — ABSENT";
    font-weight: 400;
    font-size: calc(8pt * var(--print-scale, 1));
    color: #c00;
  }
  .p-persons .p-person-contact {
    font-family: 'IBM Plex Mono', monospace;
    font-size: calc(8.5pt * var(--print-scale, 1));
    color: #333;
  }
  .p-persons .p-person-roles {
    font-size: calc(8pt * var(--print-scale, 1));
    color: #555;
  }
  .p-persons .p-person-role-chip {
    display: inline-block;
    background: #eee;
    padding: 1pt 4pt;
    margin: 1pt 2pt 1pt 0;
    border-radius: 1pt;
    font-size: calc(7.5pt * var(--print-scale, 1));
  }
}

/* Page-Size-Direktiven werden per JS per <style id="print-page-size"> gesetzt.
   Das Default @page oben wird dann spezifischer überschrieben. */

</style>
</head>
<body>

<div class="app" id="app">

  <!-- ================= HEADER ================= -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" id="brand-mark"></div>
      <span>CRAM</span>
      <span class="brand-divider">│</span>
      <span class="brand-name">Crisis Role Availability Manager</span>
    </div>

    <div class="status-banner" id="status-banner">
      <div class="sync-indicator" id="sync-indicator" hidden></div>
      <div class="status-metrics" id="status-metrics"></div>
    </div>

    <div class="header-actions">
      <select class="btn btn-lang" id="lang-select" title="Sprache" aria-label="Sprache">
        <!-- populated by JS -->
      </select>
      <button class="btn" id="btn-sync" data-action="hdr-sync" title="Sync-Code senden/empfangen">
        <span class="btn-icon">⇄</span>
        <span class="btn-label" id="btn-sync-label">Sync</span>
      </button>
      <button class="btn" id="btn-data" data-action="hdr-data" title="Import / Export">
        <span class="btn-icon">⇵</span>
        <span class="btn-label" id="btn-data-label">Daten</span>
      </button>
      <button class="btn" id="btn-print" data-action="hdr-print" title="Drucken / PDF">
        <span class="btn-icon">🖨</span>
        <span class="btn-label" id="btn-print-label">Drucken</span>
      </button>
      <button class="btn" id="btn-cascade" data-action="hdr-cascade" title="Aktive Vertretungen anzeigen">
        <span class="btn-icon" id="cascade-icon">↯</span>
      </button>
      <button class="btn" id="btn-panel" data-action="hdr-panel" title="Seitenpanel ein-/ausblenden">
        <span class="btn-icon" id="panel-icon">▮▯</span>
      </button>
      <button class="btn" id="btn-size" data-action="hdr-size" title="Ansichtsgröße">
        <span class="btn-icon" id="size-icon">M</span>
      </button>
      <button class="btn" id="btn-theme" data-action="hdr-theme" title="Theme umschalten">
        <span class="btn-icon" id="theme-icon">☾</span>
      </button>
      <button class="btn" id="btn-edit" data-action="hdr-edit" title="Edit-Modus umschalten">
        <span class="btn-icon">✎</span>
        <span class="btn-label" id="btn-edit-label">Edit</span>
      </button>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main class="app-main">
    <section class="org-chart" id="org-chart">
      <!-- populated by JS -->
    </section>

    <aside class="side-panel">
      <div class="panel-tabs" role="tablist">
        <button class="panel-tab" data-tab="active" data-action="tab-active" data-active="true" role="tab" id="tab-label-active">
          Besetzung
        </button>
        <button class="panel-tab" data-tab="persons" data-action="tab-persons" role="tab" id="tab-label-persons">
          Personen
        </button>
        <button class="panel-tab" data-tab="audit" data-action="tab-audit" role="tab" id="tab-label-audit">
          Log
        </button>
      </div>
      <div class="panel-content" id="panel-content">
        <!-- populated by JS -->
      </div>
    </aside>
  </main>

  <!-- ================= MOBILE BOTTOM-NAV ================= -->
  <nav class="mobile-nav" id="mobile-nav" role="navigation" aria-label="Hauptnavigation">
    <button class="mobile-nav-btn" data-action="mobile-nav-org" id="mobile-nav-org">
      <span class="mobile-nav-icon">⊞</span>
      <span class="mobile-nav-label" id="mobile-nav-label-org">Chart</span>
    </button>
    <button class="mobile-nav-btn" data-action="mobile-nav-active" id="mobile-nav-active">
      <span class="mobile-nav-icon">●</span>
      <span class="mobile-nav-label" id="mobile-nav-label-active">Besetzung</span>
    </button>
    <button class="mobile-nav-btn" data-action="mobile-nav-persons" id="mobile-nav-persons">
      <span class="mobile-nav-icon">☰</span>
      <span class="mobile-nav-label" id="mobile-nav-label-persons">Personen</span>
    </button>
    <button class="mobile-nav-btn" data-action="mobile-nav-audit" id="mobile-nav-audit">
      <span class="mobile-nav-icon">≡</span>
      <span class="mobile-nav-label" id="mobile-nav-label-audit">Log</span>
    </button>
  </nav>

</div>

<!-- ================= PRINT CONTAINER ================= -->
<!-- Wird bei Bildschirmanzeige ausgeblendet (display: none),
     bei @media print sichtbar, während .app unsichtbar geschaltet wird.
     Inhalt wird per JS unmittelbar vor window.print() befüllt. -->
<div id="print-container" aria-hidden="true"></div>

<!-- ================= MODAL ================= -->
<div class="modal-backdrop" id="modal-backdrop" style="display: none;">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Verfügbarkeit ändern</div>
      <button class="modal-close" id="modal-close" data-action="modal-close" aria-label="Schließen">×</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- populated by JS -->
    </div>
    <div class="modal-footer" id="modal-footer">
      <!-- populated by JS -->
    </div>
  </div>
</div>
