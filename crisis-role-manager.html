/* =========================================================================
   CORE ALGORITHM: OCCUPANCY RESOLUTION (role-priority-based)
   ----------------------------------------------------------------
   Rollenzentrischer Ansatz: Rollen werden nach Priorität sortiert
   (kritisch > nicht-kritisch, dann Ebene, dann Rollen-Index),
   und in dieser Reihenfolge mit dem ersten verfügbaren und noch
   nicht beanspruchten Kandidaten aus ihrer Stellvertreterkette
   besetzt.

   Daraus folgt die gewünschte Kaskade:
   - Kritische Rollen werden immer zuerst besetzt
   - Sie ziehen bei Bedarf Stellvertreter aus weniger kritischen
     Rollen heraus
   - Die weniger kritischen Rollen rutschen dann automatisch auf
     ihre eigenen Stellvertreter weiter oder bleiben ggfs. leer
   ========================================================================= */
/* =========================================================================
   PRIORITÄT
   ----------------------------------------------------------------
   Priorität einer Rolle ist ein Tupel [levelIdx, criticalRank]:
     - levelIdx kleiner  = höher (oberste Ebene ist am wichtigsten)
     - criticalRank 0 wenn kritisch, 1 sonst  (kritisch schlägt unkritisch
       auf derselben Ebene)
   Gleiches Tupel = gleiche Priorität. Eine Rolle darf die Primär-
   Person einer anderen Rolle NUR beanspruchen, wenn sie STRIKT höhere
   Priorität hat.
   ========================================================================= */
function rolePriority(role, levelIdx) {
  return [levelIdx, role.critical ? 0 : 1];
}

function isStrictlyHigherPriority(a, b) {
  if (a[0] !== b[0]) return a[0] < b[0];
  return a[1] < b[1];
}

function resolveOccupancy(config, runtime) {
  const unavailable = runtime.unavailable || {};
  const manualAssignments = runtime.manualAssignments || {}; // roleId → personId

  // Alle Rollen mit Priorität einsammeln
  const roleInfos = [];
  config.levels.forEach((level, levelIdx) => {
    level.roles.forEach((role, roleIdx) => {
      roleInfos.push({
        role,
        levelIdx,
        roleIdx,
        priority: rolePriority(role, levelIdx),
      });
    });
  });

  // Map personId → roleInfo (Rolle, in der Person Primär ist — laut Config)
  const primaryRoleInfoByPerson = {};
  roleInfos.forEach(info => {
    const primary = info.role.assignments.find(a => a.rank === 0);
    if (primary) {
      primaryRoleInfoByPerson[primary.personId] = info;
    }
  });

  const roleOccupants = {}; // roleId -> { personId, rank, manual?, manualAbsent?, manualPersonId? }
  const claimedPersons = new Set();

  // ---- Phase 1: Manuelle Zuordnungen (harte Sperre) ----
  // Durchlauf in config-Reihenfolge, falls zwei manuelle Zuordnungen dieselbe
  // Person nutzen: gewinnt die erste in Config-Reihenfolge.
  roleInfos.forEach(info => {
    const roleId = info.role.id;
    if (!(roleId in manualAssignments)) return;
    const personId = manualAssignments[roleId];
    if (!personId) return;

    // Person existiert?
    const person = config.persons.find(p => p.id === personId);
    if (!person) return; // verwaiste manuelle Zuordnung — ignorieren

    if (unavailable[personId]) {
      // Harte Sperre: Slot bleibt für diese Person reserviert, ist aber leer
      roleOccupants[roleId] = {
        personId: null,
        rank: null,
        manual: true,
        manualAbsent: true,
        manualPersonId: personId,
      };
      claimedPersons.add(personId);
      return;
    }
    if (claimedPersons.has(personId)) {
      // Person ist bereits anderweitig manuell gebunden (Konflikt)
      // Slot bleibt leer, manuelle Zuordnung wird markiert
      roleOccupants[roleId] = {
        personId: null,
        rank: null,
        manual: true,
        manualAbsent: true,
        manualPersonId: personId,
      };
      return;
    }

    roleOccupants[roleId] = { personId, rank: null, manual: true };
    claimedPersons.add(personId);
  });

  // Wenn eine Rolle manuell durch eine FREMDE Person besetzt ist, ist
  // die Config-Primärperson dieser Rolle effektiv nicht mehr gebunden —
  // sie darf für andere Rollen wieder kandidieren.
  Object.keys(manualAssignments).forEach(roleId => {
    const info = roleInfos.find(i => i.role.id === roleId);
    if (!info) return;
    const configPrimary = info.role.assignments.find(a => a.rank === 0);
    if (!configPrimary) return;
    if (manualAssignments[roleId] === configPrimary.personId) return; // gleiche Person
    // Config-Primär wird aus dem Primär-Index entfernt
    if (primaryRoleInfoByPerson[configPrimary.personId] &&
        primaryRoleInfoByPerson[configPrimary.personId].role.id === roleId) {
      delete primaryRoleInfoByPerson[configPrimary.personId];
    }
  });

  // ---- Phase 2: Automatik, sortiert nach Priorität ----
  const autoSorted = roleInfos
    .filter(info => !(info.role.id in roleOccupants))
    .sort((a, b) => {
      if (a.priority[0] !== b.priority[0]) return a.priority[0] - b.priority[0];
      if (a.priority[1] !== b.priority[1]) return a.priority[1] - b.priority[1];
      return a.roleIdx - b.roleIdx;
    });

  for (const info of autoSorted) {
    const role = info.role;
    const myPriority = info.priority;
    const sortedAssignments = [...role.assignments].sort((a, b) => a.rank - b.rank);

    for (const assignment of sortedAssignments) {
      const pid = assignment.personId;
      if (unavailable[pid]) continue;
      if (claimedPersons.has(pid)) continue;

      // Neue Regel: Person darf nur genommen werden, wenn sie NICHT primär
      // in einer Rolle mit gleicher oder höherer Priorität ist (außer hier).
      const primaryInfo = primaryRoleInfoByPerson[pid];
      if (primaryInfo && primaryInfo.role.id !== role.id) {
        if (!isStrictlyHigherPriority(myPriority, primaryInfo.priority)) {
          continue; // Person gehört woanders hin, wir haben keinen Vorrang
        }
      }

      roleOccupants[role.id] = {
        personId: pid,
        rank: assignment.rank,
      };
      claimedPersons.add(pid);
      break;
    }
  }

  return roleOccupants;
}

/* =========================================================================
   HELPERS
   ========================================================================= */
function findPerson(personId) {
  return State.config.persons.find(p => p.id === personId);
}

function findRole(roleId) {
  for (const level of State.config.levels) {
    const role = level.roles.find(r => r.id === roleId);
    if (role) return { role, level };
  }
  return null;
}

function getRolesForPerson(personId) {
  const result = [];
  State.config.levels.forEach((level, levelIdx) => {
    level.roles.forEach((role, roleIdx) => {
      role.assignments.forEach((a) => {
        if (a.personId === personId) {
          result.push({ level, role, rank: a.rank });
        }
      });
    });
  });
  // Nach Rang sortieren
  result.sort((a, b) => a.rank - b.rank);
  return result;
}

function rankLabel(rank) {
  if (rank === 0) return t('rank.primary');
  return t('rank.substitute', { n: rank });
}

function formatDateTime(iso) {
  const d = new Date(iso);
  const pad = (n) => String(n).padStart(2, '0');
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatRelative(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return t('time.just_now');
  if (mins < 60) return t('time.minutes_ago', { n: mins });
  const hours = Math.floor(mins / 60);
  if (hours < 24) return t('time.hours_ago', { n: hours });
  const days = Math.floor(hours / 24);
  return t('time.days_ago', { n: days });
}

function categoryLabel(key) {
  const cat = ABSENCE_CATEGORIES.find(c => c.value === key);
  return cat ? t(cat.labelKey) : key;
}

// Simple escape for user-facing strings that might contain < > &
function escapeHTML(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function uid(prefix) {
  return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
}

/* ---- Status Banner ---- */
function renderStatusBanner() {
  const banner = document.getElementById('status-banner');
  let totalRoles = 0;
  let primaryActive = 0;
  let substituteActive = 0;
  let unoccupied = 0;
  let criticalUnoccupied = 0;

  State.config.levels.forEach(level => {
    level.roles.forEach(role => {
      totalRoles++;
      const occ = State.occupancy[role.id];
      if (!occ) {
        unoccupied++;
        if (role.critical) criticalUnoccupied++;
      } else if (occ.rank === 0) {
        primaryActive++;
      } else {
        substituteActive++;
      }
    });
  });

  const unavailableCount = Object.keys(State.runtime.unavailable || {}).length;
  const criticalSuffix = criticalUnoccupied > 0
    ? t('status.critical_suffix', { n: criticalUnoccupied })
    : '';

  banner.innerHTML = `
    <div class="status-metric" data-tone="ok">
      <span class="status-label">${escapeHTML(t('status.primary'))}</span>
      <span class="status-value">${primaryActive}/${totalRoles}</span>
    </div>
    <div class="status-metric" data-tone="${substituteActive > 0 ? 'warn' : 'ok'}">
      <span class="status-label">${escapeHTML(t('status.substitute_active'))}</span>
      <span class="status-value">${substituteActive}</span>
    </div>
    <div class="status-metric" data-tone="${unoccupied > 0 ? 'critical' : 'ok'}">
      <span class="status-label">${escapeHTML(t('status.unoccupied'))}</span>
      <span class="status-value">${unoccupied}${escapeHTML(criticalSuffix)}</span>
    </div>
    <div class="status-metric" data-tone="${unavailableCount > 0 ? 'warn' : 'ok'}">
      <span class="status-label">${escapeHTML(t('status.absent'))}</span>
      <span class="status-value">${unavailableCount}</span>
    </div>
  `;

  // Brand-Mark-Farbe: rot bei kritisch unbesetzt, amber bei STV-Betrieb, grün sonst
  const mark = document.getElementById('brand-mark');
  if (criticalUnoccupied > 0) {
    mark.style.background = 'var(--status-critical)';
    mark.style.boxShadow = '0 0 8px var(--status-critical)';
  } else if (substituteActive > 0 || unoccupied > 0) {
    mark.style.background = 'var(--status-warn)';
    mark.style.boxShadow = '0 0 8px var(--status-warn)';
  } else {
    mark.style.background = 'var(--status-ok)';
    mark.style.boxShadow = '0 0 8px var(--status-ok)';
  }
}

/* ---- Org Chart ---- */
function renderOrgChart() {
  const container = document.getElementById('org-chart');

  const bannerHTML = State.isEditMode ? `
    <div class="edit-banner">
      <span class="edit-banner-text">${escapeHTML(t('edit.banner'))}</span>

      <button class="btn-secondary edit-banner-exit" data-action="exit-edit">${escapeHTML(t('edit.banner_exit'))}</button>

    ? State.config.levels.map((level, idx) => renderLevel(level, idx)).join('')
    : `<div class="level-empty" style="margin: 24px 0;">${escapeHTML(t('edit.empty_org'))}</div>`;

  const addLevelHTML = State.isEditMode ? `
    <div class="add-level-row">
      <button class="btn-edit-prominent" data-action="add-level">
        ${escapeHTML(t('edit.add_level'))}
      </button>
    </div>
  ` : '';

  container.innerHTML = bannerHTML + levelsHTML + addLevelHTML;

  // Alle Click-Handler laufen jetzt über den globalen Dispatcher (data-action).
  // Keyboard-Navigation für Rollenkarten: Enter/Space öffnet Detail
  container.querySelectorAll('.role-card[data-occupant-id]').forEach(card => {
    card.addEventListener('keydown', (e) => {
      if (e.target !== card) return;
      if (State.isEditMode) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        const pid = card.dataset.occupantId;
        if (pid) openPersonDetail(pid);
      }
    });
  });
  container.querySelectorAll('.chain-slot[data-person-id]').forEach(slot => {
    slot.addEventListener('keydown', (e) => {
      if (State.isEditMode) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        e.stopPropagation();
        openPersonDetail(slot.dataset.personId);
      }
    });
  });
}

      <div class="roles-grid">${rolesHTML}</div>
    </div>
  `;
}

function renderRoleCard(role, level, roleIdx) {
  const occ = State.occupancy[role.id];
  let state, personName, personId, rankBadge, originalHTML;
  const isManual = !!(occ && occ.manual);
  const isManualAbsent = !!(occ && occ.manualAbsent);

  if (!occ || (occ && occ.personId === null && !occ.manualAbsent)) {
    state = 'unoccupied';
    personName = null;
    personId = null;
    rankBadge = 'unoccupied';
    originalHTML = '';
  } else if (isManualAbsent) {
    // Manuell zugeordnet, aber Person abwesend → Slot bleibt leer, Hinweis anzeigen
    state = 'manual-absent';
    const assigned = findPerson(occ.manualPersonId);
    personName = assigned ? assigned.name : '(?)';
    personId = occ.manualPersonId;
    rankBadge = 'manual-absent';
    originalHTML = '';
  } else {
    if (isManual) state = 'manual';
    else if (occ.rank === 0) state = 'primary';
    else if (occ.rank <= 2) state = 'substitute';
    else state = 'substitute-deep';

    const person = findPerson(occ.personId);
    personName = person ? person.name : '(?)';
    personId = occ.personId;
    rankBadge = isManual ? 'manual' : occ.rank;

    if (!isManual && occ.rank > 0) {
      const primary = role.assignments.find(a => a.rank === 0);
      if (primary) {
        const primaryPerson = findPerson(primary.personId);
        if (primaryPerson) {
          originalHTML = `
            <div class="originally-assigned">
              ${escapeHTML(t('role.replaces'))} <strike>${escapeHTML(primaryPerson.name)}</strike>
            </div>
          `;
        }
      }
    } else {
      originalHTML = '';
    }
  }

  // Chain visualization
  const sortedAssignments = [...role.assignments].sort((a, b) => a.rank - b.rank);
  const chainHTML = sortedAssignments.length === 0
    ? `<span style="color: var(--text-dim); font-style: italic;">${escapeHTML(t('edit.empty_assignments'))}</span>`
    : sortedAssignments.map((a, idx) => {
      const person = findPerson(a.personId);
      const name = person ? person.name.split(' ').slice(-1)[0] : '?';
      const fullName = person ? person.name : '?';
      const isActive = occ && occ.personId === a.personId && !isManual;
      const isUnavail = !!(State.runtime.unavailable && State.runtime.unavailable[a.personId]);
      const arrow = idx < sortedAssignments.length - 1 ? '<span class="chain-arrow">→</span>' : '';
      const unavailHint = isUnavail ? ' — ' + t('status.absent').toUpperCase() : '';
      const slotAction = !State.isEditMode ? 'data-action="open-person-detail"' : '';
      return `
        <span class="chain-slot"
              data-person-id="${a.personId}"
              data-active="${isActive}"
              data-unavailable="${isUnavail}"
              ${slotAction}
              role="button"
              tabindex="0"
              title="${rankLabel(a.rank)}: ${escapeHTML(fullName)}${escapeHTML(unavailHint)}">${escapeHTML(name)}</span>
        ${arrow}
      `;
    }).join('');

  // Depth-Badge bei manueller Zuordnung umpolen
  let depthBadgeHTML;
  if (isManualAbsent) {
    depthBadgeHTML = `<span class="depth-badge" data-rank="manual">🔒 ${escapeHTML(t('manual.badge'))}</span>
                      <span class="manual-absent-hint">${escapeHTML(t('manual.absent_hint'))}</span>`;
  } else if (isManual) {
    depthBadgeHTML = `<span class="depth-badge" data-rank="manual">🔒 ${escapeHTML(t('manual.badge'))}</span>`;
  } else if (personName) {
    depthBadgeHTML = `<span class="depth-badge" data-rank="${rankBadge}">${rankLabel(occ.rank)}</span>`;
  } else {
    depthBadgeHTML = `<span class="depth-badge" data-rank="unoccupied">${escapeHTML(t('role.no_substitution'))}</span>`;
  }

  const occupantHTML = isManualAbsent
    ? `
      <div class="occupant-name occupant-manual-absent">${escapeHTML(personName)}</div>
      <div class="occupant-meta">${depthBadgeHTML}</div>
    `
    : personName
    ? `
      <div class="occupant-name">${escapeHTML(personName)}</div>
      <div class="occupant-meta">${depthBadgeHTML}</div>
      ${originalHTML}
    `
    : `
      <div class="occupant-unoccupied">${escapeHTML(t('role.unoccupied'))}</div>
      <div class="occupant-meta">${depthBadgeHTML}</div>
    `;

  const editControls = State.isEditMode ? `
    <div class="role-edit-controls">
      <button class="btn-edit-inline" data-action="move-role-up" data-level-idx="${level ? State.config.levels.indexOf(level) : 0}" data-role-idx="${roleIdx || 0}" title="${escapeHTML(t('edit.tt_move_up'))}">↑</button>
      <button class="btn-edit-inline" data-action="move-role-down" data-level-idx="${level ? State.config.levels.indexOf(level) : 0}" data-role-idx="${roleIdx || 0}" title="${escapeHTML(t('edit.tt_move_down'))}">↓</button>
      <button class="btn-edit-inline" data-action="edit-role" data-role-id="${role.id}" title="${escapeHTML(t('edit.tt_edit'))}">✎</button>
      <button class="btn-edit-inline btn-edit-inline-danger" data-action="delete-role" data-role-id="${role.id}" title="${escapeHTML(t('edit.tt_delete'))}">×</button>
    </div>
  ` : '';

  // Manuell-Button (nur außerhalb des Edit-Modus, im Betriebsmodus)
  const manualBtn = !State.isEditMode ? `
    <button class="btn-manual-assign" data-action="open-manual" data-role-id="${role.id}" title="${escapeHTML(t('manual.tooltip'))}">
      ${isManual ? '🔒' : '🔓'}
    </button>
  ` : '';

  const ariaLabel = personName
    ? `${role.name}, ${personName}${isManual ? ' (' + t('manual.badge') + ')' : ''}`
    : `${role.name}, ${t('role.unoccupied')}`;

  const cardClickable = !State.isEditMode && personId && !isManualAbsent;
  const cardAction = cardClickable ? 'data-action="open-person-detail"' : '';
  const cardPidAttr = cardClickable ? `data-person-id="${personId}"` : '';

  return `
    <div class="role-card"
         data-state="${state}"
         data-critical="${role.critical}"
         data-manual="${isManual}"
         data-role-id="${role.id}"
         ${personId && !isManualAbsent ? `data-occupant-id="${personId}"` : ''}
         ${cardAction}
         ${cardPidAttr}
         tabindex="${cardClickable ? '0' : '-1'}"
         role="${cardClickable ? 'button' : 'group'}"
         aria-label="${escapeHTML(ariaLabel)}">
      <div class="role-name">${role.critical ? `<span class="role-critical-icon" title="${escapeHTML(t('active.critical_marker'))}">⚡</span>` : ''}${escapeHTML(role.name)}</div>
      ${editControls}
      ${manualBtn}
      <div class="role-occupant">${occupantHTML}</div>
      <div class="role-chain">
        <span class="chain-label">${escapeHTML(t('role.chain'))}</span>
        ${chainHTML}
      </div>
    </div>
  `;
}

/* ---- Side Panel ---- */
function renderSidePanel() {
  const content = document.getElementById('panel-content');

  // Detail-Ansicht hat Vorrang (außer im Audit-Tab)
  if (State.activeTab === 'audit') {
    content.innerHTML = renderAuditLog();
    return;
  }

  if (State.selectedPersonId) {
    content.innerHTML = renderPersonDetail(State.selectedPersonId);
    attachPersonDetailHandlers();
    return;
  }

  if (State.activeTab === 'persons') {
    content.innerHTML = renderPersonsList();
    attachPersonsListHandlers();
    return;
  }

  // Default: aktive Besetzung
  content.innerHTML = renderActiveList();
  attachActiveListHandlers();
}

/* ---- Persons list ---- */
function buildPersonRowHTML(p) {
  const absence = State.runtime.unavailable && State.runtime.unavailable[p.id];
  const isAvailable = !absence;
  const roles = getRolesForPerson(p.id);
  const activeRoles = roles.filter(r => {
    const occ = State.occupancy[r.role.id];
    return occ && occ.personId === p.id;
  });

  const roleCountLabel = roles.length === 0
    ? `<span style="color: var(--text-dim);">${escapeHTML(t('persons.no_roles'))}</span>`
    : `${escapeHTML(t('persons.role_count', { n: roles.length }))}${activeRoles.length > 0 ? ` · ${escapeHTML(t('persons.active_count', { n: activeRoles.length }))}` : ''}`;

  const absenceChip = absence ? `
    <div class="person-list-absence-row">
      <span class="absent-category-chip">${escapeHTML(categoryLabel(absence.category))}</span>
      <span class="person-list-absence-since">${escapeHTML(formatRelative(absence.since))}</span>
    </div>
  ` : '';

  const editControls = State.isEditMode ? `
    <div class="person-list-edit-controls">
      <button class="btn-edit-inline" data-action="edit-person" data-person-id="${p.id}" title="${escapeHTML(t('edit.tt_edit'))}">✎</button>
      <button class="btn-edit-inline btn-edit-inline-danger" data-action="delete-person" data-person-id="${p.id}" title="${escapeHTML(t('edit.tt_delete'))}">×</button>
    </div>
  ` : '';

  const statusLabel = isAvailable ? t('person.available') : t('person.unavailable');

  return `
    <div class="person-list-item"
         data-action="open-person-detail"
         data-person-id="${p.id}"
         data-status="${isAvailable ? 'available' : 'unavailable'}"
         tabindex="0"
         role="button"
         aria-label="${escapeHTML(p.name)}, ${escapeHTML(statusLabel)}">
      <div class="person-list-head">
        <span class="person-list-dot"></span>
        <span class="person-list-name">${escapeHTML(p.name)}</span>
        <span class="person-list-status-label">${escapeHTML(statusLabel)}</span>
      </div>
      <div class="person-list-meta">${roleCountLabel}</div>
      ${absenceChip}
      ${editControls}
    </div>
  `;
}

function renderPersonsList() {
  const filter = State.personsFilter || '';
  const allPersons = [...State.config.persons].sort((a, b) =>
    a.name.localeCompare(b.name, State.language || 'de')
  );

  const filtered = filter
    ? allPersons.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()))
    : allPersons;

  const totalCount = allPersons.length;
  const absentCount = Object.keys(State.runtime.unavailable || {}).length;
  const availableCount = totalCount - absentCount;

  const itemsHTML = filtered.map(buildPersonRowHTML).join('');

  const emptyHTML = filtered.length === 0 && totalCount > 0 ? `
    <div class="persons-empty">${escapeHTML(t('persons.no_matches', { q: filter }))}</div>
  ` : totalCount === 0 ? `
    <div class="persons-empty">${escapeHTML(t('edit.empty_persons'))}</div>
  ` : '';

  const addPersonBtn = State.isEditMode ? `
    <button class="btn-edit-prominent" data-action="add-person">
      ${escapeHTML(t('edit.add_person'))}
    </button>
  ` : '';

  return `
    <div class="persons-summary">
      <div class="persons-summary-metric" data-tone="ok">
        <span class="persons-summary-label">${escapeHTML(t('persons.available_label'))}</span>
        <span class="persons-summary-value">${availableCount}</span>
      </div>
      <div class="persons-summary-metric" data-tone="${absentCount > 0 ? 'warn' : 'ok'}">
        <span class="persons-summary-label">${escapeHTML(t('persons.absent_label'))}</span>
        <span class="persons-summary-value">${absentCount}</span>
      </div>
      <div class="persons-summary-metric">
        <span class="persons-summary-label">${escapeHTML(t('persons.total_label'))}</span>
        <span class="persons-summary-value">${totalCount}</span>
      </div>
    </div>
    ${addPersonBtn}
    <div class="persons-filter">
      <input type="text"
             id="person-filter-input"
             class="form-input"
             placeholder="${escapeHTML(t('persons.search_placeholder'))}"
             value="${escapeHTML(filter)}"
             autocomplete="off" />
    </div>
    <div class="persons-list">${itemsHTML}</div>
    ${emptyHTML}
  `;
}

function attachPersonsListHandlers() {
  // Nur noch nicht-click-handler: Filter-Input und Keyboard
  const input = document.getElementById('person-filter-input');
  if (input) {
    input.addEventListener('input', (e) => {
      State.personsFilter = e.target.value;
      renderPersonsListInline();
    });
  }
  attachPersonListItemHandlers();
}

// Rendert nur die Liste + Empty-Message neu, damit Filter-Input-Fokus erhalten bleibt
function renderPersonsListInline() {
  const content = document.getElementById('panel-content');
  if (!content) return;
  const filter = State.personsFilter || '';
  const allPersons = [...State.config.persons].sort((a, b) => a.name.localeCompare(b.name, State.language || 'de'));
  const filtered = filter
    ? allPersons.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()))
    : allPersons;

  const listEl = content.querySelector('.persons-list');
  const emptyEl = content.querySelector('.persons-empty');

  const itemsHTML = filtered.map(buildPersonRowHTML).join('');

  if (listEl) listEl.innerHTML = itemsHTML;
  if (emptyEl) emptyEl.remove();
  if (filtered.length === 0 && listEl) {
    const e = document.createElement('div');
    e.className = 'persons-empty';
    e.textContent = t('persons.no_matches', { q: filter });
    listEl.after(e);
  }
  attachPersonListItemHandlers();
}

function attachPersonListItemHandlers() {
  // Nur Keyboard-Unterstützung — Click läuft über globalen Dispatcher (data-action)
  document.querySelectorAll('.person-list-item').forEach(item => {
    item.addEventListener('keydown', (e) => {
      if (e.target !== item) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openPersonDetail(item.dataset.personId);
      }
    });
  });
}

function renderAbsentSection() {
  const absentIds = Object.keys(State.runtime.unavailable || {});
  if (absentIds.length === 0) return '';

  // Nach Timestamp absteigend (neueste Abwesenheit oben)
  absentIds.sort((a, b) => {
    const ta = new Date(State.runtime.unavailable[a].since).getTime();
    const tb = new Date(State.runtime.unavailable[b].since).getTime();
    return tb - ta;
  });

  const items = absentIds.map(pid => {
    const person = findPerson(pid);
    if (!person) return '';
    const absence = State.runtime.unavailable[pid];
    return `
      <div class="absent-item" data-action="open-person-detail" data-person-id="${pid}" tabindex="0" role="button"
           aria-label="${escapeHTML(person.name)}, abwesend (${escapeHTML(categoryLabel(absence.category))})">
        <div class="absent-name-row">
          <span class="absent-dot"></span>
          <span class="absent-name">${escapeHTML(person.name)}</span>
        </div>
        <div class="absent-meta">
          <span class="absent-category-chip">${escapeHTML(categoryLabel(absence.category))}</span>
          <span class="absent-since">${escapeHTML(formatRelative(absence.since))}</span>
        </div>
        ${absence.note ? `<div class="absent-note">„${escapeHTML(absence.note)}"</div>` : ''}
      </div>
    `;
  }).join('');

  return `
    <div class="absent-section">
      <div class="absent-header">
        <span class="absent-header-label">${escapeHTML(t('active.absent_header'))}</span>
        <span class="absent-count">${absentIds.length}</span>
      </div>
      <div class="absent-items">${items}</div>
    </div>
    <div class="active-divider">
      <span class="active-divider-label">${escapeHTML(t('active.divider'))}</span>
    </div>
  `;
}

function renderActiveList() {
  const absentHTML = renderAbsentSection();
  const items = [];
  State.config.levels.forEach(level => {
    level.roles.forEach(role => {
      const occ = State.occupancy[role.id];
      let state, nameHTML, contactHTML, metaHTML;

      if (!occ) {
        state = 'unoccupied';
        nameHTML = `<div class="active-person" style="color: var(--status-critical);">${escapeHTML(t('role.unoccupied'))}</div>`;
        contactHTML = '';
        metaHTML = `<span>${escapeHTML(t('active.no_substitution'))}</span>`;
      } else {
        if (occ.rank === 0) state = 'primary';
        else if (occ.rank <= 2) state = 'substitute';
        else state = 'substitute-deep';

        const person = findPerson(occ.personId);
        nameHTML = `<div class="active-person">${escapeHTML(person.name)}</div>`;
        contactHTML = `
          <div class="active-contact">
            ${person.phone ? `
              <div class="active-contact-row">
                <span class="active-contact-icon">☎</span>
                <a href="tel:${escapeHTML(person.phone)}">${escapeHTML(person.phone)}</a>
              </div>
            ` : ''}
            ${person.email ? `
              <div class="active-contact-row">
                <span class="active-contact-icon">✉</span>
                <a href="mailto:${escapeHTML(person.email)}">${escapeHTML(person.email)}</a>
              </div>
            ` : ''}
          </div>
        `;
        metaHTML = `
          <span>${occ.rank > 0 ? escapeHTML(t('active.rank_active', { rank: rankLabel(occ.rank) })) : escapeHTML(rankLabel(occ.rank))}</span>
          ${role.critical ? `<span style="color: var(--status-critical);">${escapeHTML(t('active.critical_marker'))}</span>` : ''}
        `;
      }

      items.push(`
        <div class="active-item"
             data-state="${state}"
             ${occ ? `data-action="open-person-detail" data-person-id="${occ.personId}"` : ''}
             ${occ ? `tabindex="0" role="button"` : ''}>
          <div class="active-role">${escapeHTML(role.name)}</div>
          ${nameHTML}
          ${contactHTML}
          <div class="active-meta">${metaHTML}</div>
        </div>
      `);
    });
  });

  return `${absentHTML}<div class="active-list">${items.join('')}</div>`;
}

function attachActiveListHandlers() {
  // Nur Keyboard-Support — Clicks laufen über den globalen Dispatcher (data-action)
  document.querySelectorAll('.active-item[data-person-id], .absent-item[data-person-id]').forEach(item => {
    item.addEventListener('keydown', (e) => {
      if (e.target !== item) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openPersonDetail(item.dataset.personId);
      }
    });
  });
}

function renderPersonDetail(personId) {
  const person = findPerson(personId);
  if (!person) return '<p>—</p>';

  const absence = State.runtime.unavailable && State.runtime.unavailable[personId];
  const rolesAssigned = getRolesForPerson(personId);
  const isAvailable = !absence;

  const absenceHTML = absence ? `
    <div class="detail-section">
      <div class="detail-label">${escapeHTML(t('person.absence'))}</div>
      <div class="detail-absence">
        <div class="absence-category">${escapeHTML(categoryLabel(absence.category))}</div>
        ${absence.note ? `<div class="absence-note">"${escapeHTML(absence.note)}"</div>` : ''}
        <div class="absence-since">${escapeHTML(t('person.since_full', { time: formatDateTime(absence.since), relative: formatRelative(absence.since) }))}</div>
      </div>
    </div>
  ` : '';

  const rolesHTML = rolesAssigned.map(r => {
    const occ = State.occupancy[r.role.id];
    const isActiveHere = occ && occ.personId === personId;
    return `
      <div class="detail-role-row">
        <div>
          <div class="detail-role-name">${escapeHTML(r.role.name)}</div>
          <div class="detail-role-rank" style="color: var(--text-dim); font-size: 10px; margin-top: 2px;">
            ${escapeHTML(r.level.name)}
          </div>
        </div>
        <div class="detail-role-rank" style="color: ${isActiveHere ? 'var(--accent)' : 'var(--text-dim)'};">
          ${escapeHTML(rankLabel(r.rank))}${isActiveHere ? ' • ' + escapeHTML(t('status.primary').toUpperCase()) : ''}
        </div>
      </div>
    `;
  }).join('');

  // Availability-Toggles im Edit-Modus deaktivieren
  const availabilityBtn = State.isEditMode
    ? `<button class="btn-action" disabled style="opacity: 0.5; cursor: not-allowed;">
         ${escapeHTML(t('toast.edit_disabled_availability'))}
       </button>`
    : (isAvailable
      ? `<button class="btn-action" data-variant="critical" data-action="mark-unavailable" data-person-id="${personId}">
           ${escapeHTML(t('person.mark_unavailable'))}
         </button>`
      : `<button class="btn-action" data-variant="primary" data-action="mark-available" data-person-id="${personId}">
           ${escapeHTML(t('person.mark_available'))}
         </button>`
    );

  // Im Edit-Modus: Bearbeiten-/Löschen-Buttons
  const editBtns = State.isEditMode ? `
    <button class="btn-action" data-action="edit-person" data-person-id="${personId}">
      ✎ ${escapeHTML(t('edit.edit_person_title'))}
    </button>
    <button class="btn-action" data-variant="critical" data-action="delete-person" data-person-id="${personId}">
      × ${escapeHTML(t('btn.delete'))}
    </button>
  ` : '';

  return `
    <div class="person-detail">
      <div class="detail-header">
        <div class="detail-name">${escapeHTML(person.name)}</div>
        <div class="detail-status" data-status="${isAvailable ? 'available' : 'unavailable'}">
          <span class="detail-status-dot"></span>
          ${escapeHTML(isAvailable ? t('person.available') : t('person.unavailable'))}
        </div>
      </div>

      ${absenceHTML}

      <div class="detail-section">
        <div class="detail-label">${escapeHTML(t('person.contact'))}</div>
        <div class="detail-contact">
          ${person.phone ? `
            <a href="tel:${escapeHTML(person.phone)}">
              <span>☎</span>
              <span>${escapeHTML(person.phone)}</span>
            </a>
          ` : ''}
          ${person.email ? `
            <a href="mailto:${escapeHTML(person.email)}">
              <span>✉</span>
              <span>${escapeHTML(person.email)}</span>
            </a>
          ` : ''}
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-label">${escapeHTML(t('person.roles_heading', { n: rolesAssigned.length }))}</div>
        <div class="detail-roles">${rolesHTML || `<div style="color: var(--text-dim);">${escapeHTML(t('person.no_roles_assigned'))}</div>`}</div>
      </div>

      <div class="detail-actions">
        ${availabilityBtn}
        ${editBtns}
        <button class="btn-action" data-action="back-to-list">
          ${escapeHTML(t('person.back_to_overview'))}
        </button>
      </div>
    </div>
  `;
}

function attachPersonDetailHandlers() {
  // Alle Click-Handler laufen jetzt über den globalen Dispatcher (data-action).
  // Diese Funktion ist nur noch ein No-op, bleibt als Hook erhalten
  // falls später Keyboard- oder Input-Handler nötig werden.
}

/* ---- Audit Log ---- */
function renderAuditLog() {
  const log = Storage.loadAudit();
  if (log.length === 0) {
    return `<div class="audit-empty">${escapeHTML(t('audit.empty'))}</div>`;
  }

  const entries = log.map(entry => {
    const person = findPerson(entry.personId);
    const personName = person ? person.name : (entry.personName || '—');
    let headerHTML = '';
    let detailHTML = '';

    if (entry.type === 'availability_change') {
      if (entry.action === 'marked_unavailable') {
        headerHTML = `
          <span class="audit-person">${escapeHTML(personName)}</span>
          <span style="color: var(--text-secondary);"> ${escapeHTML(t('audit.marked_unavailable'))}</span>
        `;
        detailHTML = entry.category ? `
          <div class="audit-detail">
            <span class="audit-category">${escapeHTML(categoryLabel(entry.category))}</span>${entry.note ? ' ' + escapeHTML(entry.note) : ''}
          </div>
        ` : '';
      } else if (entry.action === 'manual_set') {
        headerHTML = `
          <span class="audit-person">${escapeHTML(t('audit.manual_set'))}</span>
          <span style="color: var(--text-secondary);"> — ${escapeHTML(personName)}</span>
        `;
        detailHTML = entry.detail ? `
          <div class="audit-detail">
            <span class="audit-category">${escapeHTML(entry.detail)}</span>
          </div>
        ` : '';
      } else if (entry.action === 'manual_released') {
        headerHTML = `
          <span class="audit-person">${escapeHTML(t('audit.manual_released'))}</span>
        `;
        detailHTML = entry.detail ? `
          <div class="audit-detail">
            <span class="audit-category">${escapeHTML(entry.detail)}</span>
          </div>
        ` : '';
      } else {
        headerHTML = `
          <span class="audit-person">${escapeHTML(personName)}</span>
          <span style="color: var(--text-secondary);"> ${escapeHTML(t('audit.marked_available'))}</span>
        `;
      }
    } else if (entry.type === 'sync_applied') {
      headerHTML = `
        <span class="audit-person">${escapeHTML(t('audit.sync_applied'))}</span>
        <span style="color: var(--text-secondary);">${escapeHTML(t('audit.absent_count_suffix', { n: entry.totalAbsent }))}</span>
      `;
      const diffs = [];
      if (entry.becameAbsent && entry.becameAbsent.length > 0) {
        diffs.push(t('audit.newly_absent', { n: entry.becameAbsent.length }));
      }
      if (entry.becameAvailable && entry.becameAvailable.length > 0) {
        diffs.push(t('audit.now_available', { n: entry.becameAvailable.length }));
      }
      detailHTML = `
        <div class="audit-detail">
          <span class="audit-category">${escapeHTML(t('audit.fingerprint', { hash: entry.hash || '?' }))}</span>
          ${escapeHTML(diffs.join(' · '))}
        </div>
      `;
    } else if (entry.type === 'config_edit') {
      headerHTML = `
        <span class="audit-person">${escapeHTML(t('audit.config_edit'))}</span>
        <span style="color: var(--text-secondary);"> — ${escapeHTML(entry.detail || '')}</span>
      `;
    }

    return `
      <div class="audit-entry" data-type="${entry.type}" data-action="${entry.action || ''}">
        <div class="audit-timestamp">${formatDateTime(entry.timestamp)}</div>
        <div style="margin-top: 2px;">${headerHTML}</div>
        ${detailHTML}
      </div>
    `;
  }).join('');

  return `<div class="audit-list">${entries}</div>`;
}

/* =========================================================================
   ACTIONS
   ========================================================================= */
function openPersonDetail(personId) {
  State.selectedPersonId = personId;
  // Bei Audit-Tab zurück auf Besetzung; Personen-Tab darf bleiben
  if (State.activeTab === 'audit') {
    State.activeTab = 'active';
    updateTabsUI();
  }
  renderSidePanel();
}

function openMarkUnavailableModal(personId) {
  const person = findPerson(personId);
  if (!person) return;
  markUnavailState.personId = personId;

  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  const footer = document.getElementById('modal-footer');

/* =========================================================================
   GLOBAL EVENT DISPATCHER
   ----------------------------------------------------------------

   document. Jede Schaltfläche hat data-action="..." und optional
   data-person-id, data-role-id, data-level-idx, data-role-idx etc.
   Damit sind Handler unabhängig von Rerenders — sie hängen am Document,

   ========================================================================= */

function handleGlobalClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const handler = CLICK_HANDLERS[el.dataset.action];
  if (!handler) return;
  e.stopPropagation();
  try {
    handler(el, e);
  } catch (err) {
    console.error('Dispatch-Fehler für', el.dataset.action, err);
    showToast('Fehler: ' + (err.message || err), 'warning');
  }
}

function handleGlobalKeyDown(e) {
  // Enter/Space auf fokussierten data-action-Elementen als Klick interpretieren
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const el = e.target.closest('[data-action]');
  if (!el) return;
  if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') return;
  if (el.tagName === 'BUTTON') return; // Browser handhabt Enter/Space nativ
  e.preventDefault();
  const handler = CLICK_HANDLERS[el.dataset.action];
  if (handler) handler(el, e);
}

function confirmMarkUnavailable() {
  const personId = markUnavailState.personId;
  if (!personId) return;
  const cat = document.getElementById('absence-category');
  const note = document.getElementById('absence-note');
  if (!cat) return;
  markUnavailable(personId, cat.value, note ? note.value.trim() : '');
  closeModal();
}

function saveEditLevelModal() {
  const idx = editLevelState.idx;
  const isNew = idx === null || idx === undefined;
  const nameEl = document.getElementById('level-name');
  const errEl = document.getElementById('level-error');
  if (!nameEl) return;
  const name = nameEl.value.trim();
  if (!name) {
    if (errEl) { errEl.textContent = t('edit.err_name_required'); errEl.style.display = 'block'; }
    return;
  }
  if (isNew) {
    State.config.levels.push({ id: uid('lvl'), name, roles: [] });
    logConfigEdit('Level added', { name });
  } else {
    State.config.levels[idx].name = name;
    logConfigEdit('Level renamed', { name });
  }
  closeModal();
  saveConfigAndRerender();
  showToast(t('toast.edit_saved'), 'success');
}

function saveEditRoleModal() {
  const st = editRoleState;
  const level = State.config.levels[st.levelIdx];
  if (!level) return;
  const isNew = st.roleIdx === null || st.roleIdx === undefined;
  const nameEl = document.getElementById('role-name');
  const descEl = document.getElementById('role-desc');
  const critEl = document.getElementById('role-critical');
  const errEl  = document.getElementById('role-error');
  if (!nameEl) return;
  const name = nameEl.value.trim();
  if (!name) {
    if (errEl) { errEl.textContent = t('edit.err_name_required'); errEl.style.display = 'block'; }
    return;
  }
  const desc = descEl ? descEl.value.trim() : '';
  const critical = critEl ? critEl.checked : false;
  const assignments = st.draftAssignments.map((a, i) => ({ personId: a.personId, rank: i }));

  if (isNew) {
    level.roles.push({ id: st.role.id, name, description: desc, critical, assignments });
    logConfigEdit('Role added', { name });
  } else {
    const target = level.roles[st.roleIdx];
    target.name = name;
    target.description = desc;
    target.critical = critical;
    target.assignments = assignments;
    logConfigEdit('Role edited', { name });
  }
  closeModal();
  saveConfigAndRerender();
  showToast(t('toast.edit_saved'), 'success');
}

function roleModalAddAssignment() {
  const sel = document.getElementById('assignment-person-select');
  if (!sel) return;
  const pid = sel.value;
  if (!pid) return;
  if (editRoleState.draftAssignments.some(a => a.personId === pid)) {
    const err = document.getElementById('role-error');
    if (err) { err.textContent = t('edit.err_person_in_chain'); err.style.display = 'block'; }
    return;
  }
  editRoleState.draftAssignments.push({ personId: pid, rank: editRoleState.draftAssignments.length });
  renderAssignmentsEditor();
  renderAssignmentPersonSelect();
  const err = document.getElementById('role-error');
  if (err) err.style.display = 'none';
}

function roleModalMoveAssignment(idx, delta) {
  const arr = editRoleState.draftAssignments;
  const target = idx + delta;
  if (target < 0 || target >= arr.length) return;
  [arr[target], arr[idx]] = [arr[idx], arr[target]];
  renderAssignmentsEditor();
  renderAssignmentPersonSelect();
}

function roleModalRemoveAssignment(idx) {
  editRoleState.draftAssignments.splice(idx, 1);
  renderAssignmentsEditor();
  renderAssignmentPersonSelect();
}

function saveEditPersonModal() {
  const pid = editPersonState.personId;
  const isNew = !pid;
  const nameEl = document.getElementById('person-name');
  const phoneEl = document.getElementById('person-phone');
  const emailEl = document.getElementById('person-email');
  const errEl   = document.getElementById('person-error');
  if (!nameEl) return;
  const name = nameEl.value.trim();
  const phone = phoneEl ? phoneEl.value.trim() : '';
  const email = emailEl ? emailEl.value.trim() : '';
  if (!name) {
    if (errEl) { errEl.textContent = t('edit.err_name_required'); errEl.style.display = 'block'; }
    return;
  }
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    if (errEl) { errEl.textContent = t('edit.err_email_invalid'); errEl.style.display = 'block'; }
    return;
  }
  if (isNew) {
    State.config.persons.push({ id: uid('p'), name, phone, email });
    logConfigEdit('Person added', { name });
  } else {
    const target = findPerson(pid);
    if (target) {
      target.name = name;
      target.phone = phone;
      target.email = email;
      logConfigEdit('Person edited', { name });
    }
  }
  closeModal();
  saveConfigAndRerender();
  showToast(t('toast.edit_saved'), 'success');
}

function saveManualAssignmentFromModal() {
  const roleId = manualAssignState.roleId;
  if (!roleId) return;
  const sel = document.getElementById('manual-person');
  if (!sel) return;
  const pid = sel.value;
  if (!pid) {
    releaseManualAssignment(roleId);
  } else {
    setManualAssignment(roleId, pid);
  }
  closeModal();
}

function releaseCurrentManualFromModal() {
  const roleId = manualAssignState.roleId;
  if (!roleId) return;
  releaseManualAssignment(roleId);

  document.getElementById('modal-backdrop').style.display = 'none';

  editLevelState   = { idx: null };
  editRoleState    = { levelIdx: null, roleIdx: null, role: null, draftAssignments: [] };
  editPersonState  = { personId: null };
  manualAssignState = { roleId: null };
  // QR-Autocycle stoppen, falls aktiv

  // QR-Scanner stoppen, falls aktiv

function markUnavailable(personId, category, note) {
  const now = new Date().toISOString();
  State.runtime.unavailable[personId] = {
    since: now,
    category,
    note,
  };
  Storage.saveRuntime(State.runtime);
  Storage.appendAudit({
    id: uid('a'),
    timestamp: now,
    type: 'availability_change',
    action: 'marked_unavailable',
    personId,
    category,
    note,
  });
  render();
  const person = findPerson(personId);
  showToast(t('toast.marked_unavailable', { name: person.name }), 'warning');
}

function markAvailable(personId) {
  const now = new Date().toISOString();
  delete State.runtime.unavailable[personId];
  Storage.saveRuntime(State.runtime);
  Storage.appendAudit({
    id: uid('a'),
    timestamp: now,
    type: 'availability_change',
    action: 'marked_available',
    personId,
  });
  render();
  const person = findPerson(personId);
  showToast(t('toast.marked_available', { name: person.name }), 'success');
}
